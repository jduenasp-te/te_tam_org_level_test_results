<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Select Organizations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ static_v('styles.css') }}">
</head>
<body>
<div class="auth-shell">
  <form method="post" class="auth-card auth-card--wide" id="select-org-form">
    <h1>Select your Organizations</h1>
    <p class="subtitle">Hi <strong>{{ user_name }}</strong> — pick one or more
      organizations to monitor. The script will pull data from <strong>all
      account groups</strong> belonging to every selected organization.</p>

    {% if error %}<div class="alert">{{ error }}</div>{% endif %}

    <div class="form-row">
      <label>Organizations</label>
      <div class="org-list" id="org-list">
        {% for org in organizations %}
          <label class="org-row" data-org-key="{{ org.orgKey }}">
            <input type="checkbox" name="orgKey" value="{{ org.orgKey }}"
                   {% if loop.first %}checked{% endif %}>
            <span class="org-name">{{ org.organizationName }}</span>
            {% if org.orgId %}<span class="org-id">({{ org.orgId }})</span>{% endif %}
            <span class="org-meta">— {{ org.account_groups|length }} account
              group{{ '' if org.account_groups|length == 1 else 's' }}</span>
            <span class="org-token">via {{ org.sourceLabel or 'primary token' }}</span>
          </label>
        {% endfor %}
      </div>
    </div>

    <!-- Add another token -->
    <div class="form-row token-loader">
      <label>Add another bearer token</label>
      <div class="token-loader-row">
        <input type="password" id="extra-token" autocomplete="off"
               placeholder="Paste another ThousandEyes API token">
        <button type="button" id="load-extra-token" class="btn btn-cyan">
          Load organization from another token
        </button>
      </div>
      <div id="extra-token-msg" class="token-msg"></div>
    </div>

    <div class="form-row">
      <label for="interval">Refresh interval (minutes)</label>
      <select id="interval" name="interval">
        {% for m in intervals %}
          <option value="{{ m }}" {% if m == 5 %}selected{% endif %}>{{ m }} minutes</option>
        {% endfor %}
      </select>
    </div>

    <div style="display:flex; gap:10px;">
      <a href="{{ url_for('logout') }}" class="btn btn-disabled" style="flex:0 0 auto;">Logout</a>
      <button type="submit" class="btn btn-primary" style="flex:1;">Load Dashboard</button>
    </div>
  </form>
</div>

<script>
(function () {
  const btn   = document.getElementById("load-extra-token");
  const input = document.getElementById("extra-token");
  const msg   = document.getElementById("extra-token-msg");
  const list  = document.getElementById("org-list");

  function escapeHtml(s) {
    return String(s ?? "").replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;",
    }[c]));
  }

  btn.addEventListener("click", async () => {
    const token = (input.value || "").trim();
    if (!token) {
      msg.textContent = "Please paste a token first.";
      msg.className = "token-msg err";
      return;
    }
    btn.disabled = true;
    msg.textContent = "Loading organizations…";
    msg.className = "token-msg info";
    try {
      const res = await fetch("/select-org/add-token", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token }),
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        msg.textContent = data.error || "Could not validate token.";
        msg.className = "token-msg err";
        return;
      }
      (data.added || []).forEach((org) => {
        const row = document.createElement("label");
        row.className = "org-row";
        row.dataset.orgKey = org.orgKey;
        row.innerHTML = `
          <input type="checkbox" name="orgKey" value="${escapeHtml(org.orgKey)}" checked>
          <span class="org-name">${escapeHtml(org.organizationName)}</span>
          ${org.orgId ? `<span class="org-id">(${escapeHtml(org.orgId)})</span>` : ""}
          <span class="org-meta">— ${org.account_groups.length} account
            group${org.account_groups.length === 1 ? "" : "s"}</span>
          <span class="org-token">via ${escapeHtml(data.label || "additional token")}</span>`;
        list.appendChild(row);
      });
      const addedTxt = `Added ${data.added.length} organization${data.added.length === 1 ? "" : "s"}`;
      const skippedTxt = data.skipped
        ? `, skipped ${data.skipped} already in the list.`
        : ".";
      msg.textContent = addedTxt + skippedTxt;
      msg.className = "token-msg ok";
      input.value = "";
    } catch (e) {
      msg.textContent = "Network error while validating token.";
      msg.className = "token-msg err";
    } finally {
      btn.disabled = false;
    }
  });
})();
</script>
</body>
</html>
