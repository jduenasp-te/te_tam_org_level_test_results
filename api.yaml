          example: 65babd9bb90bf55b17c96c8d
    LegacyDashboardSnapshot:
      deprecated: true
      type: object
      properties:
        accountId:
          deprecated: true
          type: integer
          format: int64
          description: Identifier of the account group that the snapshot belongs to.
          example: 1234
        createdDate:
          deprecated: true
          type: string
          description: UTC date when dashboard snapshot was created.
          example: '2023-05-16 10:14:28'
        expirationDate:
          deprecated: true
          type: string
          description: >-
            Expiration date of the snapshot. If unspecified, the snapshot
            expires 1 year from its creation date. The expiration date must be
            set within 5 years from the current date.
          example: '2023-05-16 10:14:28'
        permalink:
          deprecated: true
          type: string
          description: Hyperlink to dashboard snapshot in ThousandEyes Application
          example: >-
            https://app.thousandeyes.com/dashboard/?snapshotId=d28bb71f-5a47-4783-8f12-d4b115e61b0c
        apiLinks:
          deprecated: true
          type: array
          description: A links array containing the self link.
          items:
            additionalProperties: true
    ApiDashboardSnapshot:
      allOf:
        - type: object
          properties:
            snapshotId:
              $ref: '#/components/schemas/DashboardSnapshotId'
            snapshotName:
              type: string
              description: Name of the dashboard snapshot.
              example: HTTP Server Dashboard Snapshot
            aid:
              type: string
              description: Identifier of the account group that the snapshot belongs to.
              example: '1234'
            isShared:
              type: boolean
              description: Set `true` if dashboard snapshot is shared, `false` otherwise.
            snapshotCreatedDate:
              type: string
              format: date-time
              description: >-
                UTC date when dashboard snapshot was created (ISO date-time
                format).
              example: '2023-05-16T10:14:28Z'
            dashboard:
              $ref: '#/components/schemas/ApiDashboard'
            widgets:
              type: array
              items:
                $ref: '#/components/schemas/ApiWidget'
            isScheduled:
              type: boolean
              description: >-
                Set `true` if dashboard snapshot was generated from a schedule,
                `false` otherwise.
            timeSpan:
              $ref: '#/components/schemas/ApiReportSnapshotTimeSpan'
            snapshotExpirationDate:
              $ref: '#/components/schemas/SnapshotExpirationDate'
            _links:
              $ref: '#/components/schemas/AppAndSelfLinks'
        - $ref: '#/components/schemas/LegacyDashboardSnapshot'
    ApiReportSnapshotTimeSpan:
      type: object
      description: Time span of the dashboard snapshot.
      properties:
        startDate:
          deprecated: true
          type: string
          description: UTC start date of dashboard snapshot.
          example: '2023-05-16 10:14:28'
        start:
          type: string
          format: date-time
          description: UTC start date of dashboard snapshot (ISO date-time format).
          example: '2023-05-16T10:14:28Z'
        duration:
          type: integer
          format: int64
          description: Duration of dashboard snapshot in seconds.
          example: 60
    DashboardSnapshotsPage:
      type: object
      description: Dashboard snapshots page.
      properties:
        pages:
          deprecated: true
          type: object
          additionalProperties: true
        dashboardSnapshots:
          type: array
          items:
            $ref: '#/components/schemas/ApiDashboardSnapshot'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    DashboardLinks:
      type: object
      description: A links object containing the self and the snapshots links.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Link'
        snapshots:
          $ref: '#/components/schemas/Link'
    BinSize:
      type: integer
      format: int64
      description: Duration of each bin.
      example: 3600
    Timestamp:
      type: integer
      format: int64
      description: Timestamp of the aggregated data point.
      example: 1567620000
    WidgetValue:
      type: number
      format: double
      description: Aggregated value.
      example: 100
    WidgetStatus:
      type: string
      description: Message for not fully configured card or no data.
      example: No data
    ApiContextFiltersResponse:
      type: object
      description: All global dashboard filters saved.
      properties:
        dashboardFilters:
          type: array
          items:
            $ref: '#/components/schemas/ApiContextFilterResponse'
    ApiDashboardFilterName:
      type: string
      description: The name of the dashboard filter, this must be unique.
      example: cea-filter
    ApiDashboardFilterDescription:
      type: string
      description: An optional description of the filter.
      example: Global filter for CEA widgets
    ApiDashboardFilterUserDetails:
      type: object
      description: Details of user who created or modified the filter.
      properties:
        uid:
          type: string
          description: Unique ID of the user.
          example: '1'
        name:
          type: string
          description: Name of the user.
          example: Test User
    ApiContextFilterRequest:
      type: object
      description: >-
        Request containing dashboard filter name, description and context
        details.
      properties:
        context:
          $ref: '#/components/schemas/ApiContextFilters'
        name:
          $ref: '#/components/schemas/ApiDashboardFilterName'
        description:
          $ref: '#/components/schemas/ApiDashboardFilterDescription'
      required:
        - name
        - context
    ApiContextFilterResponse:
      description: Response containing dashboard filter settings and context details.
      type: object
      properties:
        context:
          $ref: '#/components/schemas/ApiContextFilters'
        aid:
          type: string
          description: Account group ID of the filter.
          example: '11'
        id:
          type: string
          description: Unique ID of the dashboard filter.
          example: 65bc18e8f2073a4a469cd958
        name:
          $ref: '#/components/schemas/ApiDashboardFilterName'
        description:
          $ref: '#/components/schemas/ApiDashboardFilterDescription'
        createdBy:
          $ref: '#/components/schemas/ApiDashboardFilterUserDetails'
        modifiedDate:
          type: string
          format: date-time
          description: Timestamp when the filter was last modified.
          example: '2024-02-01T22:19:19+00:00'
        createdDate:
          type: string
          format: date-time
          description: Timestamp when the filter was created.
          example: '2024-02-01T22:19:19+00:00'
        modifiedBy:
          $ref: '#/components/schemas/ApiDashboardFilterUserDetails'
        _links:
          $ref: '#/components/schemas/SelfLinks'
      required:
        - id
        - aid
        - name
        - context
    ApiContextFilters:
      type: array
      description: List of filters to be applied to a dashboard.
      uniqueItems: true
      items:
        $ref: '#/components/schemas/ApiDataSourceFilters'
    ApiDataSourceFilters:
      type: object
      description: List of different datasource filters.
      properties:
        dataSourceId:
          type: string
          description: Types of data source.
          example: VIRTUAL_AGENT
        filters:
          type: array
          description: List of different filter properties.
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ApiDataSourceFilter'
      required:
        - dataSourceId
        - filters
    ApiDataSourceFilter:
      type: object
      description: List of different filter properties for a single datasource.
      properties:
        filterId:
          type: string
          description: Data source property to filter by.
          example: TEST_LABEL
        values:
          type: array
          uniqueItems: true
          description: Values to filter by based on the specified `filterId`.
          example:
            - '45862'
            - '59749'
          items:
            type: string
        metricIds:
          type: array
          uniqueItems: true
          description: Dashboard metric associated with the filter property.
          example:
            - WEB_PAGE_LOAD_COMPLETION_RATE
            - WEB_TTFB
            - WEB_AVAILABILITY
          items:
            type: string
      required:
        - filterId
        - values
        - metricIds
    AppAndSelfLinks:
      type: object
      description: A links object containing the ThousandEyes App link
      readOnly: true
      properties:
        appLink:
          $ref: '#/components/schemas/Link'
        self:
          $ref: '#/components/schemas/Link'
    UserAgents:
      type: object
      properties:
        userAgents:
          type: array
          items:
            $ref: '#/components/schemas/UserAgent'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    UserAgent:
      type: object
      properties:
        browser:
          type: string
          description: The name of the web browser.
          example: Firefox
        os:
          type: string
          description: The operating system for the user-agent HTTP header.
          example: Windows
        value:
          type: string
          description: The text of the user-agent header.
          example: >-
            Mozilla/5.0 (Linux; Android 6.0; Nexus 5 Build/MRA58N)
            AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.5993.70 Mobile
            Safari/537.36
    EmulatedDevice:
      type: object
      required:
        - category
        - width
        - height
      properties:
        category:
          $ref: '#/components/schemas/EmulatedDeviceCategory'
        width:
          type: integer
          description: The width of the display of the emulated device.
          example: 1024
          minimum: 50
          maximum: 9999
        height:
          type: integer
          description: The height of the display of the emulated device.
          example: 768
          minimum: 50
          maximum: 9999
    EmulatedDeviceResponses:
      type: object
      properties:
        emulatedDevices:
          type: array
          items:
            $ref: '#/components/schemas/EmulatedDeviceResponse'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    EmulatedDeviceResponse:
      allOf:
        - $ref: '#/components/schemas/EmulatedDevice'
        - type: object
          properties:
            name:
              type: string
              description: The device name
              example: iPad Pro 12.9-in
            codeName:
              type: string
              description: A code corresponding to the device name.
              example: IPAD_PRO_12_9
            id:
              type: string
              description: ID of the emulated device.
              example: '11'
            availableUserAgents:
              type: array
              description: A list of user-agent strings for this emulated device.
              items:
                type: string
              example:
                - >-
                  Mozilla/5.0 (Linux; Android 6.0; Nexus 5 Build/MRA58N)
                  AppleWebKit/537.36 (KHTML, like Gecko) Chrome/118.0.5993.70
                  Mobile Safari/537.36
                - >-
                  Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36
                  (KHTML, like Gecko) Chrome/118.0.5993.70 Safari/537.36
            defaultUserAgentTemplate:
              type: string
              description: The default user-agent template to use for this device.
              example: >-
                Mozilla/5.0 (Android 4.4; Tablet; rv:70.0) Gecko/70.0
                Firefox/70.0
    ExpandEmulatedDeviceOptions:
      type: string
      enum:
        - user-agent
    EmulatedDeviceCategory:
      type: string
      description: The type of device being emulated.
      example: desktop
      enum:
        - desktop
        - laptop
        - phone
        - tablet
    ExpandEndpointAgentOptions:
      type: string
      enum:
        - clients
        - vpnProfiles
        - networkInterfaceProfiles
    FilterEndpointAgentsResponse:
      allOf:
        - $ref: '#/components/schemas/EndpointAgents'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/PaginationNextLink'
    ListEndpointAgentsResponse:
      allOf:
        - $ref: '#/components/schemas/EndpointAgents'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/PaginationNextAndSelfLink'
    EndpointAgents:
      description: A list of `EndpointAgents`.
      type: object
      properties:
        totalAgents:
          type: integer
          example: 1
          description: The total number of agents.
        agents:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/EndpointAgent'
    AgentSearchRequest:
      description: Parameters for filtering a list of agents.
      type: object
      properties:
        searchFilters:
          $ref: '#/components/schemas/AgentSearchFilters'
        thresholdFilter:
          $ref: '#/components/schemas/AgentThresholdFilters'
        searchSort:
          type: array
          items:
            $ref: '#/components/schemas/AgentSearchSort'
    AgentSearchFilters:
      type: object
      properties:
        id:
          description: >-
            Returns only agents that are an exact match of the provided
            identifiers.
          type: array
          items:
            $ref: '#/components/schemas/EndpointAgentId'
        agentName:
          description: |
            Returns only agents with the given name. 
            This is an exact match only.
          type: array
          items:
            $ref: '#/components/schemas/AgentName'
        computerName:
          description: |
            Returns only agents with the given computer name.
            This is an exact match only.
          type: array
          items:
            $ref: '#/components/schemas/ComputerName'
        username:
          description: >
            Returns only agents that have at least one user with a name.

            starting with the provided string. This is a case-insensitive prefix
            match.
          type: array
          items:
            type: string
          example:
            - picard
        userPrincipalName:
          description: >
            Returns only agents that have at least one user principal name,
            starting with one of the provided strings. This is a
            case-insensitive prefix match. User principle name is the user login
            name in an Internet-style format, typically used in Active Directory
            environments.
          type: array
          items:
            type: string
          example:
            - picard@c.com
        platform:
          description: |
            Filter on the platform on which the agent is running.
          type: array
          items:
            $ref: '#/components/schemas/Platform'
        osVersion:
          description: Case-insensitive prefix filter on the OS version.
          type: array
          items:
            type: string
            example: Version 10.15.2
        locationCountryISO:
          description: |
            Filter using the ISO country code of the location.
          type: array
          items:
            type: string
            example: FR
        locationSubdivision1Code:
          description: >
            Filter using the code for the first level administrative division
            within 

            the country. In US/Canada this is the State, in UK it's the country
            e.g. `ENG`
          type: array
          items:
            type: string
            example: ENG
        locationCity:
          description: >
            This is a prefix match on the city name field. The endpoint expects
            this to contain the 

            name of the city in English. e.g. 'Paris' or ''
          type: array
          items:
            type: string
            example: Paris
        licenseType:
          description: |
            Filter on the agent's license type
          type: array
          items:
            $ref: '#/components/schemas/AgentLicenseType'
        anyConnectDeviceId:
          description: >
            IDs of devices that has the Cisco Secure Client deployed with the
            Internet Security module.

            Returns only agents that have at least one matching
            `anyConnectDeviceId`.
          type: array
          items:
            type: string
          example:
            - JDLKSLFEIJER004334F
    AgentSearchSort:
      type: object
      properties:
        sort:
          $ref: '#/components/schemas/AgentSearchSortKey'
        order:
          $ref: '#/components/schemas/SortOrder'
    AgentSearchSortKey:
      type: string
      enum:
        - platform
        - osVersion
        - name
        - userName
        - city
    AgentThresholdFilters:
      type: object
      description: All filters are applied based on the conditional operator (and/or).
      properties:
        filters:
          type: array
          items:
            $ref: '#/components/schemas/AgentThresholdFilter'
        conditionalOperator:
          $ref: '#/components/schemas/ConditionalOperator'
    AgentThresholdFilter:
      type: object
      description: >-
        The metric is filtered based on the threshold value and operator
        provided.
      properties:
        name:
          type: string
          enum:
            - last-seen-ms
        value:
          type: number
          description: The threshold value.
          format: double
        operator:
          $ref: '#/components/schemas/ThresholdFilterOperator'
    ComputerName:
      description: |
        Returns only agents with the specified computer name.
        This is an exact match only.
      type: string
      example: DESKTOP-45AE8
    AgentName:
      description: |
        Returns only agents with the specified name. 
        This is an exact match only.
      type: string
      example: myagent-1234
    AgentTransferRequest:
      type: object
      properties:
        toAid:
          $ref: '#/components/schemas/AccountId'
      example:
        toAid: '1234'
    BulkAgentTransferRequest:
      type: object
      properties:
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/AgentTransfer'
    BulkAgentTransferResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AgentTransferStatus'
          example:
            - status: 200
              detail: Initiated
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d4-39fc53edccba
                fromAid: '1234'
                toAid: '12345'
            - status: 400
              detail: Missing from-account id
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d5-39fc53ed1234
                fromAid: xxx
                toAid: '12345'
            - status: 403
              detail: User does not have permission on 'to' aid
              request:
                agentId: 5d0764ac-7e42-4ec8-a0d5-39fc53ed7890
                fromAid: '1234'
                toAid: '12345'
    AgentTransfer:
      example:
        agentId: 5d0764ac-7e42-4ec8-a0d4-39fc53edccba
        fromAid: '1234'
        toAid: '12345'
      allOf:
        - type: object
          properties:
            agentId:
              $ref: '#/components/schemas/EndpointAgentId'
            fromAid:
              $ref: '#/components/schemas/AccountId'
            toAid:
              $ref: '#/components/schemas/AccountId'
    AgentTransferStatus:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            request:
              $ref: '#/components/schemas/AgentTransfer'
    AccountId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    AddressProfile:
      type: object
      description: A description of the IPs assigned to this machine.
      properties:
        addressType:
          $ref: '#/components/schemas/AddressType'
        ipAddress:
          type: string
          format: ip
          example: 2001:db8:3333:4444:5555:6666:7777:8888
          description: >-
            IP address of this interface in the network it's currently connected
            to.
        prefixLength:
          type: integer
          format: int32
          example: 24
          description: The number of bits representing the network part of the `ipAddress`.
        gateway:
          type: string
          format: ip
          example: 192.168.0.254
          description: The default gateway for this interface.
        routerHardwareAddress:
          type: string
          format: macaddress
          example: 5c:b1:3e:46:1c:84
          description: The router's MAC address resolved from an ARP request.
    AddressType:
      type: string
      example: unique-local
      enum:
        - loopback
        - unspecified
        - unique-local
        - link-local
        - unique-global
    EndpointAgentLocation:
      description: Approximate location of the agent.
      type: object
      properties:
        latitude:
          type: number
          format: double
          example: 51.51279
          readOnly: true
        longitude:
          type: number
          format: double
          example: -0.09184
          readOnly: true
        locationName:
          type: string
          example: London
          readOnly: true
    EndpointAsnDetails:
      required:
        - asNumber
      type: object
      readOnly: true
      properties:
        asNumber:
          type: integer
          format: int64
          example: 5089
          description: Autonomous system number.
        asName:
          type: string
          example: Virgin Media Limited
          description: Name of autonomous system.
    EndpointBrowserExtension:
      type: object
      properties:
        browser:
          $ref: '#/components/schemas/BrowserType'
        profile:
          type: string
          description: Name of the browser profile where this extension is stored.
          example: Profile 1
        version:
          type: string
          description: Endpoint agent browser extension version.
          example: 0.123.0
        enabled:
          type: boolean
          description: >-
            Indicates if the extension is disabled or enabled in the web
            browser.
        active:
          type: boolean
          description: >
            Flag indicating if there is communication between the extension and
            ThousandEyes portal.
        error:
          type: string
          description: Contains any errors encountered while getting extension status.
          example: ''
    EndpointClient:
      description: Information about the user who has the agent installed.
      type: object
      properties:
        userProfile:
          $ref: '#/components/schemas/EndpointUserProfile'
        browserExtensions:
          type: array
          items:
            $ref: '#/components/schemas/EndpointBrowserExtension'
    EndpointUserProfile:
      required:
        - userName
      type: object
      properties:
        userName:
          type: string
          example: joeblogs32
        userPrincipalName:
          type: string
          example: joeblogs32@c.com
    EndpointVpnProfile:
      required:
        - vpnClientAddresses
        - vpnClientNetworkRange
      type: object
      properties:
        interfaceName:
          type: string
          description: Interface name associated with `interfaceProfile`.
        vpnType:
          $ref: '#/components/schemas/VpnType'
        vpnGatewayAddress:
          type: string
          description: IP address of the VPN gateway.
        vpnClientAddresses:
          type: array
          description: >-
            List of private IP addresses assigned to the device, by the VPN
            server.
          example:
            - 10.100.0.10
          items:
            type: string
            format: ip
        vpnClientNetworkRange:
          type: array
          description: List of private networks assigned to the device, by the VPN server.
          example:
            - 10.100.0.0/22
          items:
            type: string
    EndpointAgentEthernetProfile:
      type: object
      description: |
        Information about the ethernet connectivity of this device.
        Only present if the hardware type is `ethernet`.
      properties:
        linkSpeed:
          type: integer
          description: Link speed in Mbps.
          format: int32
    ExternalMetadata:
      type: array
      items:
        $ref: '#/components/schemas/ExternalMetadataItem'
      description: >
        List of external metadata assigned to the endpoint agent. 

        Visible only if the `expandAgent=externalMetadata` query parameter is
        included.
    ExternalMetadataItem:
      properties:
        key:
          type: string
          example: anyConnectDeviceId
          description: >-
            ID of the device that has the Cisco Secure Client deployed with the
            Internet Security module.
        value:
          type: string
          example: DF434343D
          description: Value of the external metadata property.
      example:
        key: anyConnectDeviceId
        value: DF434343D
    InterfaceProfile:
      type: object
      properties:
        interfaceName:
          type: string
          example: en0
        addressProfiles:
          type: array
          items:
            $ref: '#/components/schemas/AddressProfile'
        hardwareType:
          $ref: '#/components/schemas/InterfaceHardwareType'
        ethernetProfile:
          $ref: '#/components/schemas/EndpointAgentEthernetProfile'
        wirelessProfile:
          $ref: '#/components/schemas/WirelessProfile'
    EndpointAgent:
      description: The `EndpointAgent` object, which may include multiple clients.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/EndpointAgentId'
        aid:
          allOf:
            - $ref: '#/components/schemas/AccountId'
            - readOnly: true
        name:
          description: The name of the agent.
          type: string
          readOnly: false
          example: Office Printer
        computerName:
          type: string
          example: DESKJET-123
          readOnly: true
        osVersion:
          type: string
          example: Version 10.15.2 (Build 19C57)
          readOnly: true
        platform:
          $ref: '#/components/schemas/Platform'
        kernelVersion:
          type: string
          example: Darwin 19.2.0
          readOnly: true
        manufacturer:
          type: string
          example: Apple, Inc.
          readOnly: true
        model:
          type: string
          example: MacBookAir7,2
          readOnly: true
        lastSeen:
          description: The last time the agent checked-in.
          type: string
          format: date-time
          example: '2022-05-26T23:37:16Z'
          readOnly: true
        status:
          $ref: '#/components/schemas/Status'
        deleted:
          type: boolean
          readOnly: true
        version:
          description: Version of the agent software running.
          type: string
          example: 0.123.4
          readOnly: true
        targetVersion:
          description: >-
            The latest available version of the agent. This field is populated
            only if expand includes `targetVersion`.
          type: string
          example: 0.123.4
          readOnly: true
        createdAt:
          type: string
          format: date-time
          example: '2022-05-26T23:37:16Z'
          readOnly: true
        numberOfClients:
          type: integer
          format: int64
          example: 3
          readOnly: true
        publicIP:
          type: string
          format: ip
          example: 88.45.2.123
          readOnly: true
        location:
          $ref: '#/components/schemas/EndpointAgentLocation'
        clients:
          type: array
          readOnly: true
          description: |
            List of clients (user accounts) that the agent works with.
            Not populated by default.
          items:
            $ref: '#/components/schemas/EndpointClient'
        totalMemory:
          type: string
          example: 16384 MB
          readOnly: true
        agentType:
          type: string
          example: endpoint
          readOnly: true
        vpnProfiles:
          type: array
          readOnly: true
          description: |
            List of VPN connections on the agent.
            Not populated by default.
          items:
            $ref: '#/components/schemas/EndpointVpnProfile'
        externalMetadata:
          $ref: '#/components/schemas/ExternalMetadata'
        networkInterfaceProfiles:
          description: |
            List of network interfaces on the agent.
            Not populated by default.
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/InterfaceProfile'
        asnDetails:
          $ref: '#/components/schemas/EndpointAsnDetails'
        licenseType:
          $ref: '#/components/schemas/AgentLicenseType'
        tcpDriverAvailable:
          type: boolean
          readOnly: true
          description: Status of TCP test support on the agent.
        npcapVersion:
          type: string
          readOnly: true
          description: >-
            For Windows agents, the version of the NPCAP driver that the agent
            has loaded.
        _links:
          $ref: '#/components/schemas/SelfLinks'
    Status:
      description: >-
        Status of the endpoint agent in ThousandEyes. Disabled agents don't
        report data.
      type: string
      example: enabled
      enum:
        - enabled
        - disabled
      readOnly: true
    EndpointAgentUpdate:
      description: The `EndpointAgentUpdate` object contains supported fields for updates.
      type: object
      properties:
        name:
          description: New agent name.
          type: string
          example: Office Printer
        licenseType:
          $ref: '#/components/schemas/AgentLicenseType'
    WirelessProfile:
      type: object
      properties:
        bssid:
          type: string
          format: macaddress
          example: 00:11:22:aa:bb:cc
        ssid:
          type: string
          example: GuestWiFi
        rssi:
          type: integer
          format: int32
          example: -36
        channel:
          type: integer
          format: int32
          example: 48
        phyMode:
          type: string
          example: 802.11ac
    BrowserType:
      type: string
      example: edge
      enum:
        - chrome
        - chrome-canary
        - chromium
        - ie
        - edge
        - unknown
    AgentLicenseType:
      type: string
      example: essentials
      enum:
        - essentials
        - advantage
        - embedded
    ConnectionString:
      type: object
      properties:
        connectionString:
          type: string
          description: >
            The connection string is used for some integrations and other client
            types.
          example: D2xZSLlqo64Xe2EnYisklA==
        _links:
          $ref: '#/components/schemas/SelfLinks'
    EndpointAgentId:
      type: string
      format: uuid
      description: Unique ID of endpoint agent, from `/endpoint/agents` endpoint.
      example: 861b7557-cd57-4bbb-b648-00bddf88ef49
      readOnly: true
    Platform:
      description: OS platform types. Platform "linux" was recently renamed to "roomos".
      type: string
      enum:
        - windows
        - roomos
        - phoneos
        - elux
        - linux
        - mac
        - android
        - unknown
      example: mac
    VpnType:
      type: string
      description: Name of the VPN provider.
      enum:
        - cisco-anyconnect
        - palo-alto-globalprotect
        - ivanti-connect-secure
        - zscaler-internet-access
        - f5-big-ip
      example: cisco-anyconnect
    InterfaceHardwareType:
      type: string
      example: wireless
      enum:
        - unknown
        - wireless
        - ethernet
        - modem
        - virtual
        - loopback
        - other
    PaginationNextAndSelfLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Link'
        self:
          $ref: '#/components/schemas/Link'
    ThresholdFilterOperator:
      type: string
      enum:
        - gte
        - lte
      example: gte
    ConditionalOperator:
      type: string
      enum:
        - and
        - or
      example: and
    SortOrder:
      type: string
      example: desc
      description: >-
        Parameter indicates the ascending/descending  order of the sorting,
        using either the asc or desc values.
      enum:
        - asc
        - desc
    PaginationNextLink:
      type: object
      description: A links object containing a related link for forward pagination.
      properties:
        next:
          $ref: '#/components/schemas/Link'
    EndpointTestAgentSelectorType:
      type: string
      enum:
        - all-agents
        - specific-agents
        - agent-labels
      description: >-
        Retrieve either all available agents, a specific list of agents, or a
        list of agent labels.
      default: all-agents
      example: all-agents
    EndpointTestAgents:
      type: array
      description: >-
        List of endpoint agent IDs (obtained from `/endpoint/agents` endpoint).
        Required when `agentSelectorType` is set to `specific-agent`.
      items:
        type: string
        format: uuid
      example:
        - 0a3b9998-dc3a-4ff2-b50d-ac4a7cd986e1
        - 66eec0f1-72b4-4755-aa83-3aed61d17f3c
    EndpointAgentLabels:
      type: array
      description: >-
        List of endpoint agent label IDs (obtained from `/endpoint/labels`
        endpoint), required when `agentSelectorType` is set to `agent-labels`.
      items:
        type: string
      example:
        - '567'
        - '214'
    EndpointTestMaxMachines:
      type: integer
      description: Maximum number of agents which can execute the test.
      default: 25
      example: 25
    TestName:
      type: string
      description: Name of the test.
      example: Test name
    EndpointInstantTest:
      type: object
      required:
        - testName
      properties:
        agentSelectorType:
          $ref: '#/components/schemas/EndpointTestAgentSelectorType'
        agents:
          $ref: '#/components/schemas/EndpointTestAgents'
        endpointAgentLabels:
          $ref: '#/components/schemas/EndpointAgentLabels'
        maxMachines:
          $ref: '#/components/schemas/EndpointTestMaxMachines'
        testName:
          $ref: '#/components/schemas/TestName'
    EndpointTestPort:
      type: integer
      description: Port number.
      default: 443
      example: 443
    EndpointAgentToServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/EndpointInstantTest'
        - type: object
          required:
            - server
          properties:
            serverName:
              type: string
              deprecated: true
              description: >-
                A server address without a protocol or IP address. **Deprecated,
                use `server` instead**.
              example: www.example.com
            server:
              type: string
              description: Target domain name or IP address.
              example: www.example.com
            port:
              $ref: '#/components/schemas/EndpointTestPort'
    EndpointTestSelfLink:
      allOf:
        - description: A reference to the test.
          example:
            href: >-
              https://api.thousandeyes.com/v7/endpoint/tests/{type}/281474976710706
        - $ref: '#/components/schemas/Link'
    ScheduledTestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Link'
      example:
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/network/filter
        - href: >-
            https://api.thousandeyes.com/v7/endpoint/test-results/scheduled-tests/281474976710706/pathvis
    EndpointTestLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/EndpointTestSelfLink'
        testResults:
          $ref: '#/components/schemas/ScheduledTestResults'
      readOnly: true
    EndpointAllAgentsSelectorConfig:
      type: object
      description: Any agent selection object.
      readOnly: true
      properties:
        agentSelectorType:
          example: all-agents
          pattern: ^all-agents$
          type: string
        maxMachines:
          $ref: '#/components/schemas/EndpointTestMaxMachines'
      required:
        - agentSelectorType
    EndpointSpecificAgentsSelectorConfig:
      type: object
      description: Specific agents selection object.
      readOnly: true
      properties:
        agentSelectorType:
          type: string
          pattern: ^specific-agents$
          example: specific-agents
        maxMachines:
          $ref: '#/components/schemas/EndpointTestMaxMachines'
        agents:
          $ref: '#/components/schemas/EndpointTestAgents'
      required:
        - agentSelectorType
    EndpointAgentLabelsSelectorConfig:
      type: object
      description: Agent labels selection object.
      readOnly: true
      properties:
        agentSelectorType:
          example: agent-labels
          pattern: ^agent-labels$
          type: string
        maxMachines:
          $ref: '#/components/schemas/EndpointTestMaxMachines'
        endpointAgentLabels:
          $ref: '#/components/schemas/EndpointAgentLabels'
      required:
        - agentSelectorType
    EndpointAgentSelectorConfig:
      type: object
      description: Agents selection object based on agentSelectorType.
      readOnly: true
      oneOf:
        - $ref: '#/components/schemas/EndpointAllAgentsSelectorConfig'
        - $ref: '#/components/schemas/EndpointAgentLabelsSelectorConfig'
        - $ref: '#/components/schemas/EndpointSpecificAgentsSelectorConfig'
      discriminator:
        propertyName: agentSelectorType
        mapping:
          all-agents: '#/components/schemas/EndpointAllAgentsSelectorConfig'
          specific-agents: '#/components/schemas/EndpointSpecificAgentsSelectorConfig'
          agent-labels: '#/components/schemas/EndpointAgentLabelsSelectorConfig'
      required:
        - agentSelectorType
    TestIsPrioritized:
      type: boolean
      description: >-
        Indicates whether the test should be prioritized when the number of
        tests assigned to an agent exceeds the license limit.
      default: false
      example: false
    TestIsEnabled:
      type: boolean
      description: Indicates if test is enabled.
      example: true
      default: true
    TestIsSavedEvent:
      type: boolean
      description: >
        Indicates if the test is a saved event.


        **Note**: **Saved Events** are now called **Private Snapshots** in the
        user interface. This change does not affect API.
      example: false
      readOnly: true
    TestHasPathTraceInSession:
      type: boolean
      description: >-
        Enables "in session" path trace. When enabled, this option initiates a
        TCP session with the target server and sends path trace packets within
        the established TCP session.
      example: true
    TestLabel:
      type: object
      properties:
        labelId:
          type: string
          description: Label ID.
        name:
          type: string
          description: Name of the label.
        isBuiltin:
          type: boolean
          description: >-
            Value indicating if the label in question is BuiltIn (Account Admin,
            Organization Admin, Regular User).
      example:
        labelId: '961'
        name: Artem label
        isBuiltin: false
    TestLabels:
      type: array
      description: >-
        Labels to which the test is assigned. This field is not returned for
        Instant Tests.
      readOnly: true
      items:
        $ref: '#/components/schemas/TestLabel'
    TestNetworkMeasurements:
      type: boolean
      description: >-
        Enable or disable network measurements. Set to true to enable or false
        to disable network measurements.
      default: true
      example: true
    EndpointTestProtocol:
      type: string
      enum:
        - icmp
        - icmp-with-tcp-connect
        - tcp
        - prefer-tcp
        - ast-autodetect
        - autodetect
      description: Protocol requested for the test.
      default: icmp
      example: icmp
    EndpointIpVersionTemplate:
      description: IP version the test should use for network tests.
      type: string
      enum:
        - V4_ONLY
        - V6_ONLY
        - V6_PREFER
        - OS_DEFAULT
      example: V4_ONLY
    EndpointScheduledTestType:
      type: string
      enum:
        - agent-to-server
        - http-server
      description: Type of test being queried.
      example: agent-to-server
      readOnly: true
    TestProbeModeResponse:
      type: string
      enum:
        - auto
        - sack
        - syn
        - unknown
      description: >-
        Probe mode used by network test, only valid when the protocol is set to
        TCP.
      default: auto
      example: auto
    EndpointTest:
      type: object
      required:
        - type
      properties:
        aid:
          $ref: '#/components/schemas/AccountGroupId'
        _links:
          $ref: '#/components/schemas/EndpointTestLinks'
        agentSelectorConfig:
          $ref: '#/components/schemas/EndpointAgentSelectorConfig'
        createdDate:
          $ref: '#/components/schemas/TestCreatedDate'
        isPrioritized:
          $ref: '#/components/schemas/TestIsPrioritized'
        interval:
          $ref: '#/components/schemas/TestInterval'
        isEnabled:
          $ref: '#/components/schemas/TestIsEnabled'
        isSavedEvent:
          $ref: '#/components/schemas/TestIsSavedEvent'
        hasPathTraceInSession:
          $ref: '#/components/schemas/TestHasPathTraceInSession'
        labels:
          $ref: '#/components/schemas/TestLabels'
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        protocol:
          $ref: '#/components/schemas/EndpointTestProtocol'
        ipVersion:
          $ref: '#/components/schemas/EndpointIpVersionTemplate'
        server:
          type: string
          description: Target domain name or IP address.
          example: www.example.com
        testId:
          type: string
          description: >-
            Each test is assigned a unique ID to access test data from other
            endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          $ref: '#/components/schemas/TestName'
        type:
          $ref: '#/components/schemas/EndpointScheduledTestType'
        tcpProbeMode:
          readOnly: true
          anyOf:
            - $ref: '#/components/schemas/TestProbeModeResponse'
        port:
          $ref: '#/components/schemas/EndpointTestPort'
    EndpointAgentToServerType:
      type: string
      description: Type of test being queried.
      example: agent-to-server
      pattern: ^agent-to-server$
      readOnly: true
    EndpointAgentToServerTest:
      allOf:
        - $ref: '#/components/schemas/EndpointTest'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/EndpointAgentToServerType'
    EndpointTestAuthType:
      type: string
      description: HTTP authentication type.
      enum:
        - none
        - basic
        - ntlm
      default: none
      example: none
    TestUsername:
      type: string
      description: Username for Basic/NTLM authentication.
      example: username
    TestSslVersionId:
      type: string
      description: |
        SSL version options:

        * Use '0' for automatic selection.
        * Use '3' for SSLv3.
        * Use '4' for TLS v1.0.
        * Use '5' for TLS v1.1.
        * Use '6' for TLS v1.2.
        * Use '7' for TLS v1.3.
      enum:
        - '0'
        - '3'
        - '4'
        - '5'
        - '6'
        - '7'
      default: '0'
      example: '0'
    EndpointTestResultUrl:
      type: string
      description: The test target URL.
      example: https://example.com:443
    EndpointHttpServerBaseTest:
      type: object
      properties:
        authType:
          $ref: '#/components/schemas/EndpointTestAuthType'
        hasPathTraceInSession:
          $ref: '#/components/schemas/TestHasPathTraceInSession'
        httpTimeLimit:
          type: integer
          description: >-
            Maximum amount of time in milliseconds the agents wait before a
            request times out.
          default: 5000
          example: 5000
        protocol:
          $ref: '#/components/schemas/EndpointTestProtocol'
        username:
          $ref: '#/components/schemas/TestUsername'
        sslVersionId:
          $ref: '#/components/schemas/TestSslVersionId'
        tcpProbeMode:
          readOnly: true
          anyOf:
            - $ref: '#/components/schemas/TestProbeModeResponse'
        verifyCertificate:
          type: boolean
          description: Flag indicating if a certificate should be verified.
          default: true
          example: true
        url:
          $ref: '#/components/schemas/EndpointTestResultUrl'
    TestRequestHasPing:
      type: boolean
      description: Optional flag indicating if the test should run ping.
      default: true
      deprecated: true
      example: true
    TestRequestHasTraceRoute:
      type: boolean
      description: Optional flag indicating if the test should run traceroute.
      default: true
      deprecated: true
      example: true
    TestPassword:
      type: string
      description: Password for Basic/NTLM authentication.
      example: password
      writeOnly: true
    EndpointHttpServerTestUrl:
      type: string
      description: >
        The test target URL. You can optionally specify the protocol (`http` or
        `https`). 


        - **Default Protocol:** If no protocol is specified, `https` is used by
        default.


        - **Port Number:** To specify a port, append it to the URL with a colon
        after the hostname or IP address (e.g., `https://example.com:443`).

            - If no port is specified in the URL, the `port` is determined by the default for protocol (HTTP: 80, HTTPS: 443).
      example: https://example.com:443
    EndpointHttpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/EndpointInstantTest'
        - $ref: '#/components/schemas/EndpointHttpServerBaseTest'
        - type: object
          required:
            - url
          properties:
            hasPing:
              $ref: '#/components/schemas/TestRequestHasPing'
            hasTraceroute:
              $ref: '#/components/schemas/TestRequestHasTraceRoute'
            networkMeasurements:
              $ref: '#/components/schemas/TestNetworkMeasurements'
            targetResponseTime:
              type: integer
              description: >-
                Response time target in milliseconds. Affects the colors of
                agents and legends on the view page. The value is compared with
                actual response time in order to determine the color scale (from
                green to red).
              default: 1000
              example: 1000
            password:
              $ref: '#/components/schemas/TestPassword'
            url:
              $ref: '#/components/schemas/EndpointHttpServerTestUrl'
    EndpointHttpServerType:
      type: string
      description: Type of test being queried.
      example: http-server
      pattern: ^http-server$
      readOnly: true
    TestFollowRedirects:
      type: boolean
      description: >-
        To disable following HTTP/301 or HTTP/302 redirect directives, set this
        parameter to `false`.
      default: true
      example: true
    TestHttpTargetTime:
      type: integer
      minimum: 100
      maximum: 5000
      description: Target time for HTTP server completion, specified in milliseconds.
      example: 100
    TestHttpVersion:
      type: integer
      minimum: 1
      maximum: 2
      description: >-
        HTTP protocol version. Set to '2' to prefer HTTP/2, or '1' to use only
        HTTP/1.1.
      default: 2
      example: 2
    TestSslVersion:
      type: string
      description: Reflects the verbose SSL protocol version used by a test.
      readOnly: true
      example: Auto
    TestUseNtlm:
      type: boolean
      description: >-
        Set to true to use NTLM, false to use Basic Authentication. Requires
        username and password to be set.
      example: false
    EndpointHttpServerTest:
      allOf:
        - $ref: '#/components/schemas/EndpointTest'
        - $ref: '#/components/schemas/EndpointHttpServerBaseTest'
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/EndpointHttpServerType'
            followRedirects:
              $ref: '#/components/schemas/TestFollowRedirects'
            httpTargetTime:
              $ref: '#/components/schemas/TestHttpTargetTime'
            httpVersion:
              $ref: '#/components/schemas/TestHttpVersion'
            isPrioritized:
              $ref: '#/components/schemas/TestIsPrioritized'
            interval:
              $ref: '#/components/schemas/TestInterval'
            sslVersion:
              $ref: '#/components/schemas/TestSslVersion'
            useNtlm:
              $ref: '#/components/schemas/TestUseNtlm'
    EndpointRunScheduledInstantTestResult:
      type: object
      properties:
        message:
          type: string
          example: Successfully reran the instant scheduled test with testId=765231567
    ExpandLabelOptions:
      type: string
      enum:
        - filters
    LabelId:
      type: string
      readOnly: true
      description: Label identifier.
      example: abc-123-def
    Labels:
      description: A list of Labels.
      type: object
      properties:
        labels:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/LabelResponse'
        _links:
          $ref: '#/components/schemas/PaginationNextAndSelfLink'
    Label:
      description: A label definition.
      type: object
      properties:
        id:
          $ref: '#/components/schemas/LabelId'
        name:
          description: The label name.
          type: string
          readOnly: false
          example: Head office meeting rooms
        color:
          description: UI color
          type: string
          readOnly: false
          example: '#ff3333'
        matchType:
          $ref: '#/components/schemas/MatchType'
        filters:
          description: >-
            The filters combined using the matchType to determine the label's
            match.
          type: array
          readOnly: false
          items:
            $ref: '#/components/schemas/Filter'
    LabelResponse:
      allOf:
        - $ref: '#/components/schemas/Label'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    LabelRequest:
      allOf:
        - required:
            - name
            - matchType
            - filters
        - $ref: '#/components/schemas/Label'
    MatchType:
      description: |
        Specifies how the filters are combined for matching this label.

        * `and`: All filters must be matched.
        * `or`: Any of the filters should match.
      type: string
      readOnly: false
      enum:
        - and
        - or
      example: and
    Filter:
      type: object
      properties:
        key:
          $ref: '#/components/schemas/FilterType'
        values:
          type: array
          example:
            - 10.1.1.0/24
            - 192.168.1.0/24
          items:
            type: string
            description: >
              Value depends on the key, and may change in the future.


              * `agent-id`: The agent identifiers.

              * `gateway`: The gateway IP to match.

              * `ssid`: A wildcard match on the SSID. Supports `*` for any
              characters and `?` for any single character.

              * `user-name`: A wildcard match on the users that use the agent.
              Supports `*` for any characters and `?` for any single character.

              * `hostname`: A wildcard match on the host name - supports `*` for
              any characters

              and `?` for any single character

              * `bssid`: BSSID for the wifi, lower case, with colons.

              * `platform`: Currently supports `Mac`, `Windows`, and `Linux`.

              * `asn`: Integer AS Number.

              * `public-network`: Network for agent's public IP in CIDR format,
              or IP for single IP. e.g. `192.45.32.0/22`.

              * `local-network`: Network for agent's local IP in CIDR format, or
              IP for single IP. e.g. `10.100.64.0/20`.

              * `connection`: Type of connection `Ethernet` or `Wireless`.

              * `agent-type`: Type of agent `endpoint`, `endpoint-pulse` or
              `endpoint-csc`.

              * `ip-address-family`: `ipv4` or `ipv6`.

              * `vpn-vendor`: Vendor of the VPN software. 
                  Examples include: 
                  
                  * `cisco-anyconnect`
                  * `palo-alto-globalprotect`
                  * `ivanti-connect-secure`
                  * `zscaler-internet-access`
                  * `f5-big-ip`
              * `vpn-gateway-address`: Server-side VPN connection IP address.

              * `vpn-client-network`: Network for the VPN client IP in CIDR
              format. For example, `10.100.32.128/25`.

              * `vpn-client-address`: The VPN client IP. For example,
              `10.100.32.165`.
            example: 10.1.1.0/24
        mode:
          $ref: '#/components/schemas/LabelFilterMode'
    FilterType:
      type: string
      description: Type of filter - the data that will be used to filter.
      example: vpn-client-network
      enum:
        - agent-id
        - public-network
        - local-network
        - connection
        - gateway
        - platform
        - agent-type
        - vpn-vendor
        - vpn-gateway-address
        - vpn-client-network
        - vpn-client-address
        - ip-address-family
        - ssid
        - bssid
        - hostname
        - username
        - asn
    LabelFilterMode:
      type: string
      description: >
        Type of matching to be applied for the values:


        * `in`: The value on the agent must match one of the list of values
        provided.

        * `not-in`: The value on the agent must not match any of the list of
        values provided.
      enum:
        - in
        - not-in
    TestId:
      type: string
      description: Unique ID of endpoint test.
      example: '584739201'
      readOnly: true
    RoundId:
      type: integer
      description: Epoch time (seconds) indicating the start time of the round.
      example: 1384309800
      readOnly: true
    EndpointTestsDataRoundsSearch:
      type: object
      properties:
        searchSort:
          type: array
          items:
            $ref: '#/components/schemas/EndpointTestsDataSearchSort'
        thresholdFilter:
          $ref: '#/components/schemas/EndpointTestsDataThresholdFilters'
        searchFilters:
          $ref: '#/components/schemas/EndpointTestsDataSearchFilter'
    MultiTestIdEndpointTestsDataRoundsSearch:
      type: object
      properties:
        searchSort:
          type: array
          items:
            $ref: '#/components/schemas/EndpointTestsDataSearchSort'
        thresholdFilter:
