        - BearerAuth: []
  /usage/units/enterprise-agents:
    get:
      tags:
        - Usage
      summary: Get enterprise agent usage
      operationId: getEnterpriseAgentsUnitsUsage
      description: >-
        This operation returns the organization's enterprise agents usage for a
        specific time period, or the curent billing cycle if no time period is
        specified.

        In the `/v7/usage` API, a shared enterprise agent's usage is reported in
        the account group where the agent was created (i.e Primary Account
        Group).  However in this API, the shared agent's usage is distributed
        among all the account groups where the tests are running on the
        particular agent. This API is also only available to customers on usage
        based pricing model.
      parameters:
        - $ref: '#/components/parameters/StartDateParameter'
        - $ref: '#/components/parameters/EndDateParameter'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
