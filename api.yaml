          example: '1234'
        accountGroupName:
          description: Name of the account group which owns the endpoint agents essentials.
          type: string
          example: Account A
        endpointAgentsEssentialsUsed:
          type: integer
          format: int64
          description: >-
            Number of endpoint agents essentials owned by the specific account
            group in the usage period.
    EndpointAgentsEmbedded:
      type: object
      properties:
        aid:
          description: >-
            Unique identifier of the account group that owns the embedded
            endpoint agents.
          type: string
          example: '1234'
        accountGroupName:
          description: Name of the account group that owns the embedded endpoint agents.
          type: string
          example: Account A
        endpointAgentsEmbeddedUsed:
          type: integer
          format: int64
          description: >-
            Number of endpoint agents embedded owned by the specific account
            group in the usage period.
    QuotasAssignRequest:
