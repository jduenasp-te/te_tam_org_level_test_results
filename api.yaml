  responses:
    '204':
      description: No content
    '400':
      description: Bad Request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationError'
          example:
            type: about:blank
            title: Request validation failed. There are invalid or missing fields
            status: 400
            detail: Your request object contains invalid fields.
            instance: /v7
            errors:
              - code: AM-5432
                field: firstName
                message: firstName cannot have fancy characters
              - code: DASH-5622
                field: password
                message: Password cannot be blank
    '401':
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/UnauthorizedError'
    '403':
      description: Insufficient permissions to query endpoint
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    '404':
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: about:blank
            title: URI Resource Not Found
            status: 404
            detail: >-
              Details explaining if the 404 error is related to an invalid URI
              or a wrong ID
            instance: /v7
    '429':
      description: Exhausted rate limit for the organization
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    '500':
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            type: about:blank
            title: Internal server error
            status: 500
            detail: Optional detail about the internal error message.
            instance: /v7
    '502':
      description: Bad Gateway
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    GeneralError:
      description: An error occurred
    SingleAgent:
      description: The agent's current state.
      content:
        application/hal+json:
          schema:
            $ref: '#/components/schemas/EndpointAgent'
  headers:
    Location:
      schema:
        type: string
        format: uri
        example: https://api.thousandeyes.com/v7/link/to/resource/id
      description: The absolute path to created resource.
    DashboardSnapshotRateLimit:
      schema:
        type: integer
        example: 100
      description: >-
        The maximum number of dashboard snapshot requests allowed within a
        specified time frame. The limit is 100 requests per hour.
    DashboardSnapshotRateLimitRemaining:
      schema:
        type: integer
        example: 45
      description: >-
        The number of remaining dashboard snapshot requests that can be made
        within the current time frame. This value indicates how many of the
        allowed 100 requests per hour are still available.
    DashboardSnapshotRateLimitReset:
      schema:
        type: integer
        example: 160
      description: >-
        The amount of time remaining until the rate limit resets and the full
        quota of requests is available again. If the value is 0, it means the
        rate limit currently allows access.
  requestBodies:
    AgentSearch:
      description: The filter options for advanced search filtering for agents.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentSearchRequest'
    AgentTransfer:
      description: The request to move an agent between accounts.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AgentTransferRequest'
    AgentTransfers:
      description: A collection of `AgentTransfers`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BulkAgentTransferRequest'
        text/csv:
          schema:
            type: string
          examples:
            CSV File:
              $ref: '#/components/examples/TransferCSV'
        text/plain:
          schema:
            type: string
          examples:
            CSV File:
              $ref: '#/components/examples/TransferCSV'
    assignRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TagAssignment'
    bulkAssignRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BulkTagAssignments'
  examples:
    TransferCSV:
      value: |
        agent_id,from_aid,to_aid
        5d0764ac-7e42-4ec8-a0d4-39fc53edccba,111,222
        1234abcd-7e42-4ec8-a0d4-39fc53abcdef,222,333
