            type: string
            example: ca39314d-eb4f-496f-9435-b5d20b1bfbff
        _links:
          $ref: '#/components/schemas/SelfLinks'
      description: A list of assigned items.
    Header:
      required:
        - name
        - value
      type: object
      properties:
        name:
          type: string
          example: Content-Type
        value:
          type: string
          example: application/json
    OperationCategory:
      type: string
      enum:
        - alerts
        - recommendations
        - traffic-monitoring
    OperationStatus:
      type: string
      enum:
        - pending
        - connected
        - failing
        - unverified
    OperationType:
      type: string
      enum:
        - webhook
    WebhookOperation:
      required:
        - category
        - name
        - status
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: cb1b8033-ea2d-4e9b-a920-fe87850693cf
        name:
          type: string
          example: My operation
        enabled:
          type: boolean
        category:
          $ref: '#/components/schemas/OperationCategory'
        status:
          $ref: '#/components/schemas/OperationStatus'
        path:
          type: string
          example: /custom/path
        payload:
          type: string
          description: Handlebars template for the payload.
          example: '{"property1": {{numericVar}}, "property2": "{{stringVar}}"}'
        headers:
          type: array
          example:
            - name: Content-Type
              value: application/json
          items:
            $ref: '#/components/schemas/Header'
        queryParams:
          type: string
          description: >-
            Handlebars template for the query params. Most compile into a proper
            JSON object where each object property will define the query param
            name and the object property value define the corresponding query
            param value.
          example: '{"queryParam1":"{{stringVar}}"}'
        type:
          $ref: '#/components/schemas/OperationType'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    AuthenticationType:
      type: string
      enum:
        - basic
        - bearer-token
        - oauth-auth-code
        - oauth-client-credentials
        - other-token
    BasicAuthentication:
      required:
        - password
        - type
        - username
      type: object
      properties:
        username:
          type: string
          example: user1
        password:
          type: string
          example: abc123
        type:
          $ref: '#/components/schemas/AuthenticationType'
    BearerTokenAuthentication:
      required:
        - token
        - type
      type: object
      properties:
        token:
          type: string
        type:
          $ref: '#/components/schemas/AuthenticationType'
    ConnectorType:
      type: string
      enum:
        - generic
    GenericConnector:
      required:
        - name
        - target
        - type
      type: object
      properties:
        id:
          type: string
          readOnly: true
          example: cb1b8033-ea2d-4e9b-a920-fe87850693cf
        type:
          $ref: '#/components/schemas/ConnectorType'
        name:
          type: string
          example: Cisco Slack
        target:
          type: string
          example: https://hooks.slack.com/services/abc/xyz
        authentication:
          $ref: '#/components/schemas/GenericConnectorAuth'
        lastModifiedDate:
          type: string
          description: The date when the connector was last modified.
          format: date-time
          readOnly: true
          example: '2023-10-01T12:00:00Z'
        headers:
          type: array
          items:
            $ref: '#/components/schemas/Header'
    GenericConnectorAuth:
      type: object
      discriminator:
        propertyName: type
        mapping:
          basic: '#/components/schemas/BasicAuthentication'
          bearer: '#/components/schemas/BearerTokenAuthentication'
          other: '#/components/schemas/OtherTokenAuthentication'
          oauth_code: '#/components/schemas/OauthCodeAuthentication'
          oauth_client_credentials: '#/components/schemas/OauthClientCredentialsAuthentication'
      oneOf:
        - $ref: '#/components/schemas/BasicAuthentication'
        - $ref: '#/components/schemas/BearerTokenAuthentication'
        - $ref: '#/components/schemas/OtherTokenAuthentication'
        - $ref: '#/components/schemas/OauthCodeAuthentication'
        - $ref: '#/components/schemas/OauthClientCredentialsAuthentication'
    OauthClientCredentialsAuthentication:
      required:
        - oauthClientId
        - oauthClientSecret
        - oauthTokenUrl
        - type
      type: object
      properties:
        token:
          type: string
        oauthClientId:
          type: string
        oauthTokenUrl:
          type: string
        oauthClientSecret:
          type: string
        type:
          $ref: '#/components/schemas/AuthenticationType'
    OauthCodeAuthentication:
      required:
        - code
        - oauthAuthUrl
        - oauthClientId
        - oauthClientSecret
        - oauthTokenUrl
        - redirectUri
        - type
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        oauthClientId:
          type: string
        oauthAuthUrl:
          type: string
        oauthTokenUrl:
          type: string
        oauthClientSecret:
          type: string
        code:
          type: string
        redirectUri:
          type: string
        type:
          $ref: '#/components/schemas/AuthenticationType'
    OtherTokenAuthentication:
      required:
        - token
        - type
      type: object
      properties:
        token:
          type: string
        type:
          $ref: '#/components/schemas/AuthenticationType'
    WebhookOperations:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WebhookOperation'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    GenericConnectors:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenericConnector'
        _links:
          $ref: '#/components/schemas/SelfLinks'
