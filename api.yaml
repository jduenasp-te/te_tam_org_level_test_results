      operationId: assignOrganizationsQuotas
      description: >-
        This operation recieves a list of organization quotas to create or
        update. If there's no specific `orgId` defined for a quota, it defaults
        to using the authenticated organization. To use this endpoint, you need
        the `Edit organization and account group quotas` permission, which is a
        management-level permission. This operation follows cumulative
        behavior––This means that the quotas are assigned to the specified
        organizations, and any previous assignments remain unchanged; no
        unassignments occur.
      requestBody:
        content:
          application/json:
            schema:
