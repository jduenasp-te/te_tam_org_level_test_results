            sourceIp:
              type: string
              description: IP address of source endpoint agent.
              example: 196.40.106.237
              readOnly: true
            sourcePrefix:
              type: string
              description: IP prefix of source endpoint agent.
              example: 196.40.96.0/20
              readOnly: true
    AsnDetails:
      type: object
