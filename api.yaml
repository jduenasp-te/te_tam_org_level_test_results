    CatalogId:
      type: string
      format: uuid
      description: The catalog provider ID.
      example: 85602a0a-54a7-4e97-946e-67492ef1fa26
    ProviderLocation:
      type: object
      properties:
        location:
          type: string
          description: The location covered by the Provider.
          example: San Jose, US
        interfacesCount:
          type: integer
          description: The number of interfaces covered by the Provider at this location.
          example: 5
    ProviderName:
      type: string
      description: The name of the catalog provider.
      example: Amazon Web Services
    ProviderType:
      type: string
      description: The type of catalog provider.
      example: IAAS
    Region:
      type: string
      description: The catalog provider region.
      example: North America
    DataType:
      type: string
      description: The type of data produced by the provider.
      example: Application
    OutageLocation:
      type: string
      description: The affected location.
      example: Chicago, Illinois, US
    HandlebarsExpression:
      description: >
        A valid Handlebars expression. Can reference user inputs, such as
        `{{name}}`, or fields of other assets defined in the template.

        * `{{userInputs.<key>}}` - resolves to the user provided value the
        `userInput` identified its key.

        * `{{name}}` - resolves to the name of the deployed template.

        * `{{<asset key>.<field>}}` - resolves to the value of a field of
        another asset defined in the template identified by the asset key and
        field name. 

        For example, set the `testIds` field of an `alertRule` by referencing
        the `testId` field of a `tests` asset.
          **Note**: Due to dependencies, assets can only reference fields of other assets based on the heiarchy below (i.e. labels cannot reference other assets in the template, tests can only reference labels, etc.)
          - Labels
          - Tests
          - Endpoint Tests
          - Tags
          - Alert Rules
          - Dashboard Filters
          - Dashboards
      type: string
      pattern: .*{{.*}}.*
      example: '{{userInputs.testName}}'
    NumberTemplate:
      anyOf:
        - type: number
        - $ref: '#/components/schemas/HandlebarsExpression'
    StringTemplate:
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    BooleanNumber:
      type: integer
      enum:
        - 0
        - 1
      example: 0
    Template:
      title: Template
      required:
        - name
      description: The template to create or update.
      type: object
      properties:
        name:
          type: string
          description: The name of the template.
          example: My Template
        description:
          type: string
          description: Text that describes the template.
          example: A description of My Template
        icon:
          $ref: '#/components/schemas/TemplateIcon'
        isBuiltIn:
          type: boolean
          description: >-
            Indicates whether the template is a built-in template. This field is
            read-only for normal users.
          example: false
        certificationLevel:
          description: >
            The certification level of the Template. Normal users may only
            create `user` templates.
          example: user
          $ref: '#/components/schemas/CertificationLevel'
        userInputs:
          description: >
            A map of <key, UserInput>. User Inputs are values that the user must
            fill in order for

            the Template to deploy. User Inputs are like variables that can be
            used for dynamically setting just

            about any field in the Template, including fields for Tests, Labels,
            Dashboards, and most other template assets.

            User Inputs are referenced using Handlebars template substitution
            notation. For example:


            `"testName": "{{userInputs.targetDomain}} - HTTP"`


            The [Handlebars
            Syntax](https://handlebarsjs.com/guide/builtin-helpers.html) also
            supports basic logic operations

            and iterators that allow creating powerful and flexible templates.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/UserInput'
          example:
            targetDomain:
              name: Target Domain
              description: >-
                Name of target domain that will be used for configuring tests in
                this template.
              type: string
            region:
              name: Cloud Region
              description: The available cloud regions to target.
              type: string
              allowedValues:
                - name: West
                  value: us-west-1
                - name: East
                  value: us-east-2
            agents:
              name: Source Agents
              description: The agents that will be used by the tests in this template.
              type: agents
        groupings:
          uniqueItems: true
          type: array
          description: >-
            An ordered list of groupings that organize template objects, such as
            user inputs or tests.
          example:
            - name: personalize
              title: Personalize your dashboard
              description: Allow you to personalize your dashboard
              type: user-input
              items:
                - dashboardTitle
                - dashboardDescription
                - dashboardFilterTitle
            - name: dns-test-group
              title: DNS Tests
              description: Grouped by DNS test type
              type: test
              items:
                - dnsTest-microsoft365
                - dnsTest-sharepoint
                - dnsTest-microsoftlogin
                - dnsTest-onedrive
                - dnsTest-outlook
          items:
            $ref: '#/components/schemas/TemplateGrouping'
        labels:
          type: object
          description: >-
            A map of <name, Label> objects. These are ThousandEyes Labels that
            will be created when the template is deployed.
          additionalProperties:
            $ref: '#/components/schemas/LabelConfigurationTemplate'
          example:
            myLabel:
              name: My Label
              tests:
                - testId: 123
          externalDocs:
            url: https://developer.cisco.com/docs/thousandeyes/v6/update-a-label
        tests:
          type: object
          description: >
            A map of <name, TestConfiguration> objects. These are the
            ThousandEyes CEA/Synthetic tests that will be created when the
            template is deployed.
          additionalProperties:
            $ref: '#/components/schemas/TestConfigurationTemplate'
          example:
            httpServerTest:
              testName: '{{name}} - HTTP Server'
              type: http-server
              groups:
                - groupId: '{{labels.webHealthDashLabel.groupId}}'
                - groupId: '{{labels.templateLabel.groupId}}'
              interval: '{{userInputs.interval}}'
              url: https://{{userInputs.domain}}
              agents: '{{userInputs.agents}}'
            networkTest:
              testName: '{{name}} - Network'
              type: agent-to-server
              server: '{{userInputs.domain}}'
              protocol: TCP
              port: '{{userInputs.port}}'
              groups:
                - groupId: '{{labels.webHealthDashLabel.groupId}}'
                - groupId: '{{labels.templateLabel.groupId}}'
              interval: '{{userInputs.interval}}'
              url: https://{{userInputs.domain}}
              agents: '{{userInputs.agents}}'
            dnsTest:
              testName: '{{name}} - DNS'
              type: dns-server
              domain: '{{userInputs.domain}} A'
              groups:
                - groupId: '{{labels.webHealthDashLabel.groupId}}'
                - groupId: '{{labels.templateLabel.groupId}}'
              interval: '{{userInputs.interval}}'
              dnsServers: '{{userInputs.dnsServers}}'
              agents: '{{userInputs.agents}}'
        endpointTests:
          type: object
          description: >
            A map of <name, EndpointTestConfiguration> objects. These are the
            Endpoint tests that will be created when the template is deployed.
            Field values support Handlebars template substitution.
          additionalProperties:
            $ref: '#/components/schemas/EndpointTestConfigTemplate'
          example:
            endpointTests:
              scheduledHttpTest:
                name: Scheduled HTTP Test
                testType: Http
                testCategory: SCHEDULED_TEST
                genericConfig:
                  interval: 3600
                networkConfig:
                  flagPing: true
                httpConfig:
                  url: https://{{userInputs.tenantName}}-my.sharepoint.com
                machineConfig:
                  monitoringSettingsType: ANY_AGENT
                  agentIds: '{{userInputs.endpointAgents}}'
        alertRules:
          type: object
          description: >
            A map of <key, AlertRuleConfigurationTemplate> objects. These are
            the set of Alert Rules that will be created when the template is
            deployed.
          additionalProperties:
            $ref: '#/components/schemas/AlertRuleConfigurationTemplate'
            description: >
              An Alert Rule object. Values can be templated with Handlebars
              notation. As such, the Alert Rule object is defined here as

              a set of key/value pairs. See external docs for schema details.
          example:
            httpAlert:
              alertType: HTTP Server
              ruleName: '{{userInputs.tenantName}} - Alert Rule'
              expression: ((totalTime >= 500 ms) && (responseTime >= 500 ms))
              roundsViolatingRequired: 1
              roundsViolatingOutOf: 1
              testIds:
                - '{{tests.pageLoadTest.testId}}'
        dashboards:
          description: >
            A map of <key, DashboardConfiguration> objects. These are the set of
            dashboards that will be created when the template is deployed.
            Dashboard fields support Handlebars notation.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DashboardConfigurationTemplate'
          example:
            myDashboard:
              title: My Dashboard
              widgets:
                - filters:
                    Test Labels: '[{{labels.templateLabel.groupId}}]'
                  type: 'Bar Chart: Stacked'
                  title: 'A Bar Chart: Stacked widget'
                  metricGroup: Web - HTTP Server
                  measure:
                    type: Median
                  metric: Response Time
                  axisGroupBy: Continents
                  dataSource: Cloud & Enterprise Agents
        dashboardFilters:
          type: object
          description: >-
            A map of <key, DashboardFilter> objects. These will be the dashboard
            filters created when the template is deployed.
          additionalProperties:
            $ref: '#/components/schemas/DashboardFilterConfigurationTemplate'
          example:
            netHealthDashboardFilter:
              name: '{{userInputs.dashboardFilterTitle}}'
              context:
                - dataSourceId: VIRTUAL_AGENT
                  filters:
                    - filterId: TEST_LABEL
                      metricIds:
                        - NET_LOSS
                        - NET_LATENCY
                        - NET_JITTER
                      values:
                        - '{{labels.testLabel.groupId}}'
        deploymentStrategy:
          description: >
            A map of <assetKey, DeploymentStrategy> values. The
            `deploymentStrategy` field defines how the system behaves when an
            asset (test, label, dashboard) defined in the template already
            exists.

            The `assetKey` identifies the asset that the deployment strategy
            will apply to.

            For tests, the system uses the test type and name to determine if a
            test already exists. For example, if a template contains an
            http-server test named `Test123` and an http-server test with the
            same name already exists, the system assumes that this test already
            exists. If the test had a different type (for example, page-load),
            then the system would not consider the test to already exist because
            the types are different.

            For Labels and Dashboards, the system uses only the name. (Note that
            current Templates only consider "test" Labels).

            Alert Rules do not currently support `deploymentStrategy`.

            Below are the possible deployment strategies and their behaviors:
              * `create` - The system will always attempt to create the asset. If an asset of the same name and type already exists, the system will generate an error. This behavior ensures that each asset created from a template is unique. This is the default behavior.
              * `update` - If an asset of the same type and name already exists, the existing asset is used instead of creating a new asset. If the configuration of the asset in the template is different from the existing one, the latest configuration is applied.
              * `ignore` - If an asset of the same type and name already exists, the existing asset is used instead of creating a new asset. If the configuration of the asset in the template is different from the existing one, the configuration of the existing asset is used and the configuration in the template is ignored.
            The `update` and `ignore` strategies essentially allow assets to be
            shared across templates. For example, the built-in "Custom Web
            Page", "Custom Web Server", and "Custom Device" templates all
            contain a Dashboard asset called "Health Overview". It's
            `deploymentStrategy` is set to `ignore`, which means that the first
            deployment of a template such as the "Custom Web Page" template
            creates the "Health Overview" dashboard. Subsequent deployments of
            the "Custom Web Page" template do not attempt to recreate the
            "Health Overview" dashboard. Instead, the existing dashboard is
            reused.

            Note: Assets that were not created using a template are not included
            when the system searches for existing assets; they are not used with
            `update` or `ignore`.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DeploymentStrategy'
          example:
            testVoiceLabel: update
            testVideoLabel: update
            testLabel: update
            dnsTest: ignore
            webexDashboard: ignore
            serverTest: create
        resourceInclusion:
          description: >
            A map of `<assetKey, ResourceInclusion>` pairs. The
            `resourceInclusion` field specifies whether an asset (such as a
            test, endpoint test, label, dashboard, or alert rule) should be
            included in a deployment.

            The `assetKey` identifies the specific asset to which the inclusion
            rule applies.

            Possible possible resource inclusion values for each asset:
              * `included` - The system will always create the asset.
              * `skipped` - The system will not create the asset.
            If an `assetKey` is not present in the `resourceInclusion` map, it
            defaults to `included`.

            **Note**: The deployment payload can override the
            `resourceInclusion` value defined in a template.
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ResourceInclusion'
          example:
            testLabel: skipped
            dnsTest: skipped
            webexDashboard: included
        modules:
          uniqueItems: true
          type: array
          description: >-
            ThousandEyes modules this template belongs to. Regular users can
            only set this to `default`.
          example:
            - default
          items:
            $ref: '#/components/schemas/TemplateModule'
    UserInput:
      description: >
        A user input is a value that the user must provide when deploying a
        template.

        User Input values are provided by the user in the UI under the **Global
        Settings** section.

        When deploying via the API, User Inputs values are specified in the
        payload using the `userInputValues` field.
      required:
        - name
        - type
      type: object
      properties:
        name:
          type: string
          description: The name of the user input field.
          example: target
        type:
          $ref: '#/components/schemas/UserInputType'
        title:
          type: string
          description: The title of the user input field; may be used by UI.
          example: Test Target
        description:
          type: string
          description: Description of the user input field; used by UI.
          example: The target of the Tests
        defaultValue:
          description: Default value of user input field.
          $ref: '#/components/schemas/UserInputValue'
          example: https://google.com
        allowedValues:
          type: array
          description: >-
            Allowed values for the User Input. An array of name/value pairs that
            specify specific values that can be used with the User Input. In the
            UI, user inputs with `allowedValues` will be displayed as a drop
            down selector; the `name` will be used as the display text.
          items:
            $ref: '#/components/schemas/UserInputAllowedValue'
    UserInputAllowedValue:
      type: object
      description: The list of values that the user is allowed to use as inputs.
      properties:
        value:
          $ref: '#/components/schemas/UserInputValue'
        name:
          type: string
          description: >-
            The name of the value, which will be used for display in the UI and
            API messages.
          example: West
    UserInputValue:
      description: >-
        A user input value. The type of object depends on the user input `type`
        field.
      anyOf:
        - type: string
        - type: number
        - type: object
        - type: array
          items:
            type: string
        - type: array
          items:
            type: number
        - type: array
          items:
            type: object
      example: us-west-1
    UserInputType:
      type: string
      description: >
        The type of user input. This defines the value the user can provide as
        well as the UI component displayed when redering User Inputs.

        The type is used to validate the user provided value when deploying a
        template.

        - `string`: User input expects a string value; UI will be rendered as a
        text box.

        - `number`: User input expects a numeric value; UI will be rendered as a
        text box.

        - `boolean`: User input expects a boolean value; UI will be rendered as
        a check box.

        - `string[]`: User input expects an array of string values; UI will be
        rendered as drop down.

        - `number[]`: User input expects an array of numeric values; UI will be
        rendered as drop down.

        - `boolean[]`: User input expects an array of boolean values; UI will be
        rendered as drop down.

        - `agents`: User input expects an array of `agentId`s; UI will be
        rendered as an Agent Selector (CEA) drop down.

        - `tests`: User input expects an array of `testId`s; UI will be rendered
        as a Test Selector (CEA) drop down.

        - `any`: For any other user inputs that don't belong to the types listed
        above. These will be determined based on usage in template.
      example: string
      enum:
        - string
        - number
        - boolean
        - string[]
        - number[]
        - boolean[]
        - agents
        - tests
        - any
    TemplateGrouping:
      description: >-
        Represents a grouping of different template resources for display
        purposes in the UI. This grouping does not affect template deployment.
      example:
        name: web-page-tests
        title: Web Page Tests
        description: Used for testing web pages
        type: test
        items:
          - dnsTest
          - pageLoadTest
      properties:
        name:
          description: The name of the grouping.
          example: dashboard-inputs
          type: string
        title:
          description: The title of the grouping.
          example: Dashboard Inputs
          type: string
        type:
          $ref: '#/components/schemas/TemplateGroupingType'
        description:
          description: Description of the grouping.
          example: The target of the tests
          type: string
        items:
          uniqueItems: true
          description: >-
            A list of items within the group, corresponding to the keys in the
            `userInputs` or `tests` fields of the template. Each key must be
            unique within its respective group (`user-input` or `test`).
          example:
            - dnsTest
            - pageLoadTest
          items:
            description: The unique key for an item in this grouping.
            example:
              - dnsTest
              - pageLoadTest
            type: string
          type: array
      required:
        - name
        - title
        - type
      type: object
    TemplateGroupingType:
      type: string
      description: >-
        The type of resources included in the grouping. Supported types are
        `Tests` and `User Inputs`. Grouped tests are displayed under a shared
        `title` in the template test list view, while grouped user inputs are
        organized into sections in the Global Inputs area, using the provided
        `title` and `description`.
      enum:
        - test
        - user-input
      example: user-input
    DeploymentStrategy:
      type: string
      description: The deployment strategy to apply to the asset.
      example:
        pageLoadTest: update
        httpAlert: ignore
      enum:
        - create
        - update
        - ignore
    ResourceInclusion:
      type: string
      description: The deployment inclusion configuration for the asset.
      example: included
      enum:
        - skipped
        - included
    TemplateResponse:
      allOf:
        - $ref: '#/components/schemas/TemplateResponseBase'
        - $ref: '#/components/schemas/Template'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    TemplateResponseBase:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The ID of the template.
          example: fcbb89a7-61cf-4616-9c4f-828fa3cb4684
        dateCreated:
          type: string
          format: date-time
          description: The date and time the template was created.
          example: '2023-07-17T22:00:54Z'
    TemplatesResponse:
      allOf:
        - $ref: '#/components/schemas/Templates'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    Templates:
      type: object
      properties:
        templates:
          type: array
          items:
            $ref: '#/components/schemas/TemplateResponse'
    DeployTemplate:
      type: object
      properties:
        userInputValues:
          type: object
          description: >-
            Specifies the values to be used for all `userInputs` defined in the
            template. User must provide a value for each User Input defined in
            the template being deployed.
          additionalProperties:
            $ref: '#/components/schemas/UserInputValue'
        name:
          type: string
          description: >-
            The name of the deployed template. This value will be used anywhere
            the `{{name}}` expression is used in the template being deployed.
      example:
        userInputValues:
          interval: 120
          target: https://microsoft.com
          agents:
            - agentId: 11
          domain: microsoft.com
        name: Microsoft Suite
    CertificationLevel:
      type: string
      description: >
        The certification level of the Template. The accepted values are:

        - `user`: User created template; not verified by ThousandEyes

        - `thousandeyes`: Created by ThousandEyes

        - `partner`: Created by ThousandEyes and approved by Partner/Vendor

        - `certified`: Created and certified by ThousandEyes using included best
        practice guide (see `documentation` link).
      example: user
      enum:
        - user
        - thousandeyes
        - partner
        - certified
    TemplateModule:
      type: string
      description: >-
        A ThousandEyes module this template belongs to. Regular users can only
        set to `default`.
      example: default
      enum:
        - default
    TemplateIcon:
      type: string
      description: >
        Icon that will be used when displaying the template in UI. If none
        supplied, will display `thousandeyes` icon. Supported values include:

        - `api`

        - `custom`

        - `server`

        - `user-template`

        - `thousandeyes`
      example: server
    SharingSettings:
      required:
        - scope
      type: object
      properties:
        scope:
          $ref: '#/components/schemas/SharingScope'
      description: The Template to change the sharing settings for.
    SharingScope:
      type: string
      description: >
        The scope of the template sharing. The accepted values are:

        - `default`: The template is visible only within the account group that
        owns it.

        - `organization`: The template is visible by all the users within the
        organization that owns it.
      example: organization
      enum:
        - default
        - organization
    SharingSettingsResponse:
      allOf:
        - $ref: '#/components/schemas/SharingSettings'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SharingSettingsLinks'
    SharingSettingsLinks:
      type: object
      description: A list of links that can be accessed to get more information.
      properties:
        self:
          $ref: '#/components/schemas/SharingSettingsLink'
        template:
          $ref: '#/components/schemas/TemplateLink'
      readOnly: true
    TemplateLink:
      allOf:
        - description: A reference to the template.
          example:
            href: >-
              https://api.thousandeyes.com/v7/templates/fcbb89a7-61cf-4616-9c4f-828fa3cb4684
        - $ref: '#/components/schemas/Link'
    SharingSettingsLink:
      allOf:
        - description: A reference to the sharing settings.
          example:
            href: >-
              https://api.thousandeyes.com/v7/templates/fcbb89a7-61cf-4616-9c4f-828fa3cb4684/sharing-settings
        - $ref: '#/components/schemas/Link'
    LabelTypeTemplate:
      description: |
        The type of label. Acceptable values are:
        - `tests` - A Label that can be assigned to CEA/Synthetic tests
        - `endpoint_tests` - A Label that can be assigned to Endpoint tests
      type: string
      example: tests
      enum:
        - tests
        - endpoint_tests
    TestIdTemplate:
      description: Test identified by the test's ID.
      type: object
      properties:
        testId:
          description: ID of the test.
          $ref: '#/components/schemas/StringTemplate'
    LabelConfigurationTemplate:
      type: object
      description: >
        A label object that is compatible with [ThousandEyes V6
        API](https://developer.cisco.com/docs/thousandeyes/v6/create-a-label/#request).

        All field values can be templated with Handlebars expression unless
        otherwise noted.
      required:
        - name
      properties:
        name:
          description: The name of the label.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        type:
          anyOf:
            - $ref: '#/components/schemas/LabelTypeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        tests:
          description: >-
            Array of CEA/Synthetic testId objects, if the type specified is
            `tests`.
          title: Label_tests
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/TestIdTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        endpointTests:
          description: >-
            Array of Endpoint testId objects, if the type specified is
            `endpoint_tests`.
          title: Label_endpointTests
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/TestIdTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
    TestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      enum:
        - agent-to-server
        - agent-to-agent
        - dns-server
        - dns-trace
        - http-server
        - page-load
        - web-transactions
        - sip-server
        - voice
      example: http-server
    AgentAssignmentTemplate:
      type: object
      properties:
        agentId:
          $ref: '#/components/schemas/NumberTemplate'
    LabelAssignmentTemplate:
      type: object
      description: Label to assign to a test, identified by the ID (`groupId`).
      properties:
        groupId:
          $ref: '#/components/schemas/NumberTemplate'
    TestBaseTemplate:
      type: object
      required:
        - testName
        - type
        - agents
      properties:
        type:
          $ref: '#/components/schemas/TestTypeTemplate'
        testName:
          description: The name of the test, must be unique.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        agents:
          description: The agents to assign to the test identified by `agentId`.
          title: Agents
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/AgentAssignmentTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        groups:
          description: The Labels to assign to the test.
          anyOf:
            - type: array
              items:
                $ref: '#/components/schemas/LabelAssignmentTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        description:
          description: Description of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
    PortTemplate:
      description: The network port.
      anyOf:
        - type: integer
        - $ref: '#/components/schemas/HandlebarsExpression'
    NumPathTracesTemplate:
      description: >-
        Number of path trace probes to run. Defaults to 3, with a range of 3 to
        10.
      type: integer
      example: 3
      minimum: 3
      maximum: 10
      default: 3
    PathTraceModeTemplate:
      description: >-
        The path trace mode. Choose `inSession` to perform the path trace within
        a TCP session. Defaults to `classic` for network path discovery.
      type: string
      default: classic
      example: classic
      enum:
        - classic
        - inSession
    ProbeModeTemplate:
      description: >-
        The probe mode used by the end-to-end Network test. Only valid if the
        protocol is set to `TCP`. Defaults to `AUTO`.
      type: string
      default: AUTO
      example: AUTO
      enum:
        - AUTO
        - SACK
        - SYN
    TransportProtocolTemplate:
      description: The network transport protocol to use for the test.
      type: string
      example: TCP
      enum:
        - TCP
        - UDP
    NetworkTestBaseTemplate:
      type: object
      properties:
        interval:
          description: How often the network test will run, in seconds.
          anyOf:
            - $ref: '#/components/schemas/TestInterval'
            - $ref: '#/components/schemas/HandlebarsExpression'
        port:
          $ref: '#/components/schemas/PortTemplate'
        bgpMeasurements:
          description: Enable/disable BGP measurements.
          title: BgpMeasurements
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        bandwidthMeasurements:
          description: Enable/disable bandwidth measurements.
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        mtuMeasurements:
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        numPathTraces:
          description: >-
            Number of path trace probes to run. Defaults to 3, with a range of 3
            to 10.
          title: NumPathTraces
          anyOf:
            - $ref: '#/components/schemas/NumPathTracesTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        pathTraceMode:
          description: >-
            The path trace mode. Choose `inSession` to perform the path trace
            within a TCP session. Defaults to `classic` for network path
            discovery.
          title: PathTraceMode
          anyOf:
            - $ref: '#/components/schemas/PathTraceModeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        probeMode:
          description: >-
            The probe mode used by the end-to-end Network test. Only valid if
            the protocol is set to `TCP`. Defaults to `AUTO`.
          title: ProbeMode
          anyOf:
            - $ref: '#/components/schemas/ProbeModeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        protocol:
          description: The network transport protocol that will be used. Defaults to `TCP`.
          title: TransportProtocol
          anyOf:
            - $ref: '#/components/schemas/TransportProtocolTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
    AgentToServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: agent-to-server
      default: agent-to-server
    TargetServerTemplate:
      description: Target host name or IP address. Example "app.thousandeyes.com".
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    AgentToServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - server
          properties:
            type:
              $ref: '#/components/schemas/AgentToServerTestTypeTemplate'
            server:
              $ref: '#/components/schemas/TargetServerTemplate'
            continuousMode:
              anyOf:
                - $ref: '#/components/schemas/BooleanNumber'
                - $ref: '#/components/schemas/HandlebarsExpression'
            fixedPacketRate:
              anyOf:
                - $ref: '#/components/schemas/BooleanNumber'
                - $ref: '#/components/schemas/HandlebarsExpression'
    AgentToAgentTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: agent-to-agent
      default: agent-to-agent
    AgentToAgentTestDirectionTemplate:
      description: >-
        Direction of the test (affects how results are shown). Defaults to
        `TO_TARGET`.
      type: string
      default: TO_TARGET
      example: TO_TARGET
      enum:
        - TO_TARGET
        - FROM_TARGET
        - BIDIRECTIONAL
    AgentToAgentTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - targetAgentId
          properties:
            type:
              $ref: '#/components/schemas/AgentToAgentTestTypeTemplate'
            direction:
              anyOf:
                - $ref: '#/components/schemas/AgentToAgentTestDirectionTemplate'
                - $ref: '#/components/schemas/HandlebarsExpression'
            dscpId:
              $ref: '#/components/schemas/NumberTemplate'
            targetAgentId:
              description: ID of the target agent for the test.
              $ref: '#/components/schemas/NumberTemplate'
            throughputMeasurements:
              anyOf:
                - $ref: '#/components/schemas/BooleanNumber'
                - $ref: '#/components/schemas/HandlebarsExpression'
            throughputDuration:
              $ref: '#/components/schemas/NumberTemplate'
              minimum: 5000
              maximum: 30000
              default: 10000
              example: 10000
            throughputRate:
              description: Throughput rate; For UDP only.
              $ref: '#/components/schemas/NumberTemplate'
              minimum: 1
              maximum: 1000
              example: 10
    DnsServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: dns-server
      default: dns-server
    DnsServerEntryTemplate:
      description: Server host name (FQDN). Example "www.example.com".
      type: object
      properties:
        serverName:
          $ref: '#/components/schemas/StringTemplate'
      required:
        - serverName
    DnsServersTemplate:
      description: DNS Servers to target
      type: array
      items:
        $ref: '#/components/schemas/DnsServerEntryTemplate'
    DnsTargetDomainTemplate:
      description: >
        Specifies the target DNS host name for the test, suffixed by the record
        type (e.g., www.thousandeyes.com CNAME). If no record type is specified,
        the test will default to an ANY record.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    DnsServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - dnsServers
            - domain
            - interval
          properties:
            type:
              $ref: '#/components/schemas/DnsServerTestTypeTemplate'
            dnsServers:
              anyOf:
                - $ref: '#/components/schemas/DnsServersTemplate'
                - $ref: '#/components/schemas/HandlebarsExpression'
            domain:
              $ref: '#/components/schemas/DnsTargetDomainTemplate'
    DnsTraceTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: dns-trace
      default: dns-trace
    DnsTraceTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - domain
            - interval
          properties:
            type:
              $ref: '#/components/schemas/DnsTraceTestTypeTemplate'
            dnsTransportProtocolTemplate:
              $ref: '#/components/schemas/TransportProtocolTemplate'
            domain:
              $ref: '#/components/schemas/DnsTargetDomainTemplate'
    HttpVersionTemplate:
      description: The HTTP Version; 2 for default (prefer HTTP/2), 1 for HTTP/1.1 only.
      type: integer
      default: 2
      example: 2
      enum:
        - 1
        - 2
    AuthTypeTestTemplate:
      description: Authentication type to use when establishing connection.
      type: string
      enum:
        - NONE
        - BASIC
        - NTLM
        - KERBEROS
      default: NONE
      example: NONE
    CustomHeadersTemplate:
      description: Custom headers to use in HTTP request.
      type: object
      properties:
        all:
          type: object
          additionalProperties:
            type: string
        domains:
          type: object
          additionalProperties:
            type: string
        root:
          type: object
          additionalProperties:
            type: string
    SslVersionIdTemplate:
      description: >-
        The SSL Version; `0` for auto, `3` for SSLv3, `4` for TLS v1.0, `5` for
        TLS v1.1, `6` for TLS v1.2.
      type: integer
      default: 0
      example: 0
      enum:
        - 0
        - 3
        - 4
        - 5
        - 6
        - 7
    HttpServerTestBaseTemplate:
      type: object
      properties:
        networkMeasurements:
          description: |
            `1` to enable network measurements, `0` to disable.
          title: NetworkMeasurements
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        desiredStatusCode:
          description: Expected HTTP status response code.
          title: DesiredStatusCode
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        followRedirects:
          description: Whether or not transaction test should follow redirects.
          title: FollowRedirects
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        httpTargetTime:
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
          description: Target time for HTTP server completion; specified in milliseconds.
          minimum: 100
          maximum: 5000
        httpTimeLimit:
          $ref: '#/components/schemas/NumberTemplate'
        httpVersion:
          description: HTTP Version; 2 for default (prefer HTTP/2), 1 for HTTP/1.1 only.
          anyOf:
            - $ref: '#/components/schemas/HttpVersionTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        authType:
          description: The Authentication type.
          anyOf:
            - $ref: '#/components/schemas/AuthTypeTestTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        username:
          description: The username to be used for Basic/NTLM authentication.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        password:
          description: The password to be used for Basic/NTLM authentication.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        useNtlm:
          description: Whether test should use NTLM during auth.
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        userAgent:
          description: The user-agent string to be provided during the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        customHeaders:
          anyOf:
            - $ref: '#/components/schemas/CustomHeadersTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        verifyCertificate:
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        clientCertificate:
          description: >-
            The string representation (containing newline characters) of client
            certificate, if used.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        sslVersionId:
          description: >-
            The SSL Version; `0` for auto, `3` for SSLv3, `4` for TLS v1.0, `5`
            for TLS v1.1, `6` for TLS v1.2.
          anyOf:
            - $ref: '#/components/schemas/SslVersionIdTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
    HttpServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: http-server
      default: http-server
    HttpServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/HttpServerTestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
          properties:
            type:
              $ref: '#/components/schemas/HttpServerTestTypeTemplate'
            downloadLimit:
              description: >-
                Specify maximum number of bytes to download from the target
                object.
              $ref: '#/components/schemas/NumberTemplate'
            dnsOverride:
              description: IP address to use for DNS override.
              $ref: '#/components/schemas/StringTemplate'
            postBody:
              description: POST body to be sent with the request.
              $ref: '#/components/schemas/StringTemplate'
    PageLoadStrategyTemplate:
      type: string
      default: normal
      example: normal
      enum:
        - none
        - eager
        - normal
    BrowserTestBaseTemplate:
      type: object
      properties:
        url:
          description: The URL that the test will target.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        blockDomains:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        allowMicAndCamera:
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        allowGeolocation:
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        pageLoadingStrategy:
          description: >
            The page loading strategy the browser should use when loading the
            target webpage.

            - `normal`: Wait for the entire page to load, meaning that HTML
            content and all resources have been downloaded and parsed before
            moving to the next action in the transaction test script. 

            - `eager`: Wait for the `DOMContentLoaded` event, meaning that HTML
            content is downloaded and parsed, and the document readiness state
            is “interactive” before moving to the next action in the test
            script. 

            - `none`: Wait only for HTML content to download. Once the HTML is
            downloaded, the test proceeds to the next action in the transaction
            test script. (Default is `normal`).
          anyOf:
            - $ref: '#/components/schemas/PageLoadStrategyTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        subinterval:
          description: >-
            Subinterval for round-robin testing (in seconds). Must be less than
            or equal to interval and must evenly divide interval. Defaults to
            null, which disables round-robin.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
    PageLoadTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: page-load
      default: page-load
    PageLoadTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - interval
        - url
      properties:
        type:
          $ref: '#/components/schemas/PageLoadTestTypeTemplate'
        httpInterval:
          description: How often the HTTP test will run, in seconds.
          anyOf:
            - $ref: '#/components/schemas/TestInterval'
            - $ref: '#/components/schemas/HandlebarsExpression'
        pageLoadTargetTime:
          description: >-
            Target time for page load completion, in seconds. Cannot exceed the
            `pageLoadTimeLimit` value.
          minimum: 1
          maximum: 60
          default: 6
          example: 10
          $ref: '#/components/schemas/NumberTemplate'
        pageLoadTimeLimit:
          description: >-
            Page load timeout, in seconds. Must be greater than `httpTimeLimit`.
            Defaults to 10.
          example: 10
          default: 10
          $ref: '#/components/schemas/NumberTemplate'
    PageLoadTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/HttpServerTestBaseTemplate'
        - $ref: '#/components/schemas/BrowserTestBaseTemplate'
        - $ref: '#/components/schemas/PageLoadTestBaseTemplate'
    TransactionTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: web-transactions
      default: web-transactions
    TransactionScriptTemplate:
      description: >-
        Transaction script for transaction test. Must be a JavaScript string
        with escaped quotes.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    TransactionTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - interval
        - transactionScript
        - url
      properties:
        type:
          $ref: '#/components/schemas/TransactionTestTypeTemplate'
        targetTime:
          type: integer
          description: >-
            The target time for a transaction test to complete, in seconds.
            Defaults to 10. Cannot exceed the `timeLimit` value.
          minimum: 1
          maximum: 180
          default: 10
          example: 1
          $ref: '#/components/schemas/NumberTemplate'
        timeLimit:
          description: The time limit for a transaction test, in seconds. Defaults to 30.
          example: 30
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        transactionScript:
          $ref: '#/components/schemas/TransactionScriptTemplate'
        disableScreenshot:
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
    TransactionTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/NetworkTestBaseTemplate'
        - $ref: '#/components/schemas/HttpServerTestBaseTemplate'
        - $ref: '#/components/schemas/BrowserTestBaseTemplate'
        - $ref: '#/components/schemas/TransactionTestBaseTemplate'
    SipServerTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: sip-server
      default: sip-server
    SipProtocolTemplate:
      description: >
        The SIP protocol to use for SIP transport layer; defaults to TCP. When
        creating or updating a SIP test, set this field as part of the
        `targetSipCredentials` field.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    SipRegistrarTemplate:
      description: The target SIP server, without port.
      anyOf:
        - type: string
        - $ref: '#/components/schemas/HandlebarsExpression'
    TargetSipCredentialsTemplate:
      type: object
      properties:
        authUser:
          $ref: '#/components/schemas/StringTemplate'
        password:
          $ref: '#/components/schemas/StringTemplate'
        port:
          $ref: '#/components/schemas/PortTemplate'
        protocol:
          $ref: '#/components/schemas/SipProtocolTemplate'
        sipRegistrar:
          $ref: '#/components/schemas/SipRegistrarTemplate'
      required:
        - sipRegistrar
        - port
    SipServerTestBaseTemplate:
      type: object
      required:
        - type
        - agents
        - targetSipCredentials
      properties:
        type:
          $ref: '#/components/schemas/SipServerTestTypeTemplate'
        desiredStatusCode:
          description: The expected SIP response code.
          $ref: '#/components/schemas/NumberTemplate'
        server:
          description: The domain and port of the target SIP server.
          $ref: '#/components/schemas/StringTemplate'
        protocol:
          $ref: '#/components/schemas/SipProtocolTemplate'
        targetSipCredentials:
          $ref: '#/components/schemas/TargetSipCredentialsTemplate'
    SipServerTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - $ref: '#/components/schemas/SipServerTestBaseTemplate'
    VoiceTestTypeTemplate:
      type: string
      description: The type of test. Cannot be templated with Handlebars.
      example: voice
      default: voice
    VoiceIntervalTemplate:
      description: Voice test interval in seconds.
      type: integer
      enum:
        - 300
        - 600
        - 900
        - 1800
        - 3600
      example: 300
    VoiceTestTemplate:
      allOf:
        - $ref: '#/components/schemas/TestBaseTemplate'
        - type: object
          required:
            - type
            - agents
            - interval
            - targetAgentId
          properties:
            type:
              $ref: '#/components/schemas/VoiceTestTypeTemplate'
            interval:
              description: How often the Voice test will run, in seconds.
              anyOf:
                - $ref: '#/components/schemas/VoiceIntervalTemplate'
                - $ref: '#/components/schemas/HandlebarsExpression'
            dscpId:
              description: The DSCP value.
              default: 46
              $ref: '#/components/schemas/NumberTemplate'
            dscp:
              description: The DSCP string.
              $ref: '#/components/schemas/StringTemplate'
            port:
              $ref: '#/components/schemas/NumberTemplate'
              description: The Port to target.
              default: 49152
              minimum: 1024
              maximum: 65535
              example: 49152
            targetAgentId:
              description: Id of the target agent for the test.
              $ref: '#/components/schemas/NumberTemplate'
    TestConfigurationTemplate:
      description: >
        A ThousandEyes CEA (Synthetic) test configuration that is compatible
        with [ThousandEyes V6
        API](https://developer.cisco.com/docs/thousandeyes/v6/tests-metadata/). 

        All field values can be templated with Handlebars expression unless
        otherwise noted.
      externalDocs:
        url: https://developer.cisco.com/docs/thousandeyes/v6/tests-metadata/
      oneOf:
        - $ref: '#/components/schemas/AgentToServerTestTemplate'
        - $ref: '#/components/schemas/HttpServerTestTemplate'
        - $ref: '#/components/schemas/PageLoadTestTemplate'
        - $ref: '#/components/schemas/AgentToAgentTestTemplate'
        - $ref: '#/components/schemas/VoiceTestTemplate'
        - $ref: '#/components/schemas/TransactionTestTemplate'
        - $ref: '#/components/schemas/SipServerTestTemplate'
        - $ref: '#/components/schemas/DnsServerTestTemplate'
        - $ref: '#/components/schemas/DnsTraceTestTemplate'
      discriminator:
        propertyName: type
        mapping:
          agent-to-server: '#/components/schemas/AgentToServerTestTemplate'
          agent-to-agent: '#/components/schemas/AgentToAgentTestTemplate'
          dns-server: '#/components/schemas/DnsServerTestTemplate'
          dns-trace: '#/components/schemas/DnsTraceTestTemplate'
          http-server: '#/components/schemas/HttpServerTestTemplate'
          page-load: '#/components/schemas/PageLoadTestTemplate'
          web-transactions: '#/components/schemas/TransactionTestTemplate'
          sip-server: '#/components/schemas/SipServerTestTemplate'
          voice: '#/components/schemas/VoiceTestTemplate'
    EndpointTestTypeOptionsTemplate:
      type: string
      enum:
        - Http
        - Network
      example: Http
    EndpointTestTypeTemplate:
      description: |
        The type of Endpoint scheduled test.

        Possible values are:

        - `Network` - endpoint network test
        - `Http` - endpoint http test
      anyOf:
        - $ref: '#/components/schemas/EndpointTestTypeOptionsTemplate'
        - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointTestCategoryOptionsTemplate:
      type: string
      enum:
        - SCHEDULED_TEST
        - DYNAMIC_APP_TEST
      example: SCHEDULED_TEST
    EndpointTestCategoryTemplate:
      description: Whether the test is `SCHEDULED_TEST` or `DYNAMIC_APP_TEST`.
      anyOf:
        - $ref: '#/components/schemas/EndpointTestCategoryOptionsTemplate'
        - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointAlertRuleConfigTemplate:
      description: Alert rules to associate with the test.
      required:
        - ruleId
      type: object
      properties:
        ruleId:
          description: The ID of the Alert rule to associate with test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointTestIntervalTemplate:
      description: How often the test will run, in seconds.
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      example: 60
    EndpointGenericConfigTemplate:
      description: Settings common to HTTP and Network tests.
      required:
        - interval
        - priority
      type: object
      properties:
        interval:
          description: Interval in seconds of when the test runs.
          anyOf:
            - $ref: '#/components/schemas/EndpointTestIntervalTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        priority:
          description: >-
            Define a priority for scheduling. Higher priority value will be
            scheduled first.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointMonitoringSettingsTypeTemplate:
      description: >
        The strategy to use for selecting Endpoint agents to include in a test.
        Possible values are:

        - `SPECIFIC_AGENTS` - use `agentIds` to select a specific set of agents

        - `ANY_AGENT` - select all agents available

        - `LIST_OF_LABELS` - use `labelIds` to select agents based on a set of
        matching labels
      type: string
      enum:
        - ANY_AGENT
        - SPECIFIC_AGENTS
        - LIST_OF_LABELS
      example: ANY_AGENT
    EndpointAgentSelectionConfigTemplate:
      description: >-
        Configration that will be used to determine what Endpoint Agents to
        assign to a test.
      required:
        - maxMachines
      type: object
      properties:
        monitoringSettingsType:
          anyOf:
            - $ref: '#/components/schemas/EndpointMonitoringSettingsTypeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        agentIds:
          description: >-
            An array of agent IDs used to assign specific Endpoint Agents to the
            test. Used when `monitoringSettingsType` is `SPECIFIC_AGENTS`.
          anyOf:
            - type: array
              items:
                type: string
                description: Agent ID
            - $ref: '#/components/schemas/HandlebarsExpression'
        labelIds:
          description: >-
            An array of label IDs used to assign specific Endpoint Agents to the
            test. Used when `monitoringSettingsType` is `LIST_OF_LABELS`.
          anyOf:
            - type: array
              items:
                type: integer
                description: An Endpoint label ID.
                format: int64
            - $ref: '#/components/schemas/HandlebarsExpression'
        maxMachines:
          description: Maximum number of machines assigned to a test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointTestConfigProtocolTemplate:
      type: string
      description: The protocol to use for ping/traceroute tests.
      example: AUTODETECT
      enum:
        - UNKNOWN
        - ICMP
        - TCP
        - UDP
        - PREFER_TCP
        - AUTODETECT
    EndpointTcpProbeModeTemplate:
      type: string
      description: Used in TCP mode only.
      enum:
        - UNKNOWN
        - AUTO
        - SYN
        - SACK
      example: SACK
    EndpointNetworkTestConfigTemplate:
      description: Network test settings.
      required:
        - flagPing
        - flagTraceroute
        - ipVersion
        - networkProtocol
        - pathtraceInSession
        - tcpConnect
        - tcpProbeMode
      type: object
      properties:
        flagPing:
          anyOf:
            - type: boolean
              description: Indicates if the test should run ping.
              example: true
            - $ref: '#/components/schemas/HandlebarsExpression'
        flagTraceroute:
          anyOf:
            - type: boolean
              description: Indicates if the test should run traceroute.
              example: true
            - $ref: '#/components/schemas/HandlebarsExpression'
        ipVersion:
          description: IP version the test should use for network tests.
          anyOf:
            - $ref: '#/components/schemas/EndpointIpVersionTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        networkProtocol:
          $ref: '#/components/schemas/EndpointTestConfigProtocolTemplate'
        pathtraceInSession:
          type: boolean
          description: Used in TCP mode only.
        tcpProbeMode:
          $ref: '#/components/schemas/EndpointTcpProbeModeTemplate'
        tcpConnect:
          type: boolean
          description: Indicates whether to use TCP Connect when running the ICMP test.
          default: false
          example: false
    EndpointServerConfigTemplate:
      description: Target server information.
      required:
        - port
        - serverName
      type: object
      properties:
        serverName:
          type: string
          description: Server host name or IP.
          example: www.example.com
        port:
          maximum: 65535
          minimum: 0
          type: integer
          description: Server port
          example: 80
    EndpointAuthTypeEnumTemplate:
      description: The authentication type.
      type: string
      enum:
        - NONE
        - BASIC
        - NTLM
        - KERBEROS
        - OAUTH
        - LEGACY
      example: BASIC
    EndpointAuthTypeTemplate:
      description: The authentication type.
      anyOf:
        - $ref: '#/components/schemas/EndpointAuthTypeEnumTemplate'
        - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointHttpTestConfigTemplate:
      description: HTTP test settings.
      required:
        - httpTimeLimit
        - sslVersion
        - targetFetchTime
        - targetResponseTime
        - url
        - verifyCertHostname
      type: object
      properties:
        url:
          description: URL to target for the test.
          anyOf:
            - type: string
              example: https://meet.google.com
            - $ref: '#/components/schemas/HandlebarsExpression'
        targetResponseTime:
          description: Target response time in milliseconds.
          anyOf:
            - type: integer
              format: int64
            - $ref: '#/components/schemas/HandlebarsExpression'
        targetFetchTime:
          description: Target fetch time in milliseconds.
          anyOf:
            - type: integer
              format: int64
            - $ref: '#/components/schemas/HandlebarsExpression'
        headers:
          description: Headers to be used in the HTTP request.
          anyOf:
            - maxLength: 1024
              type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        verifyCertHostname:
          description: Flag indicating if we are to verify the certificate.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/HandlebarsExpression'
        authType:
          anyOf:
            - $ref: '#/components/schemas/EndpointAuthTypeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        bytesToDownload:
          description: >-
            Maximum number of bytes to download on a request. If not present it
            means no limit.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        httpTimeLimit:
          description: >-
            Maximum amount of time in milliseconds the HTTP Server test will
            run.
          anyOf:
            - maximum: 60000
              minimum: 5000
              type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        username:
          description: Username if auth enabled.
          anyOf:
            - maximum: 255
              type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        password:
          description: Password if auth enabled.
          anyOf:
            - maximum: 255
              type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        postBody:
          description: Request body to be used with the POST request.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        contentRegex:
          description: >-
            Regular expression used to validate the received content. Must
            conform with the POSIX Extended Regular Expression Syntax.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        sslVersion:
          description: |
            SSL Version to be used: 
            - `0` - Auto
            - `3` - SSLv3
            - `4` - TLSv1.0
            - `5` - TLSv1.1
            - `6` - TLSv1.2
          anyOf:
            - maximum: 6
              minimum: 0
              type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        expectedResponseCode:
          description: Expected HTTP response code. If not present 2xx or 3xx are expected.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        targetIpOverride:
          description: |
            If set to a valid IP address, this is where the request will
            be sent regardless of what the agent's DNS resolver says.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        clientCert:
          description: Client PEM certificate used during the request.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        userAgent:
          description: >-
            The user-agent string to be used by the request. It can be any
            user-agent string. If not provided, the default implementation
            user-agent is used.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        maxRedirects:
          description: Maximum allowed redirects.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        proxyId:
          description: Proxy used by the agent to execute the test.
          anyOf:
            - type: integer
            - $ref: '#/components/schemas/HandlebarsExpression'
        proxyDirect:
          description: Indicates if a direct proxy should be used when proxyId is not set.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/HandlebarsExpression'
    EndpointTestLabelListTemplate:
      description: A list of label IDs identifying label to be assigned.
      type: array
      items:
        $ref: '#/components/schemas/NumberTemplate'
    EndpointTestConfigTemplate:
      description: >
        Configuration settings for a ThousandEyes Endpoint test. All test fields
        can be templated with Handlebars 

        expression unless otherwise noted.
      required:
        - name
        - testCategory
        - testType
        - genericConfig
        - machineConfig
        - networkConfig
      type: object
      properties:
        testName:
          description: The name of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        description:
          description: The description of the test.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        testType:
          description: |
            The type of Endpoint scheduled test.

            Possible values are:

            - `Network` - endpoint network test
            - `Http` - endpoint http test
          anyOf:
            - $ref: '#/components/schemas/EndpointTestTypeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        testCategory:
          $ref: '#/components/schemas/EndpointTestCategoryTemplate'
        flagEnabled:
          description: Flag indicating if the test is enabled.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/HandlebarsExpression'
        alertRules:
          anyOf:
            - type: array
              description: Alert rules associated with the test config.
              items:
                $ref: '#/components/schemas/EndpointAlertRuleConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        genericConfig:
          anyOf:
            - $ref: '#/components/schemas/EndpointGenericConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        machineConfig:
          anyOf:
            - $ref: '#/components/schemas/EndpointAgentSelectionConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        networkConfig:
          anyOf:
            - $ref: '#/components/schemas/EndpointNetworkTestConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        server:
          anyOf:
            - $ref: '#/components/schemas/EndpointServerConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        httpConfig:
          anyOf:
            - $ref: '#/components/schemas/EndpointHttpTestConfigTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        testLabelIds:
          description: >
            A list of labels to assign to the test. Typically this value will be
            set using Handlebars

            reference to a user input. Example: `"testLabelIds":
            "[{{labels.endpointLabel.groupId}}]"`
          anyOf:
            - $ref: '#/components/schemas/EndpointTestLabelListTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
    AlertRuleTypeTemplate:
      type: string
      enum:
        - Page Load
        - HTTP Server
        - End-to-End (Server)
        - End-to-End (Agent)
        - Voice
        - DNS Server
        - DNS Trace
        - DNSSEC
        - Web Transactions
        - BGP
        - Path Trace
        - FTP
        - SIP Server
      example: Page Load
    AlertRuleSeverityTemplate:
      type: string
      example: MINOR
      enum:
        - INFO
        - MAJOR
        - MINOR
        - CRITICAL
    AlertRuleConfigurationTemplate:
      type: object
      description: >-
        Alert Rule configuration. See [ThousandEyes v6 API
        spec](https://developer.cisco.com/docs/thousandeyes/v6/metadata/#alert-rule-metadata)
        for schema details.
      externalDocs:
        url: >-
          https://developer.cisco.com/docs/thousandeyes/v6/metadata/#alert-rule-metadata
      required:
        - ruleName
        - alertType
        - expression
        - roundsViolatingRequired
        - roundsViolatingOutOf
      properties:
        ruleName:
          description: The name of the alert rule.
          $ref: '#/components/schemas/StringTemplate'
        alertType:
          description: The type of the alert rule.
          anyOf:
            - $ref: '#/components/schemas/AlertRuleTypeTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        expression:
          description: >-
            The alert rule expression. Must be valid JSON. See [V6
            API](https://developer.cisco.com/docs/thousandeyes/v6/metadata/#expressions)
            documentation for examples.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
          example: ((totalTime >= 500 ms) && (responseTime >= 500 ms))
        roundsViolatingRequired:
          description: >-
            Specifies the numerator (X value) of the "X of Y times" condition in
            an alert rule.
          title: RoundsViolatingRequired
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        roundsViolatingOutOf:
          description: >-
            Specifies the divisor (Y value) of the "X of Y times" condition in
            an alert rule.
          title: RoundsViolatingOutOf
          anyOf:
            - $ref: '#/components/schemas/BooleanNumber'
            - $ref: '#/components/schemas/HandlebarsExpression'
        severity:
          description: >-
            The severity that will be assigned when an alert is generated by
            this alert rule.
          anyOf:
            - $ref: '#/components/schemas/AlertRuleSeverityTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        testIds:
          description: >-
            The tests that the alert rule will be assigned to identified by the
            test ID.
          title: TestIds
          anyOf:
            - type: array
              items:
                type: number
                example: 43289
            - $ref: '#/components/schemas/HandlebarsExpression'
        minimumSources:
          description: >-
            The minimum number of agents that must meet the specified criteria
            in order to trigger an alert.
          type: number
          example: 1
    ApiDurationTemplate:
      description: Specifies a fixed timespan for data aggregation.
      type: object
      properties:
        value:
          type: integer
          format: int32
          description: Timespan value.
          example: 10
        unit:
          $ref: '#/components/schemas/LegacyDurationUnit'
    DashboardWidgetTemplate:
      type: object
      description: Configuration of a dashboard widget.
      properties:
        title:
          description: The title of the widget.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        type:
          description: The type of widget.
          anyOf:
            - $ref: '#/components/schemas/WidgetType'
            - $ref: '#/components/schemas/HandlebarsExpression'
        visualMode:
          anyOf:
            - $ref: '#/components/schemas/VisualMode'
            - $ref: '#/components/schemas/HandlebarsExpression'
        metricGroup:
          anyOf:
            - $ref: '#/components/schemas/MetricGroup'
            - $ref: '#/components/schemas/HandlebarsExpression'
        direction:
          anyOf:
            - $ref: '#/components/schemas/DashboardMetricDirection'
            - $ref: '#/components/schemas/HandlebarsExpression'
        metric:
          anyOf:
            - $ref: '#/components/schemas/DashboardMetric'
            - $ref: '#/components/schemas/HandlebarsExpression'
        filters:
          anyOf:
            - $ref: '#/components/schemas/WidgetFilters'
            - $ref: '#/components/schemas/HandlebarsExpression'
        measure:
          anyOf:
            - $ref: '#/components/schemas/ApiWidgetMeasure'
            - $ref: '#/components/schemas/HandlebarsExpression'
        fixedTimespan:
          anyOf:
            - $ref: '#/components/schemas/ApiDurationTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        shouldExcludeAlertSuppressionWindows:
          description: Excludes alert suppression window data if set to `true`.
          anyOf:
            - type: boolean
            - $ref: '#/components/schemas/HandlebarsExpression'
    DashboardRefreshRateTemplate:
      type: string
      description: The refresh rate of the dashboard.
      default: 'OFF'
      example: 'OFF'
      enum:
        - 'OFF'
        - 2M
        - 5M
        - 10M
        - 15M
        - 30M
        - 60M
    DashboardConfigurationTemplate:
      type: object
      description: >-
        Configuration of a dashboard that will be created when template is
        deployed.
      properties:
        title:
          description: The title of the dashboard that will be displayed in UI.
          $ref: '#/components/schemas/StringTemplate'
        description:
          description: The description of the dashboard that will be displayed in UI.
          $ref: '#/components/schemas/StringTemplate'
        globalFilterId:
          description: >-
            The ID of a global dashboard filter to associate with this
            dashboard.
          example: 65babd9bb90bf55b17c96c8d
          $ref: '#/components/schemas/StringTemplate'
        widgets:
          description: The widgets that will be included in the dashboard.
          type: array
          items:
            $ref: '#/components/schemas/DashboardWidgetTemplate'
        refreshRate:
          anyOf:
            - $ref: '#/components/schemas/DashboardRefreshRateTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
      example:
        title: My Dashboard
        description: A dashboard for displaying test information.
        widgets:
          - type: 'Bar Chart: Stacked'
            title: 'A Bar Chart: Stacked widget'
            filters:
              Test Labels: '[{{labels.templateLabel.groupId}}]'
            metricGroup: Web - HTTP Server
            measure:
              type: Median
            metric: Response Time
            axisGroupBy: Continents
            dataSource: Cloud & Enterprise Agents
      externalDocs:
        url: https://developer.thousandeyes.com/v7/dashboards/#/dashboard-detail
    FilterContextDataSourceTemplate:
      description: Type of data source for dashboard global filter.
      type: string
      example: VIRTUAL_AGENT
      enum:
        - ALERT
        - APPDYNAMICS_SERVICE_HEALTH
        - DEVICES
        - DNSP
        - ENDPOINT_AGENTS
        - INTERNET_INSIGHTS
        - ROUTING
        - THIRD_PARTY_APPLICATIONS
        - VIRTUAL_AGENT
    ApiDataSourceFilterTemplate:
      type: object
      description: List of different filter properties for a single datasource.
      properties:
        filterId:
          description: Data source property to filter by. Example `TEST_LABEL`.
          example: TEST_LABEL
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        values:
          description: Values to filter by based on the specified `filterId`.
          anyOf:
            - type: array
              uniqueItems: true
              example:
                - '45862'
                - '59749'
              items:
                type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        metricIds:
          description: Dashboard metric associated with the filter property.
          anyOf:
            - type: array
              uniqueItems: true
              example:
                - WEB_PAGE_LOAD_COMPLETION_RATE
                - WEB_TTFB
                - WEB_AVAILABILITY
              items:
                type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
      required:
        - filterId
        - values
        - metricIds
    DashboardFilterContextTemplate:
      type: object
      description: List of dashboard filter contexts.
      properties:
        dataSourceId:
          description: Type of data source for dashboard global filter.
          anyOf:
            - $ref: '#/components/schemas/FilterContextDataSourceTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
        filters:
          description: List of filter properties.
          type: array
          uniqueItems: true
          items:
            $ref: '#/components/schemas/ApiDataSourceFilterTemplate'
      required:
        - dataSourceId
        - filters
    DashboardFilterListTemplate:
      type: array
      description: List of filters to be applied to a dashboard.
      uniqueItems: true
      items:
        $ref: '#/components/schemas/DashboardFilterContextTemplate'
    DashboardFilterConfigurationTemplate:
      type: object
      description: >-
        A dashboard filter object. See [V7 API
        Documentation](https://developer.cisco.com/docs/thousandeyes/v7/list-dashboard-filters/)
        for more details on dashboard filters.
      properties:
        name:
          description: The name of the dashboard filter.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        description:
          description: An optional description of the filter.
          anyOf:
            - type: string
            - $ref: '#/components/schemas/HandlebarsExpression'
        context:
          description: The context of the dashboard filter.
          anyOf:
            - $ref: '#/components/schemas/DashboardFilterListTemplate'
            - $ref: '#/components/schemas/HandlebarsExpression'
    ExpandUsageOptions:
      type: string
      enum:
        - test
        - enterprise-agent
        - enterprise-agent-unit
        - endpoint-agent
        - endpoint-agent-essential
        - endpoint-agent-embedded
    OrganizationQuota:
      type: object
      required:
        - value
      properties:
        value:
          type: integer
          format: int64
          description: Value of the quota for the given Organization.
          example: 22500
        orgId:
          type: string
          description: Unique ID of the organization.
          example: '10'
    AccountGroupQuota:
      type: object
      properties:
        value:
          type: integer
          format: int64
          description: Value of the quota for the given Account Group.
          example: 12000
        aid:
          type: string
          description: Unique ID of the account group.
          example: '1234'
    Quota:
      type: object
      properties:
        organizationQuota:
          $ref: '#/components/schemas/OrganizationQuota'
        accountGroupQuotas:
          type: array
          items:
            $ref: '#/components/schemas/AccountGroupQuota'
          example:
            - value: 12000
              aid: '1234'
            - value: 10000
              aid: '12345'
    Quotas:
      type: object
      properties:
        quotas:
          type: array
          items:
            $ref: '#/components/schemas/Quota'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    UsageQuota:
      type: object
      properties:
        monthStart:
          type: string
          format: date-time
          description: Beginning of usage period in UTC (ISO date-time format).
          example: '2020-01-05T08:00:00Z'
        monthEnd:
          type: string
          format: date-time
          description: End of usage period in UTC (ISO date-time format)..
          example: '2020-02-05T08:00:00Z'
        cloudUnitsIncluded:
          type: integer
          format: int64
          example: 4320000000
          description: Monthly number of cloud units allocated, as part of the contract.
        deviceAgentsIncluded:
          type: integer
          format: int64
          example: 100
          description: >-
            Number of device agents (connected devices product) allocated
            monthly, as specified in the contract.
        endpointAgentsIncluded:
          type: integer
          format: int64
          example: 200
          description: >-
            Monthly number of endpoint agents allocated, as part of the
            contract.
        endpointAgentsEssentialsIncluded:
          type: integer
          format: int64
          example: 10
          description: >-
            Monthly number of endpoint agents essentials allocated, as part of
            the contract.
        endpointAgentsEmbeddedIncluded:
          type: integer
          format: int64
          example: 10
          description: >-
            Number of embedded endpoint agents allocated monthly, as specified
            in the contract.
        enterpriseAgentsIncluded:
          type: integer
          format: int64
          example: 25
          description: >-
            Monthly number of enterprise agents allocated, as part of the
            contract. Returns non-zero value only for organizations with legacy
            billing.
    Usage:
      type: object
      properties:
        usage:
          $ref: '#/components/schemas/UsageDetails'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    UsageDetails:
      type: object
      properties:
        quota:
          $ref: '#/components/schemas/UsageQuota'
        cloudUnitsUsed:
          type: integer
          format: int64
          example: 8500489
          description: Number of cloud units consumed thus far in the usage period.
        cloudUnitsProjected:
          type: integer
          format: int64
          example: 20993812
          description: >-
            Number of cloud units projected in the current usage period, based
            on units consumed to date and configuration of enabled tests. This
            value is updated hourly.
        cloudUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 25123456
          description: >-
            Number of cloud units projected in the upcoming usage period, based
            on configuration of enabled tests. This value is updated hourly.
        enterpriseUnitsUsed:
          type: integer
          format: int64
          example: 79640902
          description: >-
            Number of enterprise units consumed in the usage period. Returns
            non-zero value only for organizations with metered billing.
        enterpriseUnitsProjected:
          type: integer
          format: int64
          example: 108016317
          description: >-
            Number of enterprise units projected in the current usage period,
            based on units consumed to date and configuration of enabled tests.
            This value is updated hourly. Returns non-zero value only for
            organizations with metered billing.
        enterpriseUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 0
          description: >-
            Projected number of enterprise units for the upcoming usage period,
            based on the configuration of enabled tests. This value is updated
            hourly and returns a non-zero value only for organizations with
            metered billing.
        connectedDevicesUnitsUsed:
          type: integer
          format: int64
          example: 79640902
          description: Number of connected device units consumed in the usage period.
        connectedDevicesUnitsProjected:
          type: integer
          format: int64
          example: 108016317
          description: >-
            Projected number of connected device units for the current usage
            period. This projection is based on the units consumed to date and
            the configuration of enabled tests. The value is updated hourly.
        connectedDevicesUnitsNextBillingPeriod:
          type: integer
          format: int64
          example: 0
          description: >-
            Projected number of connected device units for the upcoming usage
            period. This projection is based on the configuration of enabled
            tests and is updated hourly.
        endpointAgentsUsed:
          type: integer
          format: int64
          example: 42
          description: >-
            Number of endpoint agents used in the current usage period. This
            number is calculated by taking the maximum number of agents enabled
            for any one-hour period in the usage period. Disabled agents are
            excluded from this calculation.
        endpointAgentsEssentialsUsed:
          type: integer
          format: int64
          example: 5
          description: >-
            Number of endpoint agents essentials used in the current usage
            period. This number is calculated by taking the maximum number of
            agents enabled for any one-hour period in the usage period. Disabled
            agents are excluded from this calculation.
        endpointAgentsEmbeddedUsed:
          type: integer
          format: int64
          example: 5
          description: >-
            Number of embedded endpoint agents used in the current usage period.
            This number is calculated by taking the maximum number of agents
            enabled for any one-hour period in the usage period. Disabled agents
            are excluded from this calculation.
        enterpriseAgentsUsed:
          type: integer
          format: int64
          example: 58
          description: >-
            Number of enterprise agents used in the current usage period. This
            number is calculated by taking the maximum number of agents enabled
            for any one-hour period in the usage period. Disabled agents are
            excluded from this calculation.
        enterpriseAgentUnits:
          type: array
          items:
            $ref: '#/components/schemas/EnterpriseAgentUnits'
          example:
            - aid: '1234'
              agentId: '121404'
              accountGroupName: Support
              agentName: TEVA-test-agent
              enterpriseUnitsUsed: 599878
              enterpriseUnitsProjected: 597808
              vagentId: '123456'
            - aid: '315'
              agentId: '121404'
              accountGroupName: Documentation
              agentName: lab-physical-appliance-1
              enterpriseUnitsUsed: 597123
              enterpriseUnitsProjected: 597808
              vagentId: '789'
          description: >-
            A breakdown of enterprise unit consumption for each agent during the
            current monthly period. Each entry provides data for both the
            current actual usage and the projected usage. Returns non-zero
            values for organizations with metered billing.
        tests:
          type: array
          items:
            $ref: '#/components/schemas/TestUsage'
          example:
            - aid: '1234'
              testId: '1158'
              accountGroupName: Documentation
              testName: https://app.thousandeyes.com
              testType: Web-Page Load
              cloudUnitsUsed: 14050
              cloudUnitsProjected: 340674
            - aid: '12345'
              testId: '1159'
              accountGroupName: Documentation
              testName: https://support.thousandeyes.com
              testType: Web - HTTP Server
              cloudUnitsUsed: 64390
              cloudUnitsProjected: 164457
          description: >-
            A breakdown of unit consumption for each test during the current
            monthly period. Each entry provides information about both the
            current actual usage and the projected usage.
        endpointAgents:
          type: array
          items:
            $ref: '#/components/schemas/EndpointAgentsUsage'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsUsed: 22
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsUsed: 14
          description: Endpoint agents used by account group.
        endpointAgentsEssentials:
          type: array
          items:
            $ref: '#/components/schemas/EndpointAgentsEssentials'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsEssentialsUsed: 2
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsEssentialsUsed: 3
          description: Endpoint agents essentials used by account group.
        endpointAgentsEmbedded:
          type: array
          items:
            $ref: '#/components/schemas/EndpointAgentsEmbedded'
          example:
            - aid: '1234'
              accountGroupName: Support
              endpointAgentsEmbeddedUsed: 2
            - aid: '12345'
              accountGroupName: Documentation
              endpointAgentsEmbeddedUsed: 3
          description: Endpoint agents embedded used by account group.
        enterpriseAgents:
          type: array
          items:
            $ref: '#/components/schemas/EnterpriseAgents'
          example:
            - aid: '1234'
              accountGroupName: Support
              enterpriseAgentsUsed: 7
            - aid: '12345'
              accountGroupName: Documentation
              enterpriseAgentsUsed: 1
          description: Enterprise agents used by account group.
        allocations:
          $ref: '#/components/schemas/UnitAllocationSummary'
          description: Summary of allocations
    TestsUsage:
      type: object
      properties:
        breakdowns:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/UnitsByTests'
          example:
            - testId: '1158'
              testName: https://app.thousandeyes.com
              testType: Web-Page Load
              enterpriseUnitsUsed: 14050
              enterpriseUnitsProjected: 340674
              cloudUnitsUsed: 10000
              cloudUnitsProjected: 12000
              aid: '1234'
              accountGroupName: Support
            - testId: '1221'
              testName: https://app.thousandeyes.com
              testType: Web - HTTP Server
              enterpriseUnitsUsed: 194051
              enterpriseUnitsProjected: 30622
              cloudUnitsUsed: 12000
              cloudUnitsProjected: 13000
              aid: '1234'
              accountGroupName: Support
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    UnitsByTests:
      type: object
      properties:
        aid:
          type: string
          description: >-
            Unique ID of the account group owning the test that is generating
            units
          example: '1234'
        accountGroupName:
          type: string
          description: >-
            Name of the account group which owns the test that is generating the
            units
          example: Account A
        enterpriseUnitsUsed:
          type: integer
          description: Units generated by the by the enterprise agents running the test
        enterpriseUnitsProjected:
          type: integer
          description: >-
            Enterprise Units projected in the current usage period, based on
            units consumed to date and configuration of the test
        cloudUnitsUsed:
          type: integer
          description: Units generated by the by the cloud agents running the test
        cloudUnitsProjected:
          type: integer
          description: >-
            Cloud Units projected in the current usage period, based on units
            consumed to date and configuration of the test
        testId:
          type: string
          description: Unique ID of the test generating usage
        testName:
          type: string
          description: Name of the test generating usage
        testType:
          type: string
          description: >-
            Type of test generating usage. Note that this is a friendly testType
            entry (so it shouldn’t be parsed to discover the correct operation
            to query for configuration details).
        isInstantTest:
          type: boolean
          description: Indicates whether the test is scheduled or instant
    EnterpriseAgents:
      type: object
      properties:
        aid:
          type: string
          description: >-
            A unique identifier that specifies the account group that owns the
            enterprise agents.
          example: '1234'
        accountGroupName:
          type: string
          description: Name of the account group which owns the enterprise agents.
          example: Account A
        enterpriseAgentsUsed:
          type: integer
          format: int64
          description: >-
            Number of enterprise agents owned by the specific account group in
            the usage period.
    EnterpriseAgentsUsage:
      type: object
      properties:
        breakdowns:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/EnterpriseAgentUnitsByTestOwnerAccountGroup'
          example:
            - aid: '1234'
              agentId: '121404'
              accountGroupName: Support
              agentName: TEVA-test-agent
              enterpriseUnitsUsed: 599878
              enterpriseUnitsProjected: 597808
              vagentId: '123456'
            - aid: '315'
              agentId: '121404'
              accountGroupName: Documentation
              agentName: lab-physical-appliance-1
              enterpriseUnitsUsed: 597123
              enterpriseUnitsProjected: 597808
              vagentId: '789'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    EnterpriseAgentUnitsByTestOwnerAccountGroup:
      type: object
      properties:
        aid:
          description: >-
            Unique identifier of the account group where some tests are
            incurring the enterprise agent units.
          type: string
          example: '1234'
        accountGroupName:
          description: >-
            Name of the account group which owns the tests that are incurring
            enterprise agent units.
          type: string
          example: Account A
        agentId:
          type: string
          description: Unique identifier of the enterprise agent generating usage.
        agentName:
          type: string
          description: Name of the enterprise agent generating usage.
        enterpriseUnitsUsed:
          type: integer
          format: int64
          description: >-
            Number of enterprise agent units owned by the specific account group
            in the usage period.
        enterpriseUnitsProjected:
          type: integer
          format: int64
          description: >-
            Number of enterprise units projected in the current usage period,
            based on units consumed to date and configuration of enabled tests.
            This value is updated hourly. Returns non-zero value only for
            organizations with metered billing.
        vagentId:
          type: string
          description: Unique identifier of the virtual agent generating usage
    EnterpriseAgentUnits:
      type: object
      properties:
        aid:
          description: >-
            Unique identifier of the account group owning the enterprise agent
            units.
          type: string
          example: '1234'
        accountGroupName:
          description: Name of the account group which owns the enterprise agent units.
          type: string
          example: Account A
        agentId:
          type: string
          description: Unique identifier of the enterprise agent generating usage.
        agentName:
          type: string
          description: Name of the enterprise agent generating usage.
        enterpriseUnitsUsed:
          type: integer
          format: int64
          description: >-
            Number of enterprise agent units owned by the specific account group
            in the usage period.
        enterpriseUnitsProjected:
          type: integer
          format: int64
          description: >-
            Number of enterprise units projected in the current usage period,
            based on units consumed to date and configuration of enabled tests.
            This value is updated hourly. Returns non-zero value only for
            organizations with metered billing.
        vagentId:
          type: string
          description: Unique identifier of the virtual agent generating usage
    TestUsage:
      type: object
      properties:
        aid:
          type: string
          description: Unique identifier of the account group which owns the test.
          example: '1234'
        accountGroupName:
          type: string
          description: Name of the account group which owns the test.
          example: Account A
        testId:
          type: string
          description: Unique identifier of the test generating usage.
        testName:
          type: string
          description: Name of the test generating usage.
        testType:
          type: string
          description: >-
            The type of test that generated the usage data. Note that this
            parameter provides a user-friendly description of the test type and
            should not be parsed to determine the endpoint for querying
            configuration details.
        cloudUnitsUsed:
          type: integer
          format: int64
          description: >-
            Number of cloud units that the test has consumed in the usage
            period.
        cloudUnitsProjected:
          type: integer
          format: int64
          description: >-
            The estimated number of cloud units that the test is expected to
            consume during the usage period. This estimate is determined by
            considering the units consumed up to the current time and the test's
            configuration. It's important to note that this value is updated
            every hour. For new tests, the `cloudUnitsProjected` parameter is
            absent until the projection is calculated.
    EndpointAgentsUsage:
      type: object
      properties:
        aid:
          description: Unique identifier of the account group owning the endpoint agents.
          type: string
          example: '1234'
        accountGroupName:
          description: Name of the account group which owns the endpoint agents.
          type: string
          example: Account A
        endpointAgentsUsed:
          type: integer
          format: int64
          description: >-
            Number of endpoint agents owned by the specific account group in the
            usage period.
    EndpointAgentsEssentials:
      type: object
      properties:
        aid:
          description: >-
            Unique identifier of the account group owning the endpoint agents
