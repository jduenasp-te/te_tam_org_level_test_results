          properties:
            tests:
              uniqueItems: true
              type: array
              description: List of affected tests.
              items:
                $ref: '#/components/schemas/EventApiAffectedTest'
    AffectedTargets:
      allOf:
        - $ref: '#/components/schemas/AffectedCount'
