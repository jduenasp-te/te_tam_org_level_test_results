externalDocs:
  description: Find out more about ThousandEyes
  url: https://developer.thousandeyes.com/
paths:
  /account-groups:
    get:
      tags:
        - Account Groups
      summary: List account groups
      operationId: getAccountGroups
      description: Retrieves a list of account groups available to the current user.
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AccountGroups'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    post:
      tags:
        - Account Groups
      summary: Create account group
      operationId: createAccountGroup
      description: >-
        Creates a new account group. This operation requires the `Edit all
        account groups` permission.


        **Note:** Any user assigned to `All Account Groups` is automatically
        assigned to the new account group.
      parameters:
        - $ref: '#/components/parameters/ExpandAccountGroup'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountGroupRequest'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CreatedAccountGroup'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /account-groups/{id}:
    get:
      tags:
        - Account Groups
      summary: Retrieve account group
      operationId: getAccountGroup
      description: >-
        Retrieves detailed information about an account group using its ID. 
        This operation requires the `View all account groups settings`
        permission.
      parameters:
        - $ref: '#/components/parameters/AccountGroupIdPath'
        - $ref: '#/components/parameters/ExpandAccountGroup'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AccountGroupDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    put:
      tags:
        - Account Groups
      summary: Update account group
      operationId: updateAccountGroup
      description: >-
        Updates an account group using its ID. You can modify the account
        group’s name or the list of agents assigned to the account group.
      parameters:
        - $ref: '#/components/parameters/AccountGroupIdPath'
        - $ref: '#/components/parameters/ExpandAccountGroup'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountGroupRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AccountGroupDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    delete:
      tags:
        - Account Groups
      summary: Delete account group
      operationId: deleteAccountGroup
      description: >-
        Deletes an account group using its ID. This operation requires the
        following permissions:

          * Assign management permissions
          * Delete account
          * Edit all account groups
      parameters:
        - $ref: '#/components/parameters/AccountGroupIdPath'
      responses:
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /users:
    get:
      tags:
        - Users
      summary: List users
      operationId: getUsers
      description: >-
        Retrieves a list of users in the organization the account group ID
        belongs to. This operation requires the `API Access` and `View all
        users` permissions. See [Account
        Context](https://developer.thousandeyes.com/v7/#/accountcontext) for
        more information on changing the account group context.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Users'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    post:
      tags:
        - Users
      summary: Create user
      operationId: createUser
      description: >-
        Creates a new user.


        The following applies when creating a user: 

        * If the user is already a member of another ThousandEyes customer
        organization, the user must set their own login account group. 

        * Any update that includes `accountGroupRoles` is a replace-based update
        and not a delta-based update.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/CreatedUser'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /users/{id}:
    get:
      tags:
        - Users
      summary: Retrieve user
      operationId: getUser
      description: >-
        Retrieves detailed information about a user. This operation requires the
        `API Access` and `View All Users` permissions.
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    put:
      tags:
        - Users
      summary: Update user
      operationId: updateUser
      description: >-
        Updates a user using the user ID. You can update the user name, email
        address, account group assignments, or roles. This operation requires
        the `Edit users in all account groups` or `Edit users` permission. 


        When updating a user, the following applies:

        * When updating a user's email address, the user must confirm the
        username change before they can subsequently log in or perform API
        operations.

        * Any update that includes `accountGroupRoles` is a replace-based update
        and not a delta-based update.
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    delete:
      tags:
        - Users
      summary: Delete user
      operationId: deleteUser
      description: >-
        Deletes a user using the user ID. This operation requires the `Edit
        users in all account groups` or `Edit users` permission.
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /users/current:
    get:
      tags:
        - Users
      summary: Retrieve current user
      operationId: getCurrentUser
      description: Retrieves detailed information about the current user.
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /roles:
    get:
      tags:
        - Roles
      summary: List roles
      operationId: getRoles
      description: Retrieves a list of defined roles visible to the current user.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Roles'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    post:
      tags:
        - Roles
      summary: Create role
      operationId: createRole
      description: Creates a new role.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequestBody'
        required: true
      responses:
        '201':
          description: Created
          headers:
            Location:
              $ref: '#/components/headers/Location'
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/RoleDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /roles/{id}:
    get:
      tags:
        - Roles
      summary: Retrieve role
      operationId: getRole
      description: Returns detailed information about a role using its ID.
      parameters:
        - $ref: '#/components/parameters/RoleId'
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/RoleDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    put:
      tags:
        - Roles
      summary: Update role
      operationId: updateRole
      description: >-
        Updates a user-defined role using its ID.


        When updating a role, the following applies: 

        * The full list of permissions must be sent, This operation does not
        support delta-based grant or revoking of permissions. 

        * Permission definitions and details can be obtained from the
        Permissions operation.
      parameters:
        - $ref: '#/components/parameters/RoleId'
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequestBody'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/RoleDetail'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
    delete:
      tags:
        - Roles
      summary: Delete role
      operationId: deleteRole
      description: >-
        Deletes a role using its ID. The user needs appropriate permissions to
        successfully call this operation.
      parameters:
        - $ref: '#/components/parameters/RoleId'
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '204':
          $ref: '#/components/responses/204'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /audit-user-events:
    get:
      tags:
        - User Events
      summary: List activity log events
      operationId: getUserEvents
      description: >-
        Returns a list of activity log events in the current account group. 


        If `useAllPermittedAids=true` query parameter is passed and the user has
        permission `View activity log for all users in account group` the logs
        returned include events across all the account groups they belong to.


        For more information about changing the account group context, see
        [Account
        Context](https://developer.thousandeyes.com/v7/#/accountcontext).
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
        - $ref: '#/components/parameters/UseAllPermittedAids'
        - $ref: '#/components/parameters/Window'
        - $ref: '#/components/parameters/StartDateParameter'
        - $ref: '#/components/parameters/EndDateParameter'
        - $ref: '#/components/parameters/PaginationCursor'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/AuditUserEvents'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
  /permissions:
    get:
      tags:
        - Permissions
      summary: List assignable permissions
      operationId: getPermissions
      description: >-
        Users must be in a role assigned management permissions to access this
        operation. Users without management permissions who attempt to access
        this operation receive an HTTP/403 response code.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      responses:
        '200':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Permissions'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
