components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Bearer authentication token
  parameters:
    RoleId:
      name: id
      description: The ID of the desired role.
      required: true
      in: path
      schema:
        type: string
        example: '23'
    ExpandAccountGroup:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Optional parameter that specifies whether or not account group related
        resources should be expanded. By default, no expansion takes place if
        the query parameter is not passed. For example, to expand the `users`
        resource, pass the `?expand=user` query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandAccountGroupOptions'
        example:
          - user
    AccountGroupIdPath:
      name: id
      description: Identifier for the account group.
      required: true
      in: path
      schema:
        type: string
        example: '1234'
    AccountGroupId:
      name: aid
      in: query
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint. Note that you
        must be assigned to the target account group. Specifying this parameter
        without being assigned to the target account group will result in an
        error response.
      required: false
      schema:
        type: string
        example: '1234'
    UserIdPath:
      name: id
      description: Identifier for the user.
      required: true
      in: path
      schema:
        type: string
        example: '1234'
    UseAllPermittedAids:
      name: useAllPermittedAids
      in: query
      required: false
      description: Set to `true` to load data from all accounts the user has access to.
      schema:
        type: boolean
        example: false
        default: false
    Window:
      name: window
      in: query
      description: >-
        A dynamic time interval up to the current time of the request. Specify
        the interval as a number followed by an optional type: `s` for seconds
        (default if no type is specified), `m` for minutes, `h` for hours, `d`
        for days, and `w` for weeks.

        For a precise date range, use `startDate` and `endDate`.
      schema:
        type: string
        pattern: ^\d+(?:[smhdw]{1})?$
        example: 12h
    StartDateParameter:
      name: startDate
      in: query
      description: >-
        Use with the `endDate` parameter. Include the complete time (hours,
        minutes, and seconds) in UTC time zone, following the ISO 8601 date-time
        format. See the example for reference. Please note that this parameter
        can't be used with `window`.
      schema:
        type: string
        format: date-time
        example: '2022-07-17T22:00:54Z'
    EndDateParameter:
      name: endDate
      in: query
      description: >-
        Defaults to current time the request is made. Use with the `startDate`
        parameter. Include the complete time (hours, minutes, and seconds) in
        UTC time zone, following the ISO 8601 date-time format. See the example
        for reference. Please note that this parameter can't be used with
        `window`.
      schema:
        type: string
        format: date-time
        example: '2022-07-18T22:00:54Z'
    PaginationCursor:
      name: cursor
      in: query
      example: null
      description: >-
        (Optional) Opaque cursor used for pagination. Clients should use `next`
        value from `_links` instead of this parameter.
      schema:
        type: string
        example: null
    AgentId:
      name: agentId
      in: path
      description: Unique ID for the agent.
      example: '281474976710706'
      required: true
      schema:
        type: string
    AssignAgentId:
      name: agentId
      in: path
      description: Unique ID for the Enterprise Agent cluster to add new agents to.
      example: '281474976710706'
      required: true
      schema:
        type: string
    UnassignAgentId:
      name: agentId
      in: path
      description: Unique ID for the Enterprise Agent cluster to remove agents from.
      example: '281474976710706'
      required: true
      schema:
        type: string
    NotificationRuleId:
      name: notificationRuleId
      in: path
      description: Unique ID for the agent notification rule.
      example: '281474976710706'
      required: true
      schema:
        type: string
    ExpandAgent:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Optional parameter, off by default. Indicates which agent sub-resource
        to expand. For example, if you wish to expand the `clusterMembers`
        sub-resource, pass the `?expand=cluster-member` query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AgentListExpand'
        example:
          - cluster-member
    ExpandAgentDetails:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Optional parameter, off by default. Indicates which agent sub-resource
        to expand. For example, if you wish to expand the `clusterMembers`
        sub-resource, pass the `?expand=cluster-member` query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AgentDetailsExpand'
        example:
          - cluster-member
    AgentTypes:
      name: agentTypes
      in: query
      style: form
      explode: false
      description: Specifies the type of agent to request.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/CloudEnterpriseAgentType'
        example:
          - enterprise
    Labels:
      name: labels
      in: query
      style: form
      explode: false
      description: Specifies the labels of the agents to request.
      schema:
        type: array
        items:
          type: string
        example:
          - myCustomLabeledAgent
    AlertId:
      name: alertId
      in: path
      description: Unique alert ID.
      example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
      required: true
      schema:
        type: string
        format: uuid
    RuleId:
      name: ruleId
      in: path
      description: Unique alert rule ID.
      example: '127094'
      required: true
      schema:
        type: string
    WindowId:
      name: windowId
      in: path
      description: Unique window ID.
      example: '2411'
      required: true
      schema:
        type: string
    ExpandAlert:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Optional parameter on whether or not to expand alert related resources. 
        Without this parameter, there's no default expansion. For example, to
        expand the "tests" resource, use the `?expand=test` query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandAlertTestOptions'
        example:
          - test
    State:
      name: state
      in: query
      style: form
      required: false
      explode: false
      description: >-
        Optional parameter to match a specific alert state. If not specified, it
        defaults to `trigger`.
      schema:
        allOf:
          - $ref: '#/components/schemas/State'
          - example: trigger
    PaginationMax:
      name: max
      in: query
      description: (Optional) Maximum number of objects to return.
      schema:
        type: integer
        example: 5
    CredentialId:
      name: id
      description: The ID of the desired credential.
      required: true
      in: path
      schema:
        type: string
        example: '3247'
    DashboardIdPath:
      name: dashboardId
      required: true
      in: path
      description: >-
        A Identifier for a dashboard which can be obtained from the
        `/dashboards` endpoint.
      schema:
        type: string
      example: 646f4d2ce3c99b0536c3821e
    WidgetId:
      name: widgetId
      required: true
      in: path
      description: A Identifier for a widget.
      schema:
        type: string
      example: unpmg
    SnapshotIdPath:
      name: snapshotId
      required: true
      in: path
      description: >-
        A Identifier for a dashboard snapshot which can be obtained from the
        `/dashboards-snapshots` endpoint.
      schema:
        type: string
      example: d28bb71f-5a47-4783-8f12-d4b115e61b0c
    DashboardCursor:
      name: cursor
      in: query
      description: >-
        An optional pagination cursor. This parameter should not not be used
        directly. Instead, use the `_links` returned by the API. This feature is
        only available in the **Test Table** widget.
      schema:
        type: string
      example: bGFzdFJvdW5kSWQ9MTY4MTQxMDQ4MA
    DashboardMax:
      name: max
      in: query
      description: >-
        Optionally specify the maximum number of objects to retrieve. This only
        applies to the **Alert List** and **Test Table** Widgets.

        * The default for the **Alert List** widget is set by its limitBy
        configuration.

        * The default value for the **Test Table** widget is 10.
      schema:
        type: number
      example: 10
    DashboardSort:
      name: sort
      in: query
      description: >-
        Optional sorting parameter with attributes listed comma-separated. This
        only applies to the **Alert List** and **Test Table** Widgets.

        * For the **Alert List** widget, you can sort by `alertStatus` or
        `startTime`. The default is `alertStatus`.

        * For the **Test Table** widget, you can sort by `alertStatus`,
        `testName`, or `testType`. The sequence might vary from the web
        application. The default sort attribute is `alertStatus`.
      schema:
        type: string
      example: alertStatus
    DashboardOrder:
      name: order
      in: query
      description: >-
        Optional sorting order parameter that accepts either `asc` (ascending)
        or `desc` (descending) values. This only applies to the **Alert List**
        and **Test Table** Widgets.
      schema:
        $ref: '#/components/schemas/DashboardOrder'
      example: asc
    DashboardFilterSearchPattern:
      in: query
      name: searchPattern
      description: >-
        Optional search pattern parameter to filter list of dashboard filters by
        either name or description values.
      required: false
      schema:
        type: string
        example: cea-filter
    DashboardFilterIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Unique dashboard filter ID.
      example: 65bc18e8f2073a4a469cd958
    CardId:
      name: cardId
      required: true
      in: path
      description: An identifier for a card within the numbers widget.
      schema:
        type: string
      example: rvwgs
    ColumnId:
      name: columnId
      required: true
      in: path
      description: An identifier for a column within the multi-metric table widget.
      schema:
        type: string
      example: col123
    ExpandEmulatedDevice:
      name: expand
      in: query
      description: >
        Optional query parameter that controls whether user-agent templates are
        included in the response.

        By default, user-agent templates are not included. To include them, add
        `?expand=user-agent` to the request.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandEmulatedDeviceOptions'
        example:
          - user-agent
    IncludeDeleted:
      name: includeDeleted
      in: query
      description: >-
        When requesting entities, set to `true` if you want to see deleted
        entities.
      example: false
      required: false
      schema:
        type: boolean
    EndpointAgentIdPath:
      name: agentId
      in: path
      required: true
      description: The identifier of the agent to operate on.
      schema:
        $ref: '#/components/schemas/EndpointAgentId'
    ExpandEndpointAgent:
      name: expand
      in: query
      description: >
        This optional parameter allows you to control the expansion of test
        resources associated with the agent. By default, no expansion occurs
        when this query parameter is omitted.

        To expand the "clients" resource, include the query parameter
        `?expand=clients`.


        For multiple expansions, you have two options:
          
        * Separate the values with commas. For example,
        `?expandAgent=clients,tasks`.

        * Specify the parameter multiple times. For example,
        `?expandAgent=clients&expandAgent=tasks`.


        This parameter offers flexibility for users to customize the expansion
        of specific resources related to the agent.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandEndpointAgentOptions'
      example:
        - clients
        - targetVersion
        - vpnProfiles
        - networkInterfaceProfiles
        - externalMetadata
    LabelIdPath:
      name: id
      in: path
      required: true
      description: The unique identifier of the label to operate on.
      schema:
        $ref: '#/components/schemas/LabelId'
    ExpandLabel:
      name: expand
      in: query
      description: >-
        This parameter is optional and determines whether to include additional
        details in the response. To specify multiple expansions, you can either
        separate the values with commas or specify the parameter multiple times.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandLabelOptions'
      example:
        - filters
    NetworkTopologyIdPath:
      name: networkTopologyId
      description: The network topology ID.
      required: true
      in: path
      schema:
        type: string
        example: 00160:39c518560de9:1491651900:236e6f18
    IdPath:
      name: id
      description: The real user test id.
      required: true
      in: path
      schema:
        type: string
        example: 07625:1490529480:h3qJQTpl
    ExpandEndpointHttpServer:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter is optional and determines whether to expand resources
        related to test results. By default, no expansion occurs when this query
        parameter is omitted. To expand a specific resource, such as "header,"
        append `?expand=header` to the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandEndpointHttpServerOptions'
        example:
          - header
    ExpandEndpointNetwork:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter is optional and determines whether to expand resources
        related to test results. By default, no expansion occurs when this query
        parameter is omitted. To expand a specific resource, such as
        "user-profile," append `?expand=user-profile` to the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandEndpointNetworkOptions'
        example:
          - header
    ExpandEndpointDynamicNetwork:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter is optional and determines whether to expand resources
        related to test results. By default, no expansion occurs when this query
        parameter is omitted. To expand a specific resource, such as
        "user-profile," append `?expand=user-profile` to the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandEndpointDynamicNetworkOptions'
        example:
          - header
    ExpandLocalNetworkTopology:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter is optional and determines whether to expand resources
        related to local network topologies. By default, no expansion occurs
        when this query parameter is omitted. To expand a specific resource,
        such as `systemMetricDetails`, append  `?expand=system-metric-detail` to
        the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandLocalNetworkTopologyOptions'
        example:
          - system-metric-detail
    TestIdPath:
      name: testId
      description: Test ID
      required: true
      in: path
      schema:
        type: string
        example: '202701'
    AgentIdPath:
      name: agentId
      description: Agent ID
      required: true
      in: path
      schema:
        type: string
        example: '11'
    RoundIdPath:
      name: roundId
      description: Round ID
      required: true
      in: path
      schema:
        type: string
        example: '1384309800'
    PageIdPath:
      name: pageId
      description: Web page ID
      required: true
      in: path
      schema:
        type: string
        example: '281474976710706'
    TestId:
      name: testId
      in: path
      description: Unique ID of endpoint test.
      example: '584739201'
      required: true
      schema:
        type: string
    EventId:
      name: id
      in: path
      description: Unique event ID.
      example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
      required: true
      schema:
        type: string
        format: uuid
    aid:
      name: aid
      in: query
      description: Account ID
      required: false
      schema:
        type: number
      example: '123456'
    operationIdPath:
      name: id
      in: path
      description: The operation ID.
      required: true
      schema:
        type: string
      example: cb1b8033-ea2d-4e9b-a920-fe87850693cf
    connectorIdPath:
      name: id
      in: path
      description: The connector ID.
      required: true
      schema:
        type: string
      example: cb1b8033-ea2d-4e9b-a920-fe87850693cf
    ExpandTags:
      name: expand
      in: query
      description: Optional, to retrieve associated assignments
      required: false
      schema:
        example:
          - assignments
        items:
          $ref: '#/components/schemas/ExpandTagsOptions'
        type: array
      style: form
    TagIdPath:
      name: id
      in: path
      description: Tag ID
      required: true
      schema:
        type: string
      example: c6b78e57-81a2-4c5f-a11a-d96c3c664d55
    IdTemplate:
      name: id
      in: path
      description: The ID of the template
      required: true
      schema:
        maxLength: 36
        minLength: 10
        type: string
        format: uuid
        example: fcbb89a7-61cf-4616-9c4f-828fa3cb4684
    ExpandUsage:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        Expands the available resources. By default, no expansion takes place if
        the  `expand` query parameter is not passed. For example, to expand the
        "tests"  resource, pass the query '?expand=test'.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandUsageOptions'
        example:
          - test
    ExpandInstantTest:
      name: expand
      in: query
      description: >-
        (Optional) Indicates if the test sub-resources should be expanded.
        Defaults to no expansion. To expand the `agents` sub-resource, use the
        query `?expand=agent`.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandInstantTestOptions'
        example:
          - agent
    PrefixIdPath:
      name: prefixId
      description: >-
        The ID of the prefix. You can get `prefixId` from the
        `/test-results/{testId}/bgp` endpoint.
      required: true
      in: path
      schema:
        type: string
        example: '3789376546'
    ServerIdPath:
      name: serverId
      description: DNS server ID
      required: true
      in: path
      schema:
        type: string
        example: '281474976710706'
    HttpServerExpand:
      name: expand
      in: query
      style: form
      explode: false
      description: >-
        This parameter lets you decide if you want to see more details about
        test results. By default, no extra information is shown unless you use
        the query parameter. For instance, if you want more info about the
        "header," add ?expand=header to the query.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Expand'
        example:
          - certificate
    Direction:
      name: direction
      in: query
      style: form
      description: >-
        Choose the direction for the metrics you want: [`from-target`,
        `to-target`, `bidirectional`]. This applies when you're doing
        bidirectional Agent-to-Agent tests. For bidirectional data, you'll get
        combined results; otherwise, you'll get data for one direction. If you
        try to get unidirectional test data with an incorrect direction
        parameter, it will trigger an error response.
      schema:
        $ref: '#/components/schemas/TestDirection'
    PathVisDirection:
      name: direction
      in: query
      style: form
      description: >-
        Choose the direction for the metrics you want: [`from-target`,
        `to-target`]. This applies when you're doing bidirectional
        Agent-to-Agent tests. Omitting the parameter will default the results to
        both `from-target` and `to-target` values (bidirectional); otherwise,
        you'll get data for one direction. If you try to get unidirectional test
        data with an incorrect direction parameter, it will trigger an error
        response.
      schema:
        $ref: '#/components/schemas/PathVisDirection'
    InterfaceGroupId:
      name: interfaceGroupId
      description: ID of the network path vis interface group
      required: true
      in: path
      schema:
        type: string
        example: '281474976710706'
    ExpandTest:
      name: expand
      in: query
      description: >-
        Optional parameter on whether or not to expand the test sub-resources.
        By default no expansion is going to take place if the query parameter is
        not present. If the user wishes to expand the `agents` sub-resource,
        they need to pass the `?expand=agent` query.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandTestOptions'
        example:
          - agent
          - monitor
    ExpandBgpTest:
      name: expand
      in: query
      description: >-
        Optional parameter on whether or not to expand the test sub-resources.
        By default no expansion takes place if the query parameter is not
        present. To expand the `monitors` sub-resource, pass the
        `?expand=monitor` query.
      required: false
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ExpandBgpTestOptions'
        example:
          - alert-rule
          - monitor
    VersionId:
      name: versionId
      in: query
      description: >-
        The unique identifier for a specific version of the test settings. If
        provided, returns the test configuration as it existed at that version.
        To retrieve available version IDs, use the `/tests/{testId}/history`
        endpoint. If not specified, the current version of the test settings is
        returned.
      required: false
      schema:
        type: string
        example: '1234'
  schemas:
    ExpandAccountGroupOptions:
      type: string
      enum:
        - user
        - agent
    AccountGroupToken:
      type: string
      description: >-
        The account group token is an alphanumeric string used to bind an
        Enterprise Agent to a specific account group. This token is not a
        password that must be kept secret. You can retrieve your
        `AccountGroupToken` from the `/account-groups/{id}` endpoint.
      example: 6j052y4vfgyuhefghue
    AccountGroupInfo:
      allOf:
        - $ref: '#/components/schemas/AccountGroup'
        - type: object
          properties:
            isCurrentAccountGroup:
              type: boolean
              description: >-
                Indicates whether the requested aid is the context of the
                current account.
              example: true
            isDefaultAccountGroup:
              type: boolean
              description: >-
                Indicates whether the aid is the default one for the requesting
                user.
              example: true
            organizationName:
              type: string
              description: >-
                (Optional) The name of the organization associated with the
                account group.
            orgId:
              type: string
              description: >-
                (Optional) The ID for the organization associated with the
                account group.
              example: '12345'
    CreatedAccountGroup:
      allOf:
        - $ref: '#/components/schemas/AccountGroupInfo'
        - type: object
          properties:
            users:
              type: array
              items:
                $ref: '#/components/schemas/UserAccountGroup'
            _links:
              $ref: '#/components/schemas/SelfLinks'
    AccountGroupDetail:
      allOf:
        - $ref: '#/components/schemas/CreatedAccountGroup'
        - type: object
          properties:
            agents:
              type: array
              items:
                $ref: '#/components/schemas/EnterpriseAgent'
            accountToken:
              type: string
              $ref: '#/components/schemas/AccountGroupToken'
    AccountGroupRequest:
      type: object
      properties:
        accountGroupName:
          type: string
          description: The name of the account group
          example: My testing account group
        agents:
          type: array
          description: >-
            To grant access to enterprise agents, specify the agent list. Note
            that this is not an additive list - the full list must be specified
            if changing access to agents.
          items:
            type: string
          example:
            - '105'
            - '719'
      required:
        - accountGroupName
    AccountGroups:
      type: object
      properties:
        accountGroups:
          type: array
          items:
            $ref: '#/components/schemas/AccountGroupInfo'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    AccountGroupRole:
      type: object
      properties:
        accountGroup:
          $ref: '#/components/schemas/AccountGroup'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    UserAccountGroupRole:
      type: object
      properties:
        accountGroupId:
          type: string
          description: Unique ID of the account group.
          example: '315'
        roleIds:
          type: array
          description: Unique role IDs.
          items:
            type: string
            description: Unique role ID.
            example: '57'
          example:
            - '57'
            - '1140'
    UserRequest:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        loginAccountGroupId:
          type: string
          description: Unique ID of the login account group.
          example: '691'
        accountGroupRoles:
          type: array
          items:
            $ref: '#/components/schemas/UserAccountGroupRole'
        allAccountGroupRoleIds:
          type: array
          description: Unique IDs representing the roles.
          items:
            type: string
            description: Unique role ID.
            example: '57'
          example:
            - '57'
            - '1140'
    User:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        uid:
          type: string
          description: Unique ID of the user.
          example: '245'
        dateRegistered:
          type: string
          description: UTC date the user registered their account (ISO date-time format).
          format: date-time
          example: '2020-07-17T22:00:54Z'
        loginAccountGroup:
          $ref: '#/components/schemas/AccountGroup'
    ExtendedUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            lastLogin:
              type: string
              description: UTC last login of the user (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
    Users:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/ExtendedUser'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    CreatedUser:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            loginAccountGroup:
              $ref: '#/components/schemas/AccountGroup'
            accountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/AccountGroupRole'
            allAccountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
            _links:
              $ref: '#/components/schemas/SelfLinks'
    UserDetail:
      allOf:
        - $ref: '#/components/schemas/ExtendedUser'
        - type: object
          properties:
            loginAccountGroup:
              $ref: '#/components/schemas/AccountGroup'
            accountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/AccountGroupRole'
            allAccountGroupRoles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
            _links:
              $ref: '#/components/schemas/SelfLinks'
    UserAccountGroup:
      type: object
      properties:
        name:
          type: string
          description: User's display name.
          example: User X
        email:
          type: string
          description: User's email address.
          format: email
          example: userx@thousandeyes.com
        uid:
          type: string
          description: Unique ID representing the user.
          example: '235'
        lastLogin:
          type: string
          description: User's UTC last login date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        dateRegistered:
          type: string
          description: User's UTC registration date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
    BaseRole:
      type: object
      properties:
        name:
          type: string
          description: Name of the role.
          example: Organization Admin
        roleId:
          type: string
          description: Unique ID representing the role.
          example: '35'
        isBuiltin:
          type: boolean
          description: >-
            Flag indicating if the role is built-in (Account Admin, Organization
            Admin, Regular User).
    Role:
      type: object
      allOf:
        - $ref: '#/components/schemas/BaseRole'
        - properties:
            hasManagementPermissions:
              type: boolean
              description: Flag indicating whether the user has management permissions.
    Permission:
      type: object
      properties:
        label:
          type: string
          description: Label corresponding to the permission.
          example: View reports
        permissionId:
          type: string
          description: Unique ID representing the permission.
          example: '56'
        isManagementPermission:
          description: >-
            Flag indicating whether the permission is classified as a management
            permission.
          type: boolean
        permission:
          type: string
          description: Permission name
          example: REPORT_SNAPSHOTS_READ
    PermissionsCollection:
      type: array
      items:
        $ref: '#/components/schemas/Permission'
      example:
        - label: View reports
          permissionId: '1'
          isManagementPermission: true
          permission: REPORT_READ
        - label: View snapshots
          permissionId: '51'
          isManagementPermission: false
          permission: REPORT_SNAPSHOTS_READ
    Permissions:
      type: object
      properties:
        permissions:
          $ref: '#/components/schemas/PermissionsCollection'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    RoleDetail:
      allOf:
        - $ref: '#/components/schemas/BaseRole'
        - type: object
          properties:
            permissions:
              $ref: '#/components/schemas/PermissionsCollection'
            _links:
              $ref: '#/components/schemas/SelfLinks'
    Roles:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/Role'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    RoleRequestBody:
      type: object
      properties:
        name:
          type: string
          description: Name of the role.
          example: Organization Admin
        permissions:
          type: array
          description: >-
            Contains list of test permission IDs (get `permissionId` from
            `/permissions` operation)
          items:
            type: string
          example:
            - '56'
            - '315'
    UserEvent:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/AccountGroupId'
        accountGroupName:
          type: string
          description: Account group name
          example: Account A
        date:
          type: string
          description: UTC event date (ISO date-time format).
          format: date-time
          example: '2020-07-17T22:00:54Z'
        event:
          type: string
          description: Event type.
          example: Login failed.
        ipAddress:
          type: string
          description: Source IP address of the user.
          example: 99.128.0.0/11
        uid:
          type: string
          description: Unique id representing the user.
          example: '245'
        user:
          type: string
          description: The name and email address of the user.
          example: API Sandbox User (noreply@thousandeyes.com)
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
    Resource:
      type: object
      properties:
        type:
          type: string
          description: >-
            Type of resource affected. Can be “testName”, “reportTitle”,
            “userDisplayName”, “alertRuleName”, etc.
        name:
          type: string
          description: Name of the affected resource.
    AuditUserEvents:
      type: object
      properties:
        auditEvents:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/UserEvent'
          example:
            - accountGroupName: API Sandbox
              aid: '1234'
              date: '2020-07-17T21:54:54Z'
              event: Report created.
              ipAddress: 99.128.0.0/11
              uid: '1234'
              user: API Sandbox User (noreply@thousandeyes.com)
              resources:
                - name: My New report
                  type: reportTitle
                - name: Other Report
                  type: testName
            - accountGroupName: API Sandbox
              aid: '1234'
              date: '2020-07-17T22:00:54Z'
              event: Login failed.
              ipAddress: 99.128.0.0/11
              uid: '1234'
              user: API Sandbox User (noreply@thousandeyes.com)
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    AccountGroupId:
      type: string
      description: >-
        A unique identifier associated with your account group. You can retrieve
        your `AccountGroupId` from the `/account-groups` endpoint.
      example: '1234'
    AccountGroup:
      type: object
      properties:
        aid:
          $ref: '#/components/schemas/AccountGroupId'
        accountGroupName:
          type: string
          description: Account group name
          example: Account A
    Link:
      type: object
      description: A hyperlink from the containing resource to a URI.
      required:
        - href
      properties:
        href:
          type: string
          description: Its value is either a URI [RFC3986] or a URI template [RFC6570].
          example: https://api.thousandeyes.com/v7/link/to/resource/id
        templated:
          type: boolean
          description: >-
            Should be true when the link object's "href" property is a URI
            template.
        type:
          type: string
          description: >-
            Used as a hint to indicate the media type expected when
            dereferencing the target resource.
        deprecation:
          type: string
          description: >-
            Its presence indicates that the link is to be deprecated at a future
            date. Its value is a URL that should provide further information
            about the deprecation.
        name:
          type: string
          description: >-
            Its value may be used as a secondary key for selecting link objects
            that share the same relation type.
        profile:
          type: string
          description: A URI that hints about the profile of the target resource.
        title:
          type: string
          description: Intended for labelling the link with a human-readable identifier
        hreflang:
          type: string
          description: Indicates the language of the target resource
    SelfLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/Link'
    Error:
      type: object
      properties:
        type:
          type: string
          description: >-
            A URI reference that identifies the problem type. When this member
            is not present, its value is assumed to be "about:blank".
        title:
          type: string
          description: A short, human-readable summary of the problem type.
        status:
          type: integer
          description: >-
            The HTTP status code generated by the origin server for this
            occurrence of the problem.
        detail:
          type: string
          description: >-
            A human-readable explanation specific to this occurrence of the
            problem.
        instance:
          type: string
          description: >-
            A URI reference that identifies the specific occurrence of the
            problem.
    ValidationErrorItem:
      type: object
      properties:
        code:
          type: string
          description: >-
            (Optional) A unique error type/code that can be referenced in the
            documentation for further details.
        field:
          type: string
          description: Identifies the field that triggered this particular error.
        message:
          type: string
          description: A short, human-readable summary of the error.
    ValidationError:
      type: object
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            errors:
              nullable: true
              type: array
              description: >-
                (Optional) When multiple errors occur, the details for each
                error are listed.
              items:
                $ref: '#/components/schemas/ValidationErrorItem'
    UnauthorizedError:
      type: object
      properties:
        error:
          type: string
          example: invalid_token
        error_description:
          type: string
          example: Invalid access token
    CloudEnterpriseAgentType:
      type: string
      description: Type of the agent.
      enum:
        - cloud
        - enterprise-cluster
        - enterprise
      example: enterprise-cluster
      readOnly: true
    AgentBase:
      type: object
      properties:
        ipAddresses:
          type: array
          description: Array of private IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 99.139.65.220
            - 9bbd:8a0a:a257:5876:288b:6cb2:3f36:64ce
        publicIpAddresses:
          type: array
          description: Array of public IP addresses.
          readOnly: true
          items:
            type: string
          example:
            - 192.168.1.78
            - f9b2:3a21:f25c:d300:03f4:586d:f8d6:4e1c
        network:
          type: string
          description: Network (including ASN) of agent’s public IP.
          example: AT&T Services, Inc. (AS 7018)
          readOnly: true
    SimpleAgent:
      type: object
      allOf:
        - $ref: '#/components/schemas/AgentBase'
        - type: object
          properties:
            agentId:
              type: string
              description: Unique ID of the agent.
              example: '281474976710706'
              readOnly: true
            agentName:
              type: string
              description: Name of the agent.
              example: thousandeyes-stg-va-254
            location:
              type: string
              description: Location of the agent.
              example: San Francisco Bay Area
              readOnly: true
            countryId:
              type: string
              description: 2-digit ISO country code
              example: US
              readOnly: true
            enabled:
              type: boolean
              description: Flag indicating if the agent is enabled.
              example: true
            prefix:
              type: string
              description: Prefix containing agents public IP address.
              example: 99.128.0.0/11
              readOnly: true
            verifySslCertificates:
              type: boolean
              description: >-
                Flag indicating if has normal SSL operations or  if instead it's
                set to ignore SSL errors on browserbot-based tests.
              example: true
              readOnly: true
    AgentResponse:
      allOf:
        - required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/CloudEnterpriseAgentType'
        - $ref: '#/components/schemas/SimpleAgent'
    TestIds:
      type: array
      description: List of test IDs assigned to the agent.
      items:
        type: integer
        format: int64
      readOnly: true
      example:
        - 281474976710706
    TestInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: Interval between test runs in seconds.
      default: 60
      example: 60
    Enabled:
      type: boolean
      description: Test is enabled.
      example: true
      default: true
    TestCreatedBy:
      type: string
      description: User that created the test.
      example: user@user.com
      readOnly: true
    TestCreatedDate:
      type: string
      format: date-time
      description: UTC created date (ISO date-time format).
      example: '2022-07-17T22:00:54Z'
      readOnly: true
    TestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
      description: >-
        This is a read only value, as test type is implicit in the test creation
        url.
      readOnly: true
      example: agent-to-server
    TestSelfLink:
      allOf:
        - $ref: '#/components/schemas/Link'
        - description: Reference to the test.
          example:
            href: https://api.thousandeyes.com/v7/tests/{type}/281474976710706
    TestResults:
      type: array
      description: Reference to the test results.
      items:
        $ref: '#/components/schemas/Link'
      example:
        - href: https://api.thousandeyes.com/v7/test-results/281474976710706/network
        - href: >-
            https://api.thousandeyes.com/v7/test-results/281474976710706/path-vis
    TestLinks:
      type: object
      description: A list of links that can be accessed to get more information
      properties:
        self:
          $ref: '#/components/schemas/TestSelfLink'
        testResults:
          $ref: '#/components/schemas/TestResults'
      readOnly: true
    SimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Enabled'
        createdBy:
          $ref: '#/components/schemas/TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/TestType'
        _links:
          $ref: '#/components/schemas/TestLinks'
    ErrorDetailCode:
      type: string
      description: Code for the agent error.
      enum:
        - agent-version-outdated
        - browserbot-version-outdated
        - appliance-version-outdated
        - clock-offset
        - os-end-of-installation-support
        - os-end-of-support
        - os-end-of-life
        - nat-traversal-error
      example: agent-version-outdated
      readOnly: true
    ErrorDetail:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorDetailCode'
        description:
          type: string
          description: Description for the agent error.
          example: 'Agent Version 0.1.1 (latest: 1.0.0)'
          readOnly: true
    EnterpriseAgentState:
      type: string
      description: State of the agent.
      enum:
        - online
        - offline
        - disabled
      example: online
      readOnly: true
    ClusterMember:
      allOf:
        - $ref: '#/components/schemas/AgentBase'
        - type: object
          properties:
            memberId:
              type: string
              description: Unique ID of the cluster member
              example: '10'
              readOnly: true
            name:
              type: string
              description: Name of the cluster member
              example: Cluster member name
              readOnly: true
            errorDetails:
              type: array
              description: >-
                If an enterprise agent or a cluster member presents at least one
                error, the errors will be shown as an array of entries in the
                errorDetails field (Enterprise Agents and Enterprise Cluster
                members only)
              items:
                $ref: '#/components/schemas/ErrorDetail'
              readOnly: true
            lastSeen:
              type: string
              description: UTC last seen date (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
              readOnly: true
            agentState:
              $ref: '#/components/schemas/EnterpriseAgentState'
            targetForTests:
              type: string
              format: ipv4
              description: Test target IP address.
              example: 1.1.1.1
            utilization:
              type: integer
              description: >-
                Shows overall utilization percentage (online Enterprise Agents
                and Enterprise Clusters only).
              example: 25
              readOnly: true
    ClusterMembers:
      type: array
      description: >-
        If an enterprise agent is clustered, detailed information about each
        cluster member will be shown as array entries in the clusterMembers
        field. This field is not shown for Enterprise Agents in standalone mode,
        or for Cloud Agents.
      items:
        $ref: '#/components/schemas/ClusterMember'
      readOnly: true
    EnterpriseAgentIpv6Policy:
      type: string
      description: IP version policy, (Enterprise Agents and Enterprise Clusters only)
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
      example: force-ipv4
    InterfaceIpMapping:
      type: object
      properties:
        interfaceName:
          type: string
          description: Name of the mapping
          example: wlp4s0
          readOnly: true
        ipAddresses:
          type: array
          description: Array of ipAddress entries
          items:
            type: string
          example:
            - 73.252.207.219
            - 2601:646:300:3ae0::b977
          readOnly: true
    EnterpriseAgentData:
      type: object
      properties:
        testIds:
          $ref: '#/components/schemas/TestIds'
        tests:
          type: array
          description: List of tests. See `/tests` for more information.
          items:
            $ref: '#/components/schemas/SimpleTest'
        clusterMembers:
          $ref: '#/components/schemas/ClusterMembers'
        utilization:
          type: integer
          description: >-
            Shows overall utilization percentage (online Enterprise Agents and
            Enterprise Clusters only).
          example: 25
          readOnly: true
        accountGroups:
          type: array
          description: >-
            List of account groups. See /accounts-groups to pull a list of
            account IDs
          items:
            $ref: '#/components/schemas/AccountGroup'
        ipv6Policy:
          $ref: '#/components/schemas/EnterpriseAgentIpv6Policy'
        errorDetails:
          type: array
          description: >-
            If an enterprise agent or a cluster member presents at least one
            error, the errors will be shown as an array of entries in the
            errorDetails field (Enterprise Agents and Enterprise Cluster members
            only)
          items:
            $ref: '#/components/schemas/ErrorDetail'
          readOnly: true
        hostname:
          type: string
          description: Fully qualified domain name of the agent (Enterprise Agents only)
          example: thousandeyes.com
          readOnly: true
        lastSeen:
          type: string
          description: UTC last seen date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        agentState:
          $ref: '#/components/schemas/EnterpriseAgentState'
        keepBrowserCache:
          type: boolean
          description: Flag indicating if the agent retains cache.
          example: true
        createdDate:
          type: string
          description: UTC Agent creation date (ISO date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
          readOnly: true
        targetForTests:
          type: string
          format: ipv4
          description: Test target IP address.
          example: 1.1.1.1
        localResolutionPrefixes:
          type: array
          description: >-
            To perform rDNS lookups for public IP ranges, this field represents
            the public IP ranges. The range must be in CIDR notation; for
            example, 10.1.1.0/24. Maximum of 5 prefixes allowed (Enterprise
            Agents and Enterprise Agent clusters only).
          items:
            type: string
            example: 10.2.3.3/24
        interfaceIpMapping:
          type: array
          items:
            $ref: '#/components/schemas/InterfaceIpMapping'
          readOnly: true
    EnterpriseAgent:
      allOf:
        - $ref: '#/components/schemas/AgentResponse'
        - $ref: '#/components/schemas/EnterpriseAgentData'
    StartDate:
      type: string
      format: date-time
      example: '2022-07-17T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `startDate` parameter,  the client
        will also receive the `startDate` field indicating the UTC start date of
        the data's time range being retrieved  (ISO date-time format).
      readOnly: true
    EndDate:
      type: string
      format: date-time
      example: '2022-07-18T22:00:54Z'
      description: >-
        (Optional) When passing `window` or `endDate` parameter,  the client
        will also receive the `endDate` field indicating the UTC end date of the
        data's time range being retrieved  (ISO date-time format).
      readOnly: true
    PaginationLinks:
      type: object
      description: A links object containing pagination related link(s).
      properties:
        previous:
          $ref: '#/components/schemas/Link'
        next:
          $ref: '#/components/schemas/Link'
        self:
          $ref: '#/components/schemas/Link'
    CloudEnterpriseAgents:
      type: object
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/CloudEnterpriseAgent'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    CloudEnterpriseAgent:
      anyOf:
        - $ref: '#/components/schemas/AgentResponse'
        - $ref: '#/components/schemas/EnterpriseAgent'
    CloudAgentType:
      type: string
      description: Cloud agent type.
      example: cloud
      pattern: ^cloud$
    EnterpriseAgentType:
      type: string
      description: Enterprise agent type.
      example: enterprise
      pattern: ^enterprise$
    EnterpriseClusterAgentType:
      type: string
      description: Enterprise Cluster agent type.
      example: enterprise-cluster
      pattern: ^enterprise-cluster$
    AgentClusterAssignRequest:
      type: object
      properties:
        agents:
          type: array
          description: Contains list of agent IDs (get `agentId` from `/agents` operation)
          items:
            type: string
            description: Agent ID
          example:
            - '281474976710706'
    AgentClusterUnassignRequest:
      type: object
      properties:
        members:
          type: array
          description: >-
            Contains list of member IDs. (get `memberId` from
            `/agents/{agentId}` operation)
          items:
            type: string
            description: member ID
          example:
            - '281474976710706'
    AgentTestsAssignRequest:
      type: object
      properties:
        testIds:
          type: array
          description: >
            List of test IDs to assign.   You can retrieve available `testIds`
            using the `/agents` endpoint with the `expand=testIds` query
            parameter.
          items:
            type: string
            description: Test ID
          example:
            - '281474976710706'
    AgentDetails:
      oneOf:
        - $ref: '#/components/schemas/CloudAgentDetail'
        - $ref: '#/components/schemas/EnterpriseAgentDetail'
        - $ref: '#/components/schemas/EnterpriseAgentClusterDetail'
      discriminator:
        propertyName: agentType
        mapping:
          cloud: '#/components/schemas/CloudAgentDetail'
          enterprise: '#/components/schemas/EnterpriseAgentDetail'
          enterprise-cluster: '#/components/schemas/EnterpriseAgentClusterDetail'
    CloudAgentDetail:
      type: object
      allOf:
        - $ref: '#/components/schemas/SimpleAgent'
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/CloudAgentType'
            tests:
              type: array
              description: List of tests. See `/tests` for more information.
              items:
                $ref: '#/components/schemas/SimpleTest'
            labels:
              type: array
              description: List of labels - see `/labels` for more information.
              items:
                $ref: '#/components/schemas/AgentLabel'
              readOnly: true
            _links:
              $ref: '#/components/schemas/SelfLinks'
    EnterpriseAgentDetail:
      allOf:
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/EnterpriseAgentType'
            _links:
              $ref: '#/components/schemas/SelfLinks'
        - $ref: '#/components/schemas/SimpleEnterpriseAgent'
        - $ref: '#/components/schemas/EnterpriseAgentResponseExpands'
    EnterpriseAgentClusterDetail:
      allOf:
        - type: object
          required:
            - agentType
          properties:
            agentType:
              $ref: '#/components/schemas/EnterpriseClusterAgentType'
            _links:
              $ref: '#/components/schemas/SelfLinks'
        - $ref: '#/components/schemas/SimpleEnterpriseAgent'
        - $ref: '#/components/schemas/EnterpriseAgentResponseExpands'
    EnterpriseAgentResponseExpands:
      type: object
      properties:
        testIds:
          $ref: '#/components/schemas/TestIds'
        tests:
          type: array
          description: List of tests. See `/tests` for more information.
          items:
            $ref: '#/components/schemas/SimpleTest'
        notificationRules:
          type: array
          description: List of notification rule objects configured on agent
          items:
            $ref: '#/components/schemas/NotificationRules'
        labels:
          type: array
          description: List of labels. See `/labels` for more information.
          items:
            $ref: '#/components/schemas/AgentLabel'
          readOnly: true
    AgentRequest:
      type: object
      properties:
        agentName:
          type: string
          description: Name of the agent.
          example: thousandeyes-stg-va-254
        enabled:
          type: boolean
          description: Flag indicating if the agent is enabled.
          example: true
        accountGroups:
          type: array
          description: >-
            Contains a list of account groups IDs. See `/accounts-groups` for a
            list of account IDs
          items:
            type: string
          example:
            - '1234'
            - '1'
        ipv6Policy:
          $ref: '#/components/schemas/AgentIpv6Policy'
        keepBrowserCache:
          type: boolean
          description: Flag indicating if the agent retains cache.
          example: true
        targetForTests:
          type: string
          format: ipv4
          description: Test target IP address.
          example: 1.1.1.1
        localResolutionPrefixes:
          type: array
          description: >-
            Public IP ranges for rDNS lookups. The range must be in CIDR
            notation; for example, 10.1.1.0/24. Maximum of 5 prefixes allowed
            (Enterprise Agents and Enterprise Agent clusters only).
          items:
            type: string
          example:
            - 10.2.3.3/24
            - 10.2.3.3/25
        tests:
          type: array
          description: >-
            Contains list of test IDs. See `/tests` to pull a list of available
            tests.
          items:
            type: string
          example:
            - '12313145'
            - '12345'
    AgentIpv6Policy:
      type: string
      description: IP version policy, (Enterprise Agents and Enterprise Clusters only)
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
      example: force-ipv4
    ListNotificationRulesResponse:
      allOf:
        - $ref: '#/components/schemas/NotificationRules'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    NotificationRules:
      type: object
      properties:
        agentAlertRules:
          type: array
          items:
            $ref: '#/components/schemas/NotificationRule'
          example:
            - ruleId: '281474976710706'
              ruleName: Default Agent Offline Notification
              expression: ((lastContact >= 30 min))
              notifyOnClear: true
              isDefault: false
            - ruleId: '281474976710709'
              ruleName: Test Rule
              expression: ((lastContact >= 40 min))
              notifyOnClear: true
              isDefault: true
    NotificationRule:
      type: object
      properties:
        ruleId:
          type: string
          description: Agent notification rule ID
          example: '281474976710706'
          readOnly: true
        ruleName:
          type: string
          description: Name of the agent notification rule
          example: Default Agent Offline Notification
        expression:
          type: string
          description: Expression of agent notification rule
          example: ((lastContact >= 30 min))
        notifyOnClear:
          type: boolean
          description: Send notification when notification clears
          example: true
        isDefault:
          type: boolean
          description: >-
            Agent notification rule will be automatically included on all new
            Enterprise Agents.
          example: false
    NotificationRuleDetail:
      allOf:
        - $ref: '#/components/schemas/NotificationRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/AgentNotification'
            agents:
              type: array
              items:
                $ref: '#/components/schemas/AgentResponse'
            _links:
              $ref: '#/components/schemas/SelfLinks'
    AgentNotification:
      type: object
      description: Alert notification object.
      properties:
        email:
          $ref: '#/components/schemas/AlertEmail'
        thirdParty:
          type: array
          items:
            $ref: '#/components/schemas/AlertIntegrationBase'
        webhook:
          type: array
          items:
            $ref: '#/components/schemas/AlertIntegrationBase'
    AgentProxies:
      type: object
      properties:
        agentProxies:
          type: array
          items:
            $ref: '#/components/schemas/AgentProxy'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    AgentProxy:
      type: object
      properties:
        aid:
          type: string
          description: Account id that this proxy configuration belongs to
          example: '1234'
        authType:
          $ref: '#/components/schemas/ProxyAuthType'
        bypassList:
          type: array
          description: >-
            A list of hostnames, network prefixes, or wildcards used to
            determine which test targets should not be proxied. If all tests
            should be proxied, leave empty.
          items:
            type: string
          example:
            - 10.0.0.0/16
            - '*.thousandeyes.com'
        lastModified:
          type: string
          description: >-
            Last modification timestamp of the proxy. Expressed in UTC (ISO
            date-time format).
          format: date-time
          example: '2022-07-17T22:00:54Z'
        location:
          type: string
          description: >-
            The location of the proxy. If proxyType is `static` use the format
            `hostname:port`. If location is `pac`, then specify the URL where
            the PAC file can be obtained.
          example: proxy.thousandeyes.com:3128
        isLocalConfigured:
          type: boolean
          description: >-
            Set to `true` if this proxy configuration comes from the agent’s
            config file. Specify `false` if the proxy configuration was created
            in the ThousandEyes application.
          example: true
        name:
          type: string
          description: Expression of agent notification rule.
          example: Test Proxy - Auth Type - BASIC
        password:
          type: string
          format: password
          description: Password for proxy authentication
          example: '**********'
        proxyId:
          type: string
          description: Agent proxy's unique ID.
          example: '281474976710706'
        type:
          $ref: '#/components/schemas/ProxyType'
        user:
          type: string
          description: Username for proxy authentication.
          example: user1
    ProxyAuthType:
      type: string
      description: The type of authentication the proxy requires
      enum:
        - basic
        - ntlm
        - kerberos
        - unknown
      example: basic
    ProxyType:
      type: string
      description: The type of proxy, STATIC or PAC.
      enum:
        - static
        - pac
      example: static
    AlertEmail:
      type: object
      properties:
        message:
          type: string
          description: Message used for email notification.
          example: This test is failing, check as soon as possible.
        recipients:
          type: array
          description: List of recipients emails that will be notified.
          items:
            type: string
          example:
            - user1@thousandeyes.com
            - user2@cisco.com
    AlertIntegrationBase:
      type: object
      properties:
        integrationId:
          type: string
          description: Unique ID of the integration.
          example: wb-78
        integrationName:
          type: string
          description: Name of the integration.
          example: integrationSlack1
        integrationType:
          $ref: '#/components/schemas/AlertIntegrationType'
        target:
          type: string
          description: Target URL of the integration.
          example: https://hooks.slack.com/services/asd/0VqDYEpidpHVAK397x8PBsmZ
        authMethod:
          type: string
          description: (PagerDuty only) Authentication method.
          example: Basic
        authUser:
          type: string
          description: (PagerDuty only) Authentication user.
          example: user123
        authToken:
          type: string
          description: (PagerDuty only) Authentication token.
          example: 0VqDYEpidpHVAK397x8PBsmZ
        channel:
          type: string
          description: (Slack only) Slack `#channel` or `@user`.
          example: '#slackChannel'
    AlertIntegrationType:
      type: string
      description: Type of the alert integration
      enum:
        - pager-duty
        - slack
      example: slack
    AgentLabel:
      type: object
      readOnly: true
      properties:
        labelId:
          type: string
          description: Label Id.
          example: '11'
        name:
          type: string
          description: Name of the label.
          example: Label name
    AgentListExpand:
      type: string
      enum:
        - cluster-member
        - test
        - test-ids
    AgentDetailsExpand:
      type: string
      enum:
        - cluster-member
        - test
        - test-ids
        - notification-rule
    SimpleEnterpriseAgent:
      allOf:
        - $ref: '#/components/schemas/SimpleAgent'
        - $ref: '#/components/schemas/EnterpriseAgentData'
    AlertSimpleTest:
      description: >-
        Each test includes additional fields depending on its `type`. Refer
        `/tests/{type}` endpoint to know the set of fields returned by a given
        `type`.
      additionalProperties: true
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Enabled'
        createdBy:
          $ref: '#/components/schemas/TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >-
            Indicates if the test is a saved event.

            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/AlertTestType'
        _links:
          $ref: '#/components/schemas/TestLinks'
    AlertTestType:
      type: string
      enum:
        - api
        - agent-to-agent
        - agent-to-server
        - bgp
        - http-server
        - page-load
        - web-transactions
        - ftp-server
        - dns-trace
        - dns-server
        - dnssec
        - sip-server
        - voice
        - endpoint-http-server
        - endpoint-network-server
        - endpoint-path-trace
      description: Valid Alert Types for which to return test links.
      readOnly: true
      example: agent-to-server
    ExpandAlertTestOptions:
      type: string
      enum:
        - test
    Rules:
      type: object
      properties:
        alertRules:
          type: array
          items:
            $ref: '#/components/schemas/BaseRule'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    BaseRule:
      type: object
      required:
        - ruleName
        - expression
        - alertType
        - roundsViolatingRequired
        - roundsViolatingOutOf
      properties:
        ruleId:
          $ref: '#/components/schemas/RuleId'
        ruleName:
          type: string
          description: Name of the alert rule.
          example: The End of the Internet
        expression:
          type: string
          description: The expression of the alert rule.
          example: ((hops((hopDelay >= 100 ms))))
        description:
          type: string
          description: A description of the alert rule.
          example: A rule description string
        direction:
          $ref: '#/components/schemas/AlertDirection'
        notifyOnClear:
          type: boolean
          description: Send notification when alert clears.
          example: true
        isDefault:
          type: boolean
          description: >-
            If set to `true`, this alert rule becomes the default for its test
            type and is automatically applied to newly created tests with
            relevant metrics. Only one default alert rule is allowed per test
            type.
          example: true
        alertType:
          $ref: '#/components/schemas/AlertType'
        alertGroupType:
          $ref: '#/components/schemas/AlertGroupType'
        minimumSources:
          type: integer
          description: >-
            The minimum number of agents or monitors that must meet the
            specified criteria to trigger the alert.
          example: 10
        minimumSourcesPct:
          type: integer
          description: >-
            The minimum percentage of all assigned agents or monitors that must
            meet the specified criteria to trigger the alert.
          example: 99
        roundsViolatingMode:
          $ref: '#/components/schemas/AlertRoundsViolationMode'
        roundsViolatingOutOf:
          type: integer
          description: Specifies the divisor (y value) in the “X of Y times” condition.
          example: 5
        roundsViolatingRequired:
          type: integer
          description: Specifies the numerator (x value) in the “X of Y times” condition.
          example: 2
        includeCoveredPrefixes:
          type: boolean
          description: >-
            Set true to include covered prefixes in the BGP alert rule. Only
            applicable to BGP alert rules.
          example: true
        sensitivityLevel:
          $ref: '#/components/schemas/SensitivityLevel'
        severity:
          $ref: '#/components/schemas/Severity'
        endpointAgentIds:
          description: >-
            An array of endpoint agent IDs associated with the rule (get `id`
            from `/endpoint/agents` API). This is applicable when
            `alertGroupType` is `browser-session`.
          type: array
          items:
            description: Unique ID of the agent.
            type: string
            example: '281474976710706'
        endpointLabelIds:
          description: >-
            An array of label IDs used to assign specific Endpoint Agents to the
            test (get `id` from `/endpoint/labels`). This is applicable when
            `alertGroupType` is `browser-session`.
          type: array
          items:
            description: An Endpoint label ID.
            type: string
            example: '123456'
        visitedSitesFilter:
          description: >-
            A list of website domains visited during the session. This is
            applicable when `alertGroupType` is `browser-session`.
          type: array
          items:
            type: string
          example:
            - app.thousandeyes.com
    Rule:
      allOf:
        - $ref: '#/components/schemas/RuleDetailUpdate'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    RuleDetail:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/AlertNotification'
            tests:
              type: array
              items:
                $ref: '#/components/schemas/AlertSimpleTest'
              readOnly: true
            _links:
              $ref: '#/components/schemas/SelfLinks'
    RuleDetailUpdate:
      allOf:
        - $ref: '#/components/schemas/BaseRule'
        - type: object
          properties:
            notifications:
              $ref: '#/components/schemas/AlertNotification'
            testIds:
              $ref: '#/components/schemas/RuleTestIds'
    AlertMeta:
      type: object
      properties:
        version:
          type: integer
          format: int32
          description: >-
            Indicates the number of times this alert has re-entered the
            'trigger' state after being suppressed. It starts at 1 and
            increments whenever a real-time ASW ends and the alert conditions
            remain active.
          example: 1
    BaseAlert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: A unique ID for each individual alert occurrence.
          example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
          readOnly: true
        alertType:
          $ref: '#/components/schemas/AlertType'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        violationCount:
          type: integer
          description: Number of sources that meet the alert criteria.
          example: 2
        duration:
          type: integer
          format: int64
          description: Duration in seconds the alert was active
          example: 60
        suppressed:
          type: boolean
          description: >-
            Indicates whether the alert is currently suppressed by a real-time
            ASW.
          example: false
        meta:
          $ref: '#/components/schemas/AlertMeta'
        _links:
          $ref: '#/components/schemas/AlertLinks'
    LegacyAlert:
      type: object
      deprecated: true
      properties:
        alertId:
          deprecated: true
          type: string
          format: uuid
          description: A unique ID for each individual alert occurrence.
          example: e9c3bf02-a48c-4aa8-9e5f-898800d6f569
          readOnly: true
        dateStart:
          deprecated: true
          type: string
          description: The start date and time for querying alerts.
          example: '2020-04-23 13:43:16'
          readOnly: true
        dateEnd:
          deprecated: true
          type: string
          description: The end date and time for querying alerts.
          example: '2020-04-23 13:43:16'
          readOnly: true
        ruleId:
          deprecated: true
          type: integer
          format: int64
          description: Unique ID of the rule.
          example: 127094
          readOnly: true
        state:
          deprecated: true
          type: string
          description: 'Current state of the alert. Possible values: clear or trigger.'
          enum:
            - ACTIVE
            - CLEARED
          example: ACTIVE
          readOnly: true
        severity:
          deprecated: true
          type: string
          description: The severity of the alert.
          enum:
            - INFO
            - MAJOR
            - MINOR
            - CRITICAL
            - UNKNOWN
          example: MAJOR
        permalink:
          deprecated: true
          type: string
          description: Hyperlink to alerts list, with row expanded
          example: >-
            https://app.thousandeyes.com/alerts/list?__a=75&alertId=2783&agentId=12
        apiLinks:
          deprecated: true
          type: array
          description: List of hyperlinks to other areas of the API
          items:
            additionalProperties: true
    Alerts:
      type: object
      properties:
        alerts:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    Alert:
      allOf:
        - $ref: '#/components/schemas/BaseAlert'
        - $ref: '#/components/schemas/LegacyAlert'
        - type: object
          properties:
            alertRuleId:
              $ref: '#/components/schemas/RuleId'
            alertState:
              $ref: '#/components/schemas/State'
            alertSeverity:
              $ref: '#/components/schemas/Severity'
    AlertDetail:
      description: null
      allOf:
        - $ref: '#/components/schemas/BaseAlert'
        - $ref: '#/components/schemas/LegacyAlertDetail'
        - type: object
          properties:
            alertState:
              $ref: '#/components/schemas/State'
            alertSeverity:
              $ref: '#/components/schemas/Severity'
            details:
              type: array
              items:
                $ref: '#/components/schemas/AlertMetricDetail'
            _embedded:
              $ref: '#/components/schemas/AlertEmbedded'
    AlertEmbedded:
      type: object
      description: Container for embedded resources in alert responses (HATEOAS).
      properties:
        asn:
          $ref: '#/components/schemas/Asn'
    Asn:
      type: object
      description: Autonomous System Number (ASN) information for network outage alerts.
      properties:
        id:
          type: string
          description: ASN identifier.
          example: '13445'
        name:
          type: string
          description: Autonomous system name.
          example: Cisco Webex LLC
        type:
          type: string
          description: Resource type.
          example: asn
    LegacyAlertDetail:
      type: object
      deprecated: true
      properties:
        state:
          $ref: '#/components/schemas/State'
        severity:
          $ref: '#/components/schemas/Severity'
    AlertMetricDetail:
      type: object
      properties:
        end:
          $ref: '#/components/schemas/EndAlertMetrics'
        id:
          type: string
          description: Unique metric detail id.
          example: '3379'
        name:
          type: string
          description: Geolocation of the alert.
          example: Bucharest, Romania
        start:
          $ref: '#/components/schemas/StartAlertMetrics'
        state:
          $ref: '#/components/schemas/State'
        type:
          description: Type of the alert metric.
          type: string
          example: cea_agent
    StartAlertMetrics:
      type: object
      description: >-
        String representation of the metric at the time that the source began
        alerting.   Note that the alert `start` and `startDate` for a particular
        source do not need to be the same,  as sources may change alerting
        status throughout an alert's lifecycle.
      properties:
        metrics:
          type: string
    EndAlertMetrics:
      type: object
      description: >-
        String representation of the metric or metrics being considered in the
        alert rule at the point that the alert was cleared.  If the alert is not
        yet cleared, this field reflects the last round of data gathered from
        the source.
      properties:
        metrics:
          type: string
    State:
      type: string
      description: 'Current state of the alert. Possible values: clear or trigger.'
      enum:
        - clear
        - trigger
      example: trigger
      readOnly: true
    AlertNotification:
      type: object
      description: Alert notification object. See Alert notification integrations.
      properties:
        email:
          $ref: '#/components/schemas/NotificationEmail'
        thirdParty:
          type: array
          description: Third party notifications.
          items:
            $ref: '#/components/schemas/NotificationThirdParty'
        webhook:
          type: array
          description: Webhook notifications.
          items:
            $ref: '#/components/schemas/NotificationWebhook'
        customWebhook:
          type: array
          description: Custom webhook notifications.
          items:
            $ref: '#/components/schemas/NotificationCustomWebhook'
    NotificationEmail:
      type: object
      description: Email notifications.
      properties:
        recipients:
          type: array
          description: An array containing the email addresses to receive notifications.
          items:
            type: string
          example:
            - noreply@thousandeyes.com
        message:
          type: string
          description: >-
            Custom text included in alert email notifications sent to
            recipients.
          example: Notification message
    NotificationThirdParty:
      type: object
      description: Webhook notification.
      properties:
        integrationId:
          type: string
          description: Integration ID.
          example: sl-101
        integrationType:
          $ref: '#/components/schemas/ThirdPartyIntegrationType'
    ThirdPartyIntegrationType:
      type: string
      description: Integration type.
      example: slack
      enum:
        - pager-duty
        - slack
        - app-dynamics
        - service-now
    NotificationWebhook:
      type: object
      description: Webhook notification.
      properties:
        integrationId:
          type: string
          description: Integration ID.
          example: wb-201
        integrationType:
          $ref: '#/components/schemas/WebhookIntegrationType'
        integrationName:
          description: Name of the integration, configured by the user.
          example: My webhook
          type: string
        target:
          description: Webhook target URL.
          example: https://example.com/test/webhooks/notifications
          type: string
    WebhookIntegrationType:
      type: string
      description: Integration type.
      example: webhook
      enum:
        - webhook
    NotificationCustomWebhook:
      type: object
      description: Custom webhook notification.
      properties:
        integrationId:
          type: string
          format: uuid
          description: Integration ID.
          example: 6e069ae9-8537-4120-b988-61bf8e0d8b87
        integrationType:
          $ref: '#/components/schemas/CustomWebhookIntegrationType'
        integrationName:
          type: string
          description: User-configured name of the integration.
          example: My webhook
        target:
          type: string
          description: Webhook target URL.
          example: https://example.com/test/webhooks/notifications
    CustomWebhookIntegrationType:
      type: string
      description: Integration type.
      example: custom-webhook
      enum:
        - custom-webhook
    AlertSuppressionWindows:
      type: object
      description: Alert suppression windows.
      properties:
        alertSuppressionWindows:
          type: array
          items:
            $ref: '#/components/schemas/AlertSuppressionWindow'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    BaseAlertSuppressionWindow:
      type: object
      description: Alert suppression window.
      properties:
        alertSuppressionWindowId:
          type: string
          description: Unique ID of the alert suppression window.
          example: '2411'
          readOnly: true
        name:
          type: string
          description: Name of the alert suppression window.
          example: Monthly maintenance
        isEnabled:
          type: boolean
          description: Set to `false` for `disabled`, `true` for `enabled`.
          example: false
        status:
          $ref: '#/components/schemas/AlertSuppressionWindowState'
        startDate:
          type: string
          format: date-time
          description: >-
            The date/time when the alert suppression window starts (ISO
            date-time format).
          example: '2017-07-01T05:00:00Z'
        duration:
          type: integer
          description: Duration in seconds the suppression window is active.
          example: 0
        repeat:
          $ref: '#/components/schemas/Repeat'
        endRepeat:
          $ref: '#/components/schemas/EndRepeat'
    AlertSuppressionWindow:
      allOf:
        - $ref: '#/components/schemas/BaseAlertSuppressionWindow'
        - type: object
          properties:
            _links:
              $ref: '#/components/schemas/SelfLinks'
    AlertSuppressionWindowState:
      type: string
      enum:
        - active
        - inactive
        - ended
      description: Indicates the current status of the suppression window.
      example: ended
      readOnly: true
    AlertSuppressionWindowRequest:
      allOf:
        - $ref: '#/components/schemas/BaseAlertSuppressionWindow'
        - type: object
          properties:
            testIds:
              type: array
              description: List of test IDs to assign to the alert suppression window.
              items:
                type: string
                example: '71687'
    AlertSuppressionWindowDetail:
      allOf:
        - $ref: '#/components/schemas/AlertSuppressionWindow'
        - type: object
          properties:
            tests:
              type: array
              description: List of tests assigned to the alert suppression window.
              items:
                $ref: '#/components/schemas/SimpleTest'
    Repeat:
      type: object
      description: Repeat options.
      properties:
        type:
          $ref: '#/components/schemas/RepeatType'
        intervalType:
          $ref: '#/components/schemas/IntervalType'
        intervalLength:
          type: integer
          description: >-
            Number of `intervalTypes` to wait before reactivating the alert
            suppression window.
          example: 2
        daysOfWeek:
          type: array
          items:
            $ref: '#/components/schemas/DaysOfWeek'
    RepeatType:
      type: string
      description: Repeat options type.
      enum:
        - day
        - week
        - month
        - custom
      example: week
    IntervalType:
      type: string
      description: Repeat options interval type
      enum:
        - day
        - week
        - month
      example: day
    DaysOfWeek:
      type: string
      description: >-
        Specifies the day to activate the alert suppression window. Applicable
        only when `intervalType` is set to `week`.
      enum:
        - sun
        - mon
        - tue
        - wed
        - thu
        - fri
        - sat
      example: sun
    EndRepeat:
      type: object
      description: End repeat options.
      properties:
        type:
          $ref: '#/components/schemas/EndRepeatType'
        count:
          type: integer
          description: >-
            End repeat after number of occurrences, only valid with count type
            option.
          example: 3
        date:
          type: string
          format: date
          description: >-
            End repeat after specific date, only valid with date type option
            (ISO date format).
          example: '2017-07-01'
    EndRepeatType:
      type: string
      description: End repeat options type.
      enum:
        - count
        - never
        - date
      example: never
    RuleTestIds:
      type: array
      description: >-
        Array of test IDs to link to alert rule (get `testId` from `/tests`
        endpoint).
      items:
        type: string
      example:
        - '281474976710706'
        - '271659'
    AlertLinks:
      type: object
      description: An object containing the alert links.
      readOnly: true
      properties:
        test:
          $ref: '#/components/schemas/Link'
        rule:
          $ref: '#/components/schemas/Link'
        appLink:
          $ref: '#/components/schemas/Link'
        self:
          $ref: '#/components/schemas/Link'
    AlertType:
      type: string
      description: >-
        Type of alert being triggered. In multi-layered tests, this value
        represents the layer the alert relates to. See [Alert
        Details](https://developer.cisco.com/docs/thousandeyes/retrieve-alert-details/)
        documentation for a list of possible values
      enum:
        - page-load
        - http-server
        - end-to-end-server
        - end-to-end-agent
        - voice
        - dns-server
        - dns-trace
        - dnssec
        - bgp
        - path-trace
        - ftp
        - sip-server
        - transactions
        - web-transactions
        - agent
        - network-outage
        - application-outage
        - device-device
        - device-interface
        - endpoint-network-server
        - endpoint-http-server
        - endpoint-path-trace
        - endpoint-browser-sessions-agent
        - endpoint-browser-sessions-application
        - api
        - web-transaction
        - unknown
      example: http-server
    RuleId:
      type: string
      description: Unique ID of the rule.
      example: '127094'
      readOnly: true
    Severity:
      type: string
      description: The severity of the alert.
      enum:
        - info
        - major
        - minor
        - critical
        - unknown
      example: major
    AlertDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: >-
        Direction for applicable alert types (eg. path trace, End-to-End (Agent)
        etc.)
      example: to-target
    AlertGroupType:
      type: string
      description: >-
        Category of alert type based on the application or network layer and
        source of the test.
      enum:
        - bgp
        - browser-session
        - cloud-enterprise
        - endpoint
      example: endpoint
    AlertRoundsViolationMode:
      type: string
      description: >-
        `exact` requires the same agents to meet the threshold in consecutive
        rounds. `auto` is only enabled for CEA and Endpoint Scheduled test
        rules. The default is `any`.
      enum:
        - exact
        - any
        - auto
      example: exact
      readOnly: true
    SensitivityLevel:
      type: string
      description: >-
        Used when `roundsViolatingMode` is set to `auto`. The default is
        `medium`. Higher sensitivity increases the likelihood of triggering
        alerts.
      enum:
        - high
        - medium
        - low
      example: medium
