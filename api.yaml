          properties:
            id:
              type: string
              description: Identifier of the widget.
              example: '1234'
            description:
              type: string
              description: Description of the number card.
              example: Widget Title
            measure:
              $ref: '#/components/schemas/ApiWidgetMeasure'
            compareToPreviousValue:
              type: boolean
            fixedTimespan:
              $ref: '#/components/schemas/ApiDuration'
            shouldExcludeAlertSuppressionWindows:
              type: boolean
              description: >-
                Excludes alert suppression windows from the widget when set to
                `true`.
            dataSource:
              $ref: '#/components/schemas/NumbersCardDatasource'
            metricGroup:
              $ref: '#/components/schemas/MetricGroup'
            direction:
              $ref: '#/components/schemas/DashboardMetricDirection'
            metric:
              $ref: '#/components/schemas/DashboardMetric'
            filters:
              $ref: '#/components/schemas/WidgetFilters'
    ApiNumbersCardWidget:
      type: object
      description: >-
        A widget composed of multiple cards, each presenting a singular metric,
        such as average packet loss, page load time, or alert count.
      allOf:
        - $ref: '#/components/schemas/Widget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/NumberWidgetType'
            numberCards:
              type: array
              items:
                $ref: '#/components/schemas/ApiNumbersCard'
            dataSource:
              $ref: '#/components/schemas/NumbersCardDatasource'
    ApiPieChartWidget:
      type: object
      description: >-
        Displays data as segments of a pie, with each slice representing a
        portion of the total value.
      allOf:
        - $ref: '#/components/schemas/Widget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/PieChartWidgetType'
            groupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            dataSource:
              $ref: '#/components/schemas/PieChartDatasource'
    ApiStackedAreaChartWidget:
      type: object
      description: >-
        Displays line plots over time, stacking quantities vertically to
        showcase cumulative data trends, similar to stacked bar charts. Ideal
        for visualizing changes in response times, error counts, and other
        metrics, revealing the progression of values across a timeline. Use this
        chart to replace stacked bar charts for temporal data analysis.
      allOf:
        - $ref: '#/components/schemas/Widget'
        - $ref: '#/components/schemas/ScalableWidget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/TimeSeriesStackedAreaWidgetType'
            groupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            dataSource:
              $ref: '#/components/schemas/StackedAreaChartDatasource'
    ApiStackedBarchartWidget:
      allOf:
        - $ref: '#/components/schemas/Widget'
        - type: object
          required:
            - type
          description: >-
            Displays horizontal histogram bars with multiple values, which are
            useful for composite metric data (such as HTTP response or fetch
            time) and for comparing values between multiple tests or for
            comparing values on a country-by-country basis. The bars can be
            aligned horizontally or vertically as columns.
          properties:
            type:
              $ref: '#/components/schemas/BarChartStackedWidgetType'
            axisGroupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            sortBy:
              $ref: '#/components/schemas/WidgetSortProperty'
            sortDirection:
              $ref: '#/components/schemas/WidgetSortDirection'
            limit:
              $ref: '#/components/schemas/WidgetLimit'
            showLabels:
              type: boolean
            isHorizontalBarChart:
              type: boolean
              description: Set to `true` to display bars horizontally in the widget.
            dataSource:
              $ref: '#/components/schemas/StackedBarChartDatasource'
    ApiTableWidget:
      type: object
      description: >-
        Organizes data in rows and columns, with options to list by test,
        geographic location, data source, or aggregated categories.
      allOf:
        - $ref: '#/components/schemas/Widget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/TableWidgetType'
            compareToPreviousValue:
              type: boolean
            rowGroupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            columnGroupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            sortBy:
              $ref: '#/components/schemas/WidgetSortProperty'
            sortDirection:
              $ref: '#/components/schemas/WidgetSortDirection'
            limit:
              $ref: '#/components/schemas/WidgetLimit'
            dataSource:
              $ref: '#/components/schemas/TableDatasource'
    ApiTestTableWidget:
      type: object
      description: >-
        Displays tests and statuses with options to sort and filter. It can be
        set to show only certain tests, like those with specific labels or
        failing tests.
      allOf:
        - $ref: '#/components/schemas/Widget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/TestTableWidgetType'
            filter:
              $ref: '#/components/schemas/ApiWidgetFilterApiTestTableFilterKey'
            exclude:
              $ref: '#/components/schemas/ApiWidgetFilterApiTestTableFilterKey'
            dataSource:
              $ref: '#/components/schemas/TestTableDatasource'
    ApiTimeseriesWidget:
      type: object
      description: >-
        The Timeseries widget graphs data over time, with the chosen metric
        displayed on the vertical axis. vertical axis
      allOf:
        - $ref: '#/components/schemas/Widget'
        - $ref: '#/components/schemas/ScalableWidget'
        - type: object
          required:
            - type
          properties:
            type:
              $ref: '#/components/schemas/TimeSeriesLineWidgetType'
            showTimeseriesOverallBaseline:
              type: boolean
              description: Displays the overall baseline if set to `true`.
            groupBy:
              $ref: '#/components/schemas/ApiAggregateProperty'
            isTimeseriesOneChartPerLine:
              type: boolean
              description: Displays a separate chart for each line if set to `true`.
            dataSource:
              $ref: '#/components/schemas/TimeseriesDatasource'
