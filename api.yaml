  /tests/{testId}/snapshot:
    post:
      tags:
        - Test Snapshots
      summary: Create test snapshot
      description: >
        This operation creates a test snapshot based on the properties provided
        in the POST data.


        * To use this endpoint, you need the `Create snapshot shares`
        permission.

        * You can create a maximum of 5 snapshots per organization within a
        5-minute interval.

        * Snapshots generated through this operation have a 30-day expiration
        period.

        * The time range specified with the `from` and `to` parameters must
        adhere to one of the following intervals: 1, 2, 4, 6, 12, 24, or 48
        hours.

        * The `endDate` field of the snapshot must be set to the present or a
        past date.

        * Certain regions may not have public snapshots enabled for compliance
        reasons. In that case you will get a 403 Forbidden as a response.


        **Note**: This operation does not support the creation of operation
        Agent snapshots.
      operationId: createTestSnapshot
      parameters:
        - $ref: '#/components/parameters/TestIdPath'
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotRequest'
      responses:
        '201':
          description: Created
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/SnapshotResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
        '500':
          $ref: '#/components/responses/500'
        '502':
          $ref: '#/components/responses/502'
        default:
          $ref: '#/components/responses/GeneralError'
      security:
        - BearerAuth: []
