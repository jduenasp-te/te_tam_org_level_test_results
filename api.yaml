          $ref: '#/components/schemas/Link'
    EventTestLinks:
      type: object
      description: A links object containing the self link.
      readOnly: true
      properties:
        test:
          $ref: '#/components/schemas/Link'
    PaginationNextAndSelfLinks:
      type: object
      description: >-
        A links object containing pagination-related links, including only next
        and self.
      properties:
        next:
          $ref: '#/components/schemas/Link'
        self:
          $ref: '#/components/schemas/Link'
