    SnapshotRequest:
      type: object
      required:
        - displayName
        - startDate
        - endDate
      properties:
        displayName:
          type: string
          description: Snapshot title.
          example: Snapshot created through API
        startDate:
          type: string
          format: date-time
          description: >-
            The start date for the snapshot in UTC time, formatted in ISO
            date-time.
          example: '2023-06-06T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: >-
            The end date for the snapshot in UTC time, formatted in ISO
            date-time.
          example: '2023-06-06T01:00:00Z'
        isPublic:
          type: boolean
          description: >-
            Set to `true` for saved events and `false` for share links. Its
            default value is `false`.

            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          example: false
    SnapshotResponse:
      type: object
      properties:
        id:
          type: string
          description: Snapshot ID.
          example: wdiac
        startRoundId:
          type: integer
          description: >-
            The start time of the test snapshot, represented in epoch time
            format (in seconds).
          example: 1538784000
          readOnly: true
        endRoundId:
          type: integer
          description: >-
            The end time of the test snapshot, represented in epoch time format
            (in seconds).
          example: 1538787600
          readOnly: true
        roundId:
          type: integer
          description: >-
            The selected time of the test snapshot, represented in epoch time
            format (in seconds).
          example: 1538784000
          readOnly: true
        shareDate:
          type: string
          format: date-time
          description: >-
            The date when the test snapshot was created in UTC time, formatted
            in ISO date-time.
          example: '2023-06-06T00:00:00Z'
        sourceTestId:
          type: string
          description: Snapshot test ID.
          example: '281474976710706'
        testId:
          type: string
          description: Snapshot test ID.
          example: '281474976710801'
        uid:
          type: string
          description: User ID.
          example: '281474976810911'
        displayName:
          type: string
          description: Snapshot title.
          example: Snapshot created through API
        extraParams:
          type: string
          description: Extra parameters.
          example: params
        test:
          $ref: '#/components/schemas/SnapshotTest'
        _links:
          $ref: '#/components/schemas/SnapshotLinks'
    SnapshotTest:
      allOf:
        - $ref: '#/components/schemas/UnexpandedTest'
        - $ref: '#/components/schemas/UnexpandedInstantTest'
    SnapshotLinks:
      allOf:
        - $ref: '#/components/schemas/AppAndSelfLinks'
        - example:
            self:
              href: http://api.thousandeyes.com/v7/tests/227103/snapshot
            appLink:
              href: >-
                https://app.stg.thousandeyes.com/view/tests/?testId=227103&__a=105
    UnexpandedTest:
      type: object
      properties:
        interval:
          $ref: '#/components/schemas/TestInterval'
        alertsEnabled:
          type: boolean
          description: Indicates if alerts are enabled.
          example: true
        enabled:
          $ref: '#/components/schemas/Enabled'
    UnexpandedInstantTest:
      type: object
      properties:
        createdBy:
          $ref: '#/components/schemas/TestCreatedBy'
        createdDate:
          $ref: '#/components/schemas/TestCreatedDate'
        description:
          type: string
          description: A description of the test.
          example: ThousandEyes Test
        liveShare:
          type: boolean
          description: Indicates if the test is shared with the account group.
          example: false
          readOnly: true
        modifiedBy:
          type: string
          description: User that modified the test.
          example: user@user.com
          readOnly: true
        modifiedDate:
          type: string
          format: date-time
          description: UTC last modification date (ISO date-time format).
          readOnly: true
          example: '2022-07-17T22:00:54Z'
        savedEvent:
          type: boolean
          description: >
            Indicates if the test is a saved event.


            **Note**: **Saved Events** are now called **Private Snapshots** in
            the user interface. This change does not affect API.
          readOnly: true
        testId:
          type: string
          description: >-
            Each test is assigned an unique ID; this is used to access test
            information and results from other endpoints.
          readOnly: true
          example: '281474976710706'
        testName:
          type: string
          description: The name of the test. Test name must be unique.
          example: ThousandEyes Test
        type:
          $ref: '#/components/schemas/TestType'
        _links:
          $ref: '#/components/schemas/TestLinks'
    StreamType:
      description: |-
        The type of data stream to configure.
        When using `splunk-hec`:
          - `endpointType` must be `http`.
          - `exporterConfig.splunkHec.token` must contain the *Splunk HEC Token*.
      type: string
      enum:
        - opentelemetry
        - splunk-hec
      example: opentelemetry
    DataModelVersion:
      description: |-
        The version of the data model used in the data stream.
        When using `v1`:
          - The `signal` cannot be `trace`.
      default: v2
      type: string
      enum:
        - v1
        - v2
      example: v2
    AuditOperation:
      type: object
      properties:
        createdBy:
          type: integer
          format: int64
          description: ID of the user who created the integration
          example: 3962
        createdDate:
          type: integer
          format: int64
          description: Creation date of the integration
          example: 1679677853573
    AuditOperationWithUpdate:
      allOf:
        - $ref: '#/components/schemas/AuditOperation'
        - type: object
          properties:
            updatedBy:
              type: integer
              format: int64
              description: ID of the user who last updated the integration
              example: 3962
              nullable: true
            updatedDate:
              type: integer
              format: int64
              description: Date of the last update to the integration
              example: 1679677853573
              nullable: true
    StreamStatus:
      type: object
      properties:
        lastSuccess:
          type: integer
          format: int64
          description: >-
            Last timestamp when data was successfully sent to the stream
            endpoint.
          example: 1679677853573
          nullable: true
        lastFailure:
          type: integer
          format: int64
          description: Last timestamp when data failed to send the stream endpoint.
          example: 1679677853573
          nullable: true
        status:
          $ref: '#/components/schemas/StreamStatusType'
    StreamStatusType:
      type: string
      description: >-
        The status of the stream integration. pending: No data is currently
        being sent to the stream endpoint. failing: Data is being sent but not
        successfully reaching the stream endpoint. connected: Data is being sent
        successfully to the stream endpoint.
      example: connected
      enum:
        - connected
        - pending
        - failing
    PutStream:
      type: object
      properties:
        customHeaders:
          description: Custom headers.
          type: object
          additionalProperties:
            type: string
          example:
            Authorization: '*****'
            Content-Type: '*****'
        streamEndpointUrl:
          $ref: '#/components/schemas/StreamEndpointUrl'
        tagMatch:
          description: >-
            A collection of tags that determine what tests are included in the
            data stream. These tag values are also included as attributes in the
            data stream metrics. Tags are invalid if the tag key includes
            characters that are not allowed by the [OpenTelemetry naming
            recommendations for
            attributes](https://opentelemetry.io/docs/specs/semconv/general/naming/#recommendations-for-application-developers).
          type: array
          items:
            $ref: '#/components/schemas/TagMatch'
          example:
            - key: keyA
              value: valueA
            - key: keyB
              value: valueB
        testMatch:
          description: A collection of tests to be included in the data stream.
          type: array
          items:
            $ref: '#/components/schemas/TestMatch'
          example:
            - id: '1234'
              domain: cea
            - id: '5678'
              domain: endpoint
        enabled:
          description: Flag to enable or disable the stream integration.
          type: boolean
          example: true
        filters:
          $ref: '#/components/schemas/Filters'
        exporterConfig:
          $ref: '#/components/schemas/ExporterConfig'
    TagMatch:
      type: object
      properties:
        key:
          type: string
          description: >-
            The name of the tag key to match. The key is invalid if it includes
            characters that are not allowed by the [OpenTelemetry naming
            recommendations for
            attributes](https://opentelemetry.io/docs/specs/semconv/general/naming/#recommendations-for-application-developers).
          example: keyA
        value:
          type: string
          description: The value of the tag to match
          example: valueA
    TagMatchObjectType:
      type: string
      deprecated: true
      description: The object type of tag
      example: test
      enum:
        - test
    Filters:
      type: object
      description: >-
        Provides the ability to filter data points based on the specified test
        types.
      properties:
        testTypes:
          $ref: '#/components/schemas/FiltersTestTypes'
    FiltersTestTypes:
      type: object
      description: Test types that can be used for filtering data points.
      properties:
        values:
          $ref: '#/components/schemas/FiltersTestTypesValues'
    FiltersTestTypesValues:
      type: array
      description: A list of test types to filter data points.
      items:
        $ref: '#/components/schemas/TestType'
      example:
        - agent-to-server
        - bgp
        - http-server
    TestMatch:
      type: object
      properties:
        id:
          type: string
          description: The ID of the test to match.
          example: '1234'
        domain:
          $ref: '#/components/schemas/TestMatchDomain'
    TestMatchDomain:
      type: string
      description: |-
        The domain of the test to match.
         `cea` - Cloud and Enterprise Agent
         `endpoint` - Endpoint Agent
      example: cea
      enum:
        - cea
        - endpoint
    ExporterConfig:
      type: object
      description: Capability to set exporter configuration.
      properties:
        splunkHec:
          $ref: '#/components/schemas/ExporterConfigSplunkHec'
    ExporterConfigSplunkHec:
      type: object
      description: >-
        Splunk HEC configuration. This can only be configured when the `type` is
        `splunk-hec`.
      properties:
        token:
          type: string
          description: The Splunk HEC `token`. This is a required field.
          example: d0a91307-be2f-4218-a9f8-71c02d98846b
        source:
          type: string
          description: The Splunk HEC `source`. This field is optional.
          example: ThousandEyesOTel
          default: ThousandEyesOTel
        sourceType:
          type: string
          description: The Splunk HEC `sourceType`. This field is optional.
          example: ThousandEyesOTel
          default: ThousandEyesOTel
        index:
          type: string
          description: >-
            The name of the Splunk HEC index where the event data will be
            stored.  This field is optional.
          example: thousandeyes_otel_events_index
    Stream:
      allOf:
        - type: object
          properties:
            type:
              $ref: '#/components/schemas/StreamType'
            signal:
              $ref: '#/components/schemas/Signal'
            endpointType:
              $ref: '#/components/schemas/EndpointType'
            streamEndpointUrl:
              $ref: '#/components/schemas/StreamEndpointUrl'
            dataModelVersion:
              $ref: '#/components/schemas/DataModelVersion'
        - $ref: '#/components/schemas/PutStream'
    Signal:
      description: |-
        The OpenTelemetry signal of the stream integration.
        When using `trace`:
          - `dataModelVersion` must be `v2`.
      default: metric
      example: metric
      enum:
        - metric
        - trace
    EndpointType:
      type: string
      description: >-
        The type of connection used to send data to the endpoint.

        **Note**: When using the `splunk-hec` 'type', the `EndpointType` must be
        `http`.
      default: grpc
      example: grpc
      enum:
        - grpc
        - http
    StreamResponse:
      type: object
      properties:
        id:
          type: string
          example: 342ieu09
          description: The data stream ID
          readOnly: true
        enabled:
          type: boolean
          example: true
          description: Flag to indicate if the stream integration is currently enabled.
          readOnly: true
        _links:
          $ref: '#/components/schemas/StreamLinks'
    StreamEndpointUrl:
      type: string
      description: >-
        The URL ThousandEyes sends data stream to.

        For a URL to be valid, it needs to: - Be syntactically correct. - Be
        reachable. - Use the HTTPS protocol. - When using the `grpc`
        endpointType, streamEndpointUrl cannot contain paths:
            - Valid . `grpc` - `https://example.com`
            - Invalid . `grpc` - `https://example.com/collector`.
            - Valid . `http` - `https://example.com/collector`.

        - When using the `http` endpointType, the operation must match the exact
        final full URL (including the path if there is one) to which the data
        will be sent. Examples below:
            - `https://api.honeycomb.io:443/v1/metrics`
            - `https://ingest.eu0.signalfx.com/v2/datapoint/otlp`
      example: https://api.thousandeyes.otel-collector
    GetStreamResponse:
      allOf:
        - $ref: '#/components/schemas/StreamResponse'
        - $ref: '#/components/schemas/Stream'
        - type: object
          properties:
            auditOperation:
              $ref: '#/components/schemas/AuditOperationWithUpdate'
            streamStatus:
              $ref: '#/components/schemas/StreamStatus'
    CreateStreamResponse:
      allOf:
        - $ref: '#/components/schemas/StreamResponse'
        - $ref: '#/components/schemas/Stream'
        - type: object
          properties:
            auditOperation:
              $ref: '#/components/schemas/AuditOperation'
            streamStatus:
              $ref: '#/components/schemas/StreamStatus'
    StreamCollection:
      type: array
      items:
        $ref: '#/components/schemas/GetStreamResponse'
    BadRequestError:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          example: 1679677853573
        httpStatus:
          type: string
          example: BAD_REQUEST
        errors:
          type: array
          items:
            type: string
            example: 'JSON parse error: invalid type'
        path:
          type: string
          format: url
          example: https://api.thousandeyes.com/v7/streams
    ApiErrorIntegrationLimits:
      type: object
      properties:
        timestamp:
          type: integer
          format: int64
          example: 1679677853573
        httpStatus:
          type: string
          example: PRECONDITION_FAILED
        errors:
          type: array
          items:
            type: string
            example: User cannot create more than 5 integrations
        path:
          type: string
          format: url
          example: https://api.thousandeyes.com/v7/streams
    StreamSelfLink:
      type: object
      properties:
        href:
          type: string
          format: url
          example: >-
            https://api.thousandeyes.com/v7/streams/575766da-9664-4e85-94fe-facbe1154799
    StreamLinks:
      type: object
      readOnly: true
      properties:
        self:
          $ref: '#/components/schemas/StreamSelfLink'
    TestAgent:
      type: object
      properties:
        agentId:
          type: string
          description: Identifier for the agent (get `agentId` from `/agents` endpoint).
        sourceIpAddress:
          type: string
          description: >-
            IP address from the agent's `ipAddresses` field (get `ipAddresses`
            from `/agents` endpoint). Used for interface selection.
      example:
        agentId: '125'
        sourceIpAddress: 1.1.1.1
    InstantTestRequest:
      type: object
      properties:
        labels:
          type: array
          description: >-
            A list of test label identifiers (get `labelId` from `/labels`
            endpoint).
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - '9842'
            - '1283'
        sharedWithAccounts:
          type: array
          description: >-
            A list of account group identifiers that the test is shared with
            (get `aid` from `/account-groups` endpoint).
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - '1234'
            - '12345'
        agents:
          type: array
          description: >-
            A list of objects with `agentId` (required) and `sourceIpAddress`
            (optional).
          items:
            $ref: '#/components/schemas/TestAgent'
      required:
        - agents
    AgentToAgentInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/AgentToAgentInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    AgentToAgentInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/AgentToAgentInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    AgentToServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/AgentToServerInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    AgentToServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/AgentToServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    DnsServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/DnsServerInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
        - $ref: '#/components/schemas/DnsServersRequest'
    DnsServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/DnsServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    DnsTraceInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/DnsTraceInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    DnsTraceInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/DnsTraceInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    DnsSecInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/DnsSecInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    DnsSecInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/DnsSecInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    HttpServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/HttpServerInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    HttpServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/HttpServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    PageLoadInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/PageLoadInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    PageLoadInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/PageLoadInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    WebTransactionInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/WebTransactionInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    WebTransactionInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/WebTransactionInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    ApiInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/ApiInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    ApiInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/ApiInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    FtpServerInstantTestRequest:
      required:
        - password
      allOf:
        - $ref: '#/components/schemas/FtpServerInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    FtpServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/FtpServerInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    SipServerInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/SipServerInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
        - type: object
          required:
            - targetSipCredentials
          properties:
            targetSipCredentials:
              $ref: '#/components/schemas/TestSipCredentials'
    SipServerInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/SipServerInstantTest'
        - $ref: '#/components/schemas/TestSipCredentials'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    VoiceInstantTestRequest:
      allOf:
        - $ref: '#/components/schemas/VoiceInstantTest'
        - $ref: '#/components/schemas/InstantTestRequest'
    VoiceInstantTestResponse:
      allOf:
        - $ref: '#/components/schemas/VoiceInstantTest'
        - type: object
          properties:
            agents:
              $ref: '#/components/schemas/TestAgentsResponse'
    ExpandInstantTestOptions:
      type: string
      enum:
        - agent
        - label
        - shared-with-account
      example: agent
    SharedWithAccount:
      type: object
      properties:
        aid:
          type: string
          description: Account group ID.
          example: '1234'
        name:
          type: string
          description: Account group name.
          example: Account name
    TestSharedAccounts:
      type: array
      readOnly: true
      items:
        $ref: '#/components/schemas/SharedWithAccount'
    InstantTest:
      allOf:
        - $ref: '#/components/schemas/UnexpandedInstantTest'
        - type: object
          properties:
            labels:
              $ref: '#/components/schemas/TestLabels'
            sharedWithAccounts:
              $ref: '#/components/schemas/TestSharedAccounts'
    TestDirection:
      type: string
      enum:
        - to-target
        - from-target
        - bidirectional
      description: Direction of the test, which affects how results are shown.
      default: to-target
      example: to-target
    TestDscp:
      type: string
      description: DSCP label.
      readOnly: true
      example: Best Effort (DSCP 0)
    TestDscpId:
      type: string
      enum:
        - '0'
        - '8'
        - '16'
        - '24'
        - '32'
        - '40'
        - '48'
        - '56'
        - '10'
        - '12'
        - '14'
        - '18'
        - '20'
        - '22'
        - '26'
        - '28'
        - '30'
        - '34'
        - '36'
        - '38'
        - '46'
        - '44'
      description: >-
        DSCP ID [to see list for acceptable
        values](https://docs.thousandeyes.com/product-documentation/tests/dscp-options-in-network-tests)
      default: '0'
      example: '0'
    TestNumPathTraces:
      type: integer
      minimum: 1
      maximum: 10
      description: Number of path traces executed by the agent.
      default: 3
      example: 3
    TestPathTraceMode:
      type: string
      enum:
        - classic
        - in-session
      description: Select `inSession` to perform the path trace within a TCP session.
      default: classic
      example: classic
    AgentToAgentTestProtocol:
      type: string
      enum:
        - tcp
        - udp
      default: tcp
      example: tcp
    TestRandomizedStartTime:
      type: boolean
      description: >-
        Indicates whether agents should randomize the start time in each test
        round.
      default: false
      example: false
    TestFixedPacketRate:
      type: integer
      minimum: 0
      maximum: 100
      description: Sets packets rate sent to measure the network in packets per second.
      example: 50
    AgentToAgentProperties:
      type: object
      required:
        - targetAgentId
      properties:
        direction:
          $ref: '#/components/schemas/TestDirection'
        dscp:
          $ref: '#/components/schemas/TestDscp'
        dscpId:
          $ref: '#/components/schemas/TestDscpId'
        mss:
          type: integer
          minimum: 20
          maximum: 1400
          description: Maximum segment size, in bytes.
          example: 100
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        port:
          $ref: '#/components/schemas/TestPort'
        protocol:
          $ref: '#/components/schemas/AgentToAgentTestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        targetAgentId:
          type: string
          description: '`agentId` of the target agent for the test.'
          example: '2954'
        throughputMeasurements:
          type: boolean
          description: >-
            Enable or disable throughput measurements. Throughput measurements
            cannot be enabled when the source or target of the test is a cloud
            agent.
          default: false
          example: false
        throughputDuration:
          type: integer
          minimum: 5000
          maximum: 30000
          description: The throughput duration.
          default: 10000
          example: 10000
        throughputRate:
          type: integer
          minimum: 8
          maximum: 1000
          description: The throughput rate, only applicable for UDP protocol.
          example: 10
        fixedPacketRate:
          $ref: '#/components/schemas/TestFixedPacketRate'
        type:
          type: string
          example: agent-to-agent
          readOnly: true
    AgentToAgentInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/AgentToAgentProperties'
    TestAgentsResponse:
      type: array
      description: Contains list of agents.
      items:
        $ref: '#/components/schemas/AgentResponse'
    TestBandwidthMeasurements:
      type: boolean
      description: >-
        Set to `true` to enable bandwidth measurements, only applies to
        Enterprise agents assigned to the test.
      example: true
    TestMtuMeasurements:
      type: boolean
      description: Set `true` to measure MTU sizes on network from agents to the target.
      example: false
    TestIpv6Policy:
      type: string
      enum:
        - force-ipv4
        - prefer-ipv6
        - force-ipv6
        - use-agent-policy
      description: >-
        IP version policy. Overrides the IPv6 policy configured at the agent
        level.
      default: use-agent-policy
      example: use-agent-policy
    AgentToServerProperties:
      type: object
      required:
        - server
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/TestBandwidthMeasurements'
        continuousMode:
          type: boolean
          description: |
            To enable continuous monitoring, set this parameter to `true` to. 
            When continuous monitoring is enabled, the following actions occur:
            * `fixedPacketRate` is enforced
            * `bandwidthMeasurements` are disabled
            * If the `protocol` is set to `tcp`, `probeMode` is set to `syn`.
          example: false
        fixedPacketRate:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            If continuousMode is `false`, set the fixedPacketRate to a value
            between 10-100. If `continuousMode` is `true`, set the
            `fixedPacketRate` to `1`
          example: 25
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        protocol:
          $ref: '#/components/schemas/TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        server:
          type: string
          description: >-
            The target name or IP address. If a port is set for the test, it is
            appended to the target name or IP address using a colon.
          example: www.thousandeyes.com:80
        dscp:
          $ref: '#/components/schemas/TestDscp'
        dscpId:
          $ref: '#/components/schemas/TestDscpId'
        ipv6Policy:
          $ref: '#/components/schemas/TestIpv6Policy'
        pingPayloadSize:
          type: integer
          minimum: 0
          maximum: 1400
          description: >-
            Payload size (not total packet size) for the end-to-end metric's
            probes, ping payload size allows values from 0 to 1400 bytes. When
            set to null, payload sizes are 0 bytes for ICMP-based tests and 1
            byte for TCP-based tests.
        networkMeasurements:
          type: boolean
          description: >-
            View packet loss in 1-second intervals. This is only available for
            1-minute interval tests. Set to `true` to enable network
            measurements.
          default: false
          example: false
        type:
          type: string
          example: agent-to-server
          readOnly: true
    AgentToServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/AgentToServerProperties'
    TestDnsServer:
      type: object
      properties:
        serverId:
          type: string
          description: Unique identifier of the DNS server.
          example: '1447'
        serverName:
          type: string
          description: Fully qualified domain name (FQDN) of DNS server.
          example: dns-example.net
    TestDnsTransportProtocol:
      type: string
      enum:
        - udp
        - tcp
      description: Transport protocol used for DNS requests.
      default: udp
      example: udp
    TestDomain:
      type: string
      description: >-
        The target record for the test, with the record type suffixed. If no
        record type is specified, the test defaults to an ANY record.
      example: www.thousandeyes.com
    DnsQueryClass:
      type: string
      enum:
        - in
        - ch
      description: >-
        Domain class used by this test. 'in' stands for Internet, while 'ch'
        stands for Chaos.
      example: in
    DnsServerProperties:
      type: object
      required:
        - domain
        - dnsServers
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/TestBandwidthMeasurements'
        dnsServers:
          type: array
          items:
            $ref: '#/components/schemas/TestDnsServer'
        dnsTransportProtocol:
          $ref: '#/components/schemas/TestDnsTransportProtocol'
        domain:
          $ref: '#/components/schemas/TestDomain'
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        protocol:
          $ref: '#/components/schemas/TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        recursiveQueries:
          type: boolean
          description: Set true to run query with RD (recursion desired) flag enabled.
          example: true
        ipv6Policy:
          $ref: '#/components/schemas/TestIpv6Policy'
        fixedPacketRate:
          $ref: '#/components/schemas/TestFixedPacketRate'
        dnsQueryClass:
          $ref: '#/components/schemas/DnsQueryClass'
        type:
          type: string
          example: dns-server
          readOnly: true
    DnsServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/DnsServerProperties'
    DnsServersRequest:
      type: object
      properties:
        dnsServers:
          type: array
          description: A list of DNS server FQDN.
          writeOnly: true
          readOnly: false
          items:
            type: string
          example:
            - dns-example.net
            - 8.8.8.8
    DnsTraceProperties:
      type: object
      required:
        - domain
      properties:
        dnsTransportProtocol:
          $ref: '#/components/schemas/TestDnsTransportProtocol'
        domain:
          $ref: '#/components/schemas/TestDomain'
        dnsQueryClass:
          $ref: '#/components/schemas/DnsQueryClass'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        type:
          type: string
          example: dns-trace
          readOnly: true
    DnsTraceInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/DnsTraceProperties'
    DnsSecProperties:
      type: object
      required:
        - domain
      properties:
        domain:
          $ref: '#/components/schemas/TestDomain'
        dnsQueryClass:
          $ref: '#/components/schemas/DnsQueryClass'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        type:
          type: string
          example: dnssec
          readOnly: true
    DnsSecInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/DnsSecProperties'
    TestAuthType:
      type: string
      description: HTTP authentication type.
      enum:
        - none
        - basic
        - ntlm
        - kerberos
        - oauth
      default: none
      example: none
    AgentInterfaces:
      type: object
      properties:
        ipAddress:
          type: string
          example: 192.1.1.0
          description: IP address of the agent interface.
        agentId:
          type: string
          description: The agent ID of the enterprise agent for the test.
          example: '2954'
    TestClientCertificate:
      type: string
      description: >-
        String representation (containing newline characters) of client
        certificate, the private key must be placed first, then the certificate.
      example: |
        -----BEGIN PRIVATE KEY-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END PRIVATE KEY-----
        -----BEGIN CERTIFICATE-----
        MIICUTCCAfugAwIBAgIBADANBgkqhkiG9w0BAQQFADBXMQswCQYDVQQGEwJDTjEL
        -----END CERTIFICATE-----
    TestCustomHeaders:
      type: object
      properties:
        root:
          type: object
          description: Use these HTTP headers for root server request.
          additionalProperties:
            type: string
        domains:
          type: object
          description: Use these HTTP headers for the specified domains.
          additionalProperties:
            type: object
            additionalProperties:
              type: string
        all:
          type: object
          description: Use these HTTP headers for all domains.
          additionalProperties:
            type: string
      example:
        root:
          header1: value1
        domains:
          domain1.com:
            header2: value2
        all:
          header3: value3
    TestDesiredStatusCode:
      type: string
      description: >-
        Specify the HTTP status code value that indicates a successful response.
        The default value accepts any 2xx or 3xx status code.
      default: default
      example: '200'
    TestDistributedTracing:
      type: boolean
      description: >-
        Adds distributed tracing headers to API requests using B3 and W3C
        standards.
      example: false
    TestHttpTimeLimit:
      type: integer
      minimum: 5
      maximum: 60
      description: HTTP time limit in seconds.
      default: 5
      example: 5
    TestIncludeHeaders:
      type: boolean
      description: >-
        Set to `true` to capture response headers for objects loaded by the
        test.
      default: true
      example: true
    TestUrl:
      type: string
      description: Target for the test.
      example: www.thousandeyes.com
    RequestMethod:
      type: string
      enum:
        - get
        - post
        - put
        - delete
        - patch
        - options
        - trace
      description: HTTP request method.
      example: get
    OAuth:
      type: object
      properties:
        configId:
          type: string
          description: The ID of the OAuth configuration.
        testUrl:
          $ref: '#/components/schemas/TestUrl'
        requestMethod:
          $ref: '#/components/schemas/RequestMethod'
        postBody:
          type: string
          description: >-
            Enter the OAuth body for the HTTP POST request in this field when
            using OAuth as the authentication mechanism. No special escaping is
            required. If content is provided in the post body, the
            `requestMethod` is automatically set to POST.
        headers:
          type: string
          description: Request headers used for OAuth.
        authType:
          $ref: '#/components/schemas/TestAuthType'
        username:
          type: string
          description: OAuth username
        password:
          type: string
          description: OAuth password
      description: Use this only if you want to use OAuth as the authentication mechanism.
      example:
        configId: '123321123'
        testUrl: https://api.thousandeyes.com/v7/status
        requestMethod: get
        postBody: 'client_id: ************'
        headers: 'Authorization: Basic ************'
        authType: none
        username: user123
        password: '*******'
    TestUserAgent:
      type: string
      description: User-agent string to be provided during the test.
      example: curl
    TestVerifyCertificate:
      type: boolean
      description: >-
        Ignore or acknowledge certificate errors. Set to false to ignore
        certificate errors.
      default: false
      example: false
    TestAllowUnsafeLegacyRenegotiation:
      type: boolean
      description: >-
        Allows TLS renegotiation with servers not supporting RFC 5746. Default
        Set to true to allow unsafe legacy renegotiation.
      default: true
      example: true
    TestOverrideAgentProxy:
      type: boolean
      description: >-
        Flag indicating if a proxy other than the default should be used. To
        override the default proxy for agents, set to `true` and specify a value
        for `overrideProxyId`.
      default: false
      example: false
    TestOverrideProxyId:
      type: string
      description: ID of the proxy to be used if the default proxy is overridden.
      example: '281474976710706'
    TestCollectProxyNetworkData:
      type: boolean
      description: Indicates whether network data to the proxy should be collected.
      default: false
      example: false
    HttpServerBaseProperties:
      type: object
      properties:
        authType:
          $ref: '#/components/schemas/TestAuthType'
        agentInterfaces:
          $ref: '#/components/schemas/AgentInterfaces'
        bandwidthMeasurements:
          $ref: '#/components/schemas/TestBandwidthMeasurements'
        clientCertificate:
          $ref: '#/components/schemas/TestClientCertificate'
        contentRegex:
          type: string
          description: Content regex, this field does not require escaping.
          example: (regex)+
        customHeaders:
          $ref: '#/components/schemas/TestCustomHeaders'
        desiredStatusCode:
          $ref: '#/components/schemas/TestDesiredStatusCode'
        distributedTracing:
          $ref: '#/components/schemas/TestDistributedTracing'
        downloadLimit:
          type: integer
          description: >-
            Specifies maximum number of bytes to download from the target
            object.
          example: 2048
        dnsOverride:
          type: string
          format: ipv4
          description: IP address to use for DNS override.
          example: 8.8.8.8
        httpTargetTime:
          $ref: '#/components/schemas/TestHttpTargetTime'
        httpTimeLimit:
          $ref: '#/components/schemas/TestHttpTimeLimit'
        httpVersion:
          $ref: '#/components/schemas/TestHttpVersion'
        includeHeaders:
          $ref: '#/components/schemas/TestIncludeHeaders'
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        oAuth:
          $ref: '#/components/schemas/OAuth'
        password:
          $ref: '#/components/schemas/TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        protocol:
          $ref: '#/components/schemas/TestProtocol'
        sslVersion:
          $ref: '#/components/schemas/TestSslVersion'
        sslVersionId:
          $ref: '#/components/schemas/TestSslVersionId'
        url:
          $ref: '#/components/schemas/TestUrl'
        useNtlm:
          $ref: '#/components/schemas/TestUseNtlm'
        userAgent:
          $ref: '#/components/schemas/TestUserAgent'
        username:
          $ref: '#/components/schemas/TestUsername'
        verifyCertificate:
          $ref: '#/components/schemas/TestVerifyCertificate'
        allowUnsafeLegacyRenegotiation:
          $ref: '#/components/schemas/TestAllowUnsafeLegacyRenegotiation'
        followRedirects:
          $ref: '#/components/schemas/TestFollowRedirects'
        fixedPacketRate:
          $ref: '#/components/schemas/TestFixedPacketRate'
        overrideAgentProxy:
          $ref: '#/components/schemas/TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/TestOverrideProxyId'
        collectProxyNetworkData:
          $ref: '#/components/schemas/TestCollectProxyNetworkData'
    TestHeaders:
      type: array
      description: HTTP request headers used.
      items:
        type: string
      example:
        - 'header1: value1'
        - 'header2: value2'
    TestHttpType:
      type: string
      example: http-server
      readOnly: true
    HttpServerProperties:
      allOf:
        - $ref: '#/components/schemas/HttpServerBaseProperties'
        - type: object
          required:
            - url
          properties:
            headers:
              $ref: '#/components/schemas/TestHeaders'
            downloadLimit:
              type: integer
              description: >-
                Specifies maximum number of bytes to download from the target
                object.
              example: 2048
            dnsOverride:
              type: string
              format: ipv4
              description: IP address to use for DNS override.
              example: 8.8.8.8
            randomizedStartTime:
              $ref: '#/components/schemas/TestRandomizedStartTime'
            postBody:
              type: string
              description: >-
                Enter the body for the HTTP POST request in this field. No
                special escaping is necessary. If the post body is provided with
                content, the `requestMethod` is automatically set to POST.
              example: '{ "example" : "value"}'
            ipv6Policy:
              $ref: '#/components/schemas/TestIpv6Policy'
            type:
              $ref: '#/components/schemas/TestHttpType'
    HttpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/HttpServerProperties'
    TestPageLoadTimeLimit:
      type: integer
      description: Page load time limit. Must be larger than the `httpTimeLimit`.
      minimum: 5
      maximum: 60
      default: 10
      example: 10
    TestBlockDomains:
      type: string
      description: >-
        Domains or full object URLs to be excluded from metrics and waterfall
        data for transaction tests.
      example: domain.com/
    TestDisableScreenshot:
      type: boolean
      description: Enables or disables screenshots on error. Set true to not capture
      default: false
      example: false
    TestAllowMicAndCamera:
      type: boolean
      description: Set true allow the use of a fake mic and camera in the browser.
      default: false
      example: false
    TestAllowGeolocation:
      type: boolean
      description: Set true to use the agent’s geolocation by the web page.
      default: false
      example: false
    TestBrowserLanguage:
      type: string
      description: >-
        Set one of the available browser language that you want to use to
        configure the browser.
      example: en-US
    TestPageLoadingStrategy:
      type: string
      enum:
        - normal
        - eager
        - none
      description: >
        * `normal`: The test waits until the entire page is fully loaded,
        including the downloading and parsing of HTML content as well as all
        associated resources, before advancing to the next action in the
        transaction test script. 

        * `eager`: The test waits for the DOMContentLoaded event, indicating
        that HTML content is downloaded and parsed, and the document reaches the
        "interactive" readiness state, before proceeding to the next action in
        the test script.

        * `none`: The test only waits for the download of HTML content. Once the
        HTML is downloaded, the test continues to the next action in the
        transaction test script without waiting for additional resources.
      default: normal
      example: normal
    TestPageLoadType:
      type: string
      example: page-load
      readOnly: true
    TestIdentifyAgentTrafficWithUserAgent:
      type: boolean
      description: >
        Determines how agent traffic is identified:


        * `false`: Adds the `x-thousandeyes-agent: yes` header.

        * `true`: Appends `(ThousandEyes Agent)` to the `user-agent` header.


        For more information, see [Notes on Agent ID
        Strategy](https://docs.thousandeyes.com/product-documentation/browser-synthetics/test-settings-page-load-transaction#notes-on-agent-id-strategy).
      example: false
      default: false
    PageLoadProperties:
      allOf:
        - $ref: '#/components/schemas/HttpServerBaseProperties'
        - type: object
          required:
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if one was given when the test was
                created.
              example: '2'
            pageLoadTargetTime:
              type: integer
              description: >-
                Target time for page load completion, specified in seconds and
                cannot exceed the `pageLoadTimeLimit`.
              minimum: 1
              maximum: 30
              example: 10
            pageLoadTimeLimit:
              $ref: '#/components/schemas/TestPageLoadTimeLimit'
            blockDomains:
              $ref: '#/components/schemas/TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/TestBrowserLanguage'
            pageLoadingStrategy:
              $ref: '#/components/schemas/TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/TestPageLoadType'
            identifyAgentTrafficWithUserAgent:
              $ref: '#/components/schemas/TestIdentifyAgentTrafficWithUserAgent'
    PageLoadInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/PageLoadProperties'
    TestWebTransactionTimeLimit:
      type: integer
      description: Time limit for transaction in seconds.
      minimum: 5
      maximum: 180
      default: 30
      example: 30
    TestWebTransactionType:
      type: string
      example: web-transactions
      readOnly: true
    WebTransactionProperties:
      allOf:
        - $ref: '#/components/schemas/HttpServerBaseProperties'
        - type: object
          required:
            - transactionScript
            - url
          properties:
            emulatedDeviceId:
              type: string
              description: >-
                ID of the emulated device, if specified when the test was
                created.
              example: '2'
            targetTime:
              type: integer
              description: >-
                Target completion time, in seconds. Defaults to 10. Cannot
                exceed the `timeLimit` value.
              minimum: 0
              maximum: 180
              default: 10
              example: 1
            timeLimit:
              $ref: '#/components/schemas/TestWebTransactionTimeLimit'
            transactionScript:
              type: string
              description: >-
                JavaScript of a web transaction test. Quotes must be escaped
                (precede " characters with \ ).
              example: if (true) { return true; }
            blockDomains:
              $ref: '#/components/schemas/TestBlockDomains'
            disableScreenshot:
              $ref: '#/components/schemas/TestDisableScreenshot'
            allowMicAndCamera:
              $ref: '#/components/schemas/TestAllowMicAndCamera'
            allowGeolocation:
              $ref: '#/components/schemas/TestAllowGeolocation'
            browserLanguage:
              $ref: '#/components/schemas/TestBrowserLanguage'
            pageLoadingStrategy:
              $ref: '#/components/schemas/TestPageLoadingStrategy'
            randomizedStartTime:
              $ref: '#/components/schemas/TestRandomizedStartTime'
            type:
              $ref: '#/components/schemas/TestWebTransactionType'
            identifyAgentTrafficWithUserAgent:
              $ref: '#/components/schemas/TestIdentifyAgentTrafficWithUserAgent'
    TestCredentials:
      type: array
      description: >-
        Contains a list of credential IDs (get `credentialId` from
        `/credentials` endpoint).
      items:
        type: string
      example:
        - '3247'
        - '1051'
    WebTransactionInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/WebTransactionProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/TestCredentials'
    ApiPredefinedVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name. Must be unique.
          example: myUsername
        value:
          type: string
          description: Variable value, will be treated as string.
          example: ThousandEyesAccountUserName
    ApiRequestAssertionName:
      type: string
      enum:
        - status-code
        - response-body
      description: >-
        Set to `status-code` to assert the response status code. Set to
        `response-body` to assert data is present in the response body. Use
        `ApiRequestAssertion` to set the value for the assertion.
      example: status-code
    ApiRequestAssertionOperator:
      type: string
      enum:
        - is
        - is-not
        - includes
        - not-includes
        - matches
        - not-matches
      description: >-
        If `name = status-code``, accepted values are [is, is-not]. If `name =
        response-body``, accepted values are [includes, not-includes, matches,
        not-matches]`.
      example: is
    ApiRequestAssertion:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ApiRequestAssertionName'
        operator:
          $ref: '#/components/schemas/ApiRequestAssertionOperator'
        value:
          type: string
          description: >-
            The value of the assertion. If name = `status-code`, the status code
            to assert. If name = `response-body`, the lookup value to assert.
          example: 200
    ApiRequestAuthType:
      type: string
      enum:
        - none
        - basic
        - bearer-token
        - oauth2
      description: Will override the Authorization request header.
      default: none
      example: none
    ApiClientAuthentication:
      type: string
      description: The OAuth2 client authentication location type.
      enum:
        - basic-auth-header
        - in-body
      example: basic-auth-header
    ApiRequestHeader:
      type: object
      properties:
        key:
          type: string
          description: Request header key.
          example: x-custom-header
        value:
          type: string
          description: Request header value. Supports variables `{{variableName}}`.
          example: keep-alive
    ApiRequestMethod:
      type: string
      description: HTTP request method.
      enum:
        - get
        - post
        - put
        - delete
        - patch
      example: get
    ApiRequestVariable:
      type: object
      properties:
        name:
          type: string
          description: Variable name
          example: myTestName
        value:
          type: string
          description: >-
            The JSON path of data within the Response Body to assign to this
            variable.
          example: tests[0].name
    ApiRequest:
      type: object
      required:
        - name
        - url
      properties:
        assertions:
          type: array
          description: List of assertion objects.
          items:
            $ref: '#/components/schemas/ApiRequestAssertion'
        authType:
          $ref: '#/components/schemas/ApiRequestAuthType'
        bearerToken:
          type: string
          writeOnly: true
          description: The bearer token if `authType = bearer-token`.
          example: abcd-1234-...
        body:
          type: string
          description: POST/PUT request body. Must be in JSON format.
        clientAuthentication:
          $ref: '#/components/schemas/ApiClientAuthentication'
        clientId:
          type: string
          description: The application ID used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-id
        clientSecret:
          type: string
          description: The private client secret used when `authType` is set to "oauth2".
          writeOnly: true
          example: client-secret
        collectApiResponse:
          type: boolean
          description: >-
            Set to `true` if API response body should be collected and saved.
            Set to `false` if API response body should not be saved.
          default: true
          example: true
        headers:
          type: array
          description: Array of API Request Header objects.
          items:
            $ref: '#/components/schemas/ApiRequestHeader'
        method:
          $ref: '#/components/schemas/ApiRequestMethod'
        name:
          type: string
          description: API step name, must be unique.
          example: Step 1
        password:
          type: string
          writeOnly: true
          description: The password if `authType = basic`.
          example: basic_pw123
        scope:
          type: string
          description: >-
            Application-specific scope values for the access token when
            `authType` is "oauth2".
          example: read, write, deploy
        tokenUrl:
          type: string
          description: >-
            The endpoint used to request the access token when `authType` is
            "oauth2".
          example: https://id.cisco.com/oauth2/default/v1/token
        url:
          type: string
          description: Request url. Supports variables in the format `{{variableName}}`.
          example: https://api.thousandeyes.com/v7/status
        username:
          type: string
          description: The username if `authType = basic`.
          example: ThousandEyesUserName
        variables:
          type: array
          description: Array of API post request variable objects.
          items:
            $ref: '#/components/schemas/ApiRequestVariable'
        verifyCertificate:
          $ref: '#/components/schemas/TestVerifyCertificate'
        waitTimeMs:
          type: integer
          description: >-
            Post request delay before executing the next API requests, in
            milliseconds.
          example: 0
    ApiProperties:
      type: object
      required:
        - requests
        - url
      properties:
        clientCertificate:
          $ref: '#/components/schemas/TestClientCertificate'
        clientCertDomainsAllowList:
          type: string
          example: www.thousandeyes.com
          description: Comma separated list of domains to send the client certificate.
        collectProxyNetworkData:
          $ref: '#/components/schemas/TestCollectProxyNetworkData'
        distributedTracing:
          $ref: '#/components/schemas/TestDistributedTracing'
        followRedirects:
          $ref: '#/components/schemas/TestFollowRedirects'
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        overrideAgentProxy:
          $ref: '#/components/schemas/TestOverrideAgentProxy'
        overrideProxyId:
          $ref: '#/components/schemas/TestOverrideProxyId'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        predefinedVariables:
          type: array
          items:
            $ref: '#/components/schemas/ApiPredefinedVariable'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        protocol:
          $ref: '#/components/schemas/TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        requests:
          type: array
          items:
            $ref: '#/components/schemas/ApiRequest'
        sslVersionId:
          $ref: '#/components/schemas/TestSslVersionId'
        targetTime:
          type: integer
          description: >-
            Target time for completion metric, defaults to 50% of time limit
            specified in seconds. (0 means default behavior)
          minimum: 0
          maximum: 60
          example: 1
        timeLimit:
          type: integer
          description: >-
            Time limit for transaction in seconds. Exceeding this limit will
            result in a Timeout error.
          minimum: 5
          maximum: 180
          default: 30
        type:
          type: string
          example: api
          readOnly: true
        url:
          $ref: '#/components/schemas/TestUrl'
    ApiInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/ApiProperties'
        - type: object
          properties:
            credentials:
              $ref: '#/components/schemas/TestCredentials'
    FtpServerRequestType:
      type: string
      enum:
        - download
        - upload
        - list
      description: Set the type of activity for the test.
      example: download
    FtpServerProperties:
      type: object
      required:
        - requestType
        - url
        - username
      properties:
        bandwidthMeasurements:
          $ref: '#/components/schemas/TestBandwidthMeasurements'
        downloadLimit:
          type: integer
          description: Specify maximum number of bytes to download from the target object.
          example: 1048576
        ftpTargetTime:
          type: integer
          description: Target time for operation completion; specified in milliseconds.
          minimum: 1000
          maximum: 6000
        ftpTimeLimit:
          type: integer
          description: Set the time limit for the test in seconds.
          minimum: 10
          maximum: 60
          default: 10
          example: 10
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        password:
          $ref: '#/components/schemas/TestPassword'
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        protocol:
          $ref: '#/components/schemas/TestProtocol'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        requestType:
          $ref: '#/components/schemas/FtpServerRequestType'
        url:
          $ref: '#/components/schemas/TestUrl'
        useActiveFtp:
          type: boolean
          description: Explicitly set the flag to use active FTP.
          default: false
          example: false
        useExplicitFtps:
          type: boolean
          description: >-
            Use explicit FTPS (ftp over SSL). By default, tests will autodetect
            when it is appropriate to use FTPS.
          example: false
        username:
          $ref: '#/components/schemas/TestUsername'
        fixedPacketRate:
          $ref: '#/components/schemas/TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/TestIpv6Policy'
        type:
          type: string
          example: ftp-server
          readOnly: true
    FtpServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/FtpServerProperties'
    SipServerProperties:
      type: object
      required:
        - port
        - targetSipCredentials
      properties:
        mtuMeasurements:
          $ref: '#/components/schemas/TestMtuMeasurements'
        networkMeasurements:
          $ref: '#/components/schemas/TestNetworkMeasurements'
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        optionsRegex:
          type: string
          description: Options regex, this field does not require escaping.
          example:
            - a-z
        pathTraceMode:
          $ref: '#/components/schemas/TestPathTraceMode'
        probeMode:
          $ref: '#/components/schemas/TestProbeMode'
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        registerEnabled:
          type: boolean
          description: >-
            Set to true to perform SIP registration on the test target with the
            SIP REGISTER command.
          default: false
          example: false
        sipTargetTime:
          type: integer
          minimum: 100
          maximum: 5000
          description: Target time for test completion in milliseconds.
          example: 1000
        sipTimeLimit:
          type: integer
          minimum: 5
          maximum: 10
          description: Time limit in milliseconds.
          default: 5
          example: 5
        fixedPacketRate:
          $ref: '#/components/schemas/TestFixedPacketRate'
        ipv6Policy:
          $ref: '#/components/schemas/TestIpv6Policy'
        type:
          type: string
          example: sip-server
          readOnly: true
    SipServerInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/SipServerProperties'
    TestSipAuthUser:
      type: string
      description: Username for authentication with SIP server.
      example: username
    SipTestProtocol:
      type: string
      enum:
        - tcp
        - tls
        - udp
      description: Transport layer for SIP communication.
      default: tcp
      example: tcp
    TestSipRegistrar:
      type: string
      description: SIP server to be tested, specified by domain name or IP address.
      example: voice.thousandeyes.com
    TestSipUser:
      type: string
      description: >-
        Username for SIP registration, should be unique within a ThousandEyes
        account group.
      example: username
    TestSipCredentials:
      type: object
      required:
        - port
      properties:
        authUser:
          $ref: '#/components/schemas/TestSipAuthUser'
        password:
          $ref: '#/components/schemas/TestPassword'
        port:
          $ref: '#/components/schemas/TestPort'
        protocol:
          $ref: '#/components/schemas/SipTestProtocol'
        sipRegistrar:
          $ref: '#/components/schemas/TestSipRegistrar'
        user:
          $ref: '#/components/schemas/TestSipUser'
    VoiceProperties:
      type: object
      required:
        - targetAgentId
      properties:
        codec:
          type: string
          description: Codec label
          example: G.711 @ 64 Kbps
          readOnly: true
        codecId:
          type: string
          description: >-
            Coded ID, [see the list of acceptable
            values](https://docs.thousandeyes.com/product-documentation/internet-and-wan-monitoring/tests/working-with-test-settings#rtp-stream-advanced-settings-tab)
          example: '0'
        dscp:
          $ref: '#/components/schemas/TestDscp'
        dscpId:
          $ref: '#/components/schemas/TestDscpId'
        duration:
          type: integer
          minimum: 5
          maximum: 30
          description: Duration of the test in seconds.
          default: 5
          example: 5
        jitterBuffer:
          type: integer
          minimum: 0
          maximum: 150
          description: De-jitter buffer size in seconds.
          default: 40
          example: 40
        numPathTraces:
          $ref: '#/components/schemas/TestNumPathTraces'
        port:
          type: integer
          minimum: 1024
          maximum: 65535
          description: Port number for the chosen protocol.
          example: 1024
        randomizedStartTime:
          $ref: '#/components/schemas/TestRandomizedStartTime'
        targetAgentId:
          type: string
          description: Agent ID of the target agent for the test.
          example: '281474976710706'
        type:
          type: string
          example: voice
          readOnly: true
    VoiceInstantTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - $ref: '#/components/schemas/VoiceProperties'
    Expand:
      type: string
      enum:
        - header
        - certificate
      example: header
    NetworkTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/NetworkTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    NetworkTestResult:
      allOf:
        - type: object
          properties:
            availableBandwidth:
              type: number
              description: >-
                The bandwidth from the client to the server measured in Mbps.
                This value is not available if bandwidth testing is disabled, if
                no value could be calculated, or if the target is a proxy.
              example: 9.100464
              format: double
              readOnly: true
            avgLatency:
              type: number
              description: Average RTT for packets sent to destination
              example: 167.04
              format: double
              readOnly: true
            bandwidth:
              type: number
              example: 4.3313155
              format: double
              readOnly: true
            capacity:
              type: number
              description: >-
                The capacity from the client to the server measured in Mbps.
                This value is not available if bandwidth testing is disabled, if
                no value could be calculated, or if the target is a proxy.
              example: 210.10854
              format: double
              readOnly: true
            jitter:
              type: number
              description: Standard deviation of latency
              example: 0.076808
              format: double
              readOnly: true
            loss:
              type: number
              description: Percentage of packets not reaching destination
              example: 0
              format: double
              readOnly: true
            maxLatency:
              type: number
              description: Maximum RTT for packets sent to destination
              example: 168
              format: double
              readOnly: true
            minLatency:
              type: number
              description: Minimum RTT for packets sent to destination
              example: 167
              format: double
              readOnly: true
            packetsBySecond:
              type: array
              description: Number of packets sent and received in a second.
              example:
                - []
                - - 0
                - - 2
                - - 2
                  - 1
                - - 1
                  - 1
              items:
                type: array
                items:
                  type: integer
              readOnly: true
            agent:
              $ref: '#/components/schemas/TestResultAgent'
            date:
              type: string
              description: Data point date in UTC (ISO date-time format).
              format: date-time
              example: '2022-07-17T22:00:54Z'
              readOnly: true
            roundId:
              type: integer
              description: Epoch time (seconds) indicating the start time of the round
              example: 1384309800
              readOnly: true
            serverIp:
              type: string
              description: IP of target server
              example: 50.18.127.223
              readOnly: true
            server:
              type: string
              description: Target server, including port (if method used is TCP)
              example: www.thousandeyes.com:80
              readOnly: true
            healthScore:
              type: number
              description: >-
                A normalized value (0.0-1.0) representing the network connection
                health of the test target. Returns negative values as error
                codes. -1.0 indicates there was insufficient data to calculate
                the health score.
              example: 0.98
            direction:
              $ref: '#/components/schemas/TestDirection'
        - $ref: '#/components/schemas/TestResult'
        - $ref: '#/components/schemas/EpochTimeWindow'
    PathVisDetailTestResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/PathVisDetailTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        _links:
          $ref: '#/components/schemas/SelfLinks'
    PathVisDetailTestResult:
      allOf:
        - $ref: '#/components/schemas/PathVisBaseTestResult'
        - type: object
          properties:
            pathTraces:
              type: array
              description: >-
                Shows 3 iterations of path trace, with each iteration specified
                by a pathId
              items:
                $ref: '#/components/schemas/PathVisRoute'
    PathVisTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/PathVisTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    PathVisTestResult:
      allOf:
        - type: object
          properties:
            pathTraces:
              type: array
              description: >-
                Shows all iterations of path trace, with each iteration
                specified by a pathId
              items:
                $ref: '#/components/schemas/PathTrace'
        - $ref: '#/components/schemas/PathVisBaseTestResult'
    PathVisBaseTestResult:
      allOf:
        - $ref: '#/components/schemas/TestResult'
        - $ref: '#/components/schemas/EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/TestResultAgent'
            server:
              type: string
              description: Target server, including port (if method used is TCP)
              example: www.google.com:443
              readOnly: true
            serverIp:
              type: string
              description: IP of target server
              example: 172.217.170.68
              readOnly: true
            sourceIp:
              type: string
              description: IP address of source agent
              example: 196.40.106.237
              readOnly: true
            sourcePrefix:
              type: string
              description: IP prefix of source agent
              example: 196.40.96.0/20
              readOnly: true
            targetIsProxy:
              type: boolean
              description: >-
                Specifies whether the traces are targeting a proxy. If not set,
                it is considered as false.
              example: true
              readOnly: true
            direction:
              $ref: '#/components/schemas/PathVisDirection'
    PathVisRoute:
      type: object
      properties:
        pathId:
          type: string
          description: Unique ID of path trace
          example: '4711301366345855606023718047703941305741293841502186803'
          readOnly: true
        hops:
          type: array
          description: Array of hop objects indicating each step in the traceroute
          items:
            $ref: '#/components/schemas/PathVisHop'
    PathVisHop:
      type: object
      properties:
        hop:
          type: integer
          description: Hop index
          example: 1
          readOnly: true
        ipAddress:
          type: string
          description: IP address of the hop
          example: 196.40.106.237
          readOnly: true
        prefix:
          type: string
          description: Prefix of IP address shown in CIDR
          example: 196.40.96.0/20
          readOnly: true
        rdns:
          type: string
          description: Reverse DNS entry of IP, if available
          example: core-router1.cpt2.host-h.net
          readOnly: true
        network:
          type: string
          description: Autonomous System originating the prefix
          example: HETZNER (Pty) Ltd (AS 37153)
          readOnly: true
        responseTime:
          type: integer
          description: RTT to the hop’s IP in milliseconds
          example: 1
          readOnly: true
        location:
          type: string
          description: Location information for the hop
          example: Cape Town, South Africa
          readOnly: true
        mpls:
          type: string
          description: Multiprotocol Label Switching information, if available
          readOnly: true
    PathTrace:
      type: object
      properties:
        ipAddress:
          type: string
          description: IP address of the hop
          example: 196.40.106.237
          readOnly: true
        mss:
          type: integer
          description: Maximum segment size in bytes
          example: 1460
          readOnly: true
        numberOfHops:
          type: integer
          description: Number of hops for path trace to destination
          example: 15
          readOnly: true
        pathId:
          type: string
          description: Unique ID of path trace
          example: '1230899668701775614109128428722974545787322404682781961521'
          readOnly: true
        pathMtu:
          type: integer
          description: MTU sizes on network from agents to the target
          example: 1500
          readOnly: true
        responseTime:
          type: integer
          description: RTT of the path trace to the destination in milliseconds
          example: 1500
          readOnly: true
    PathVisDirection:
      type: string
      enum:
        - to-target
        - from-target
      description: Direction of the path trace.
      example: to-target
    HttpTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/HttpTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    HttpTestResult:
      allOf:
        - $ref: '#/components/schemas/TestResult'
        - $ref: '#/components/schemas/EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/TestResultAgent'
            serverIp:
              type: string
              description: IP address of destination server
              example: 193.2.1.88
              readOnly: true
            responseCode:
              type: integer
              description: HTTP response code
              example: 200
            numRedirects:
              type: integer
              description: Number of redirects
              example: 0
            redirectTime:
              type: integer
              description: Cumulative redirect timing in milliseconds
              example: 10
            dnsTime:
              type: integer
              description: Time required to resolve DNS in milliseconds
              example: 0
            sslTime:
              type: integer
              description: Time to negotiate SSL/TLS in milliseconds
              example: 9
            connectTime:
              type: integer
              description: Time required to establish a TCP connection to the server
              example: 2
            waitTime:
              type: integer
              description: >-
                Time elapsed between completion of request and first byte of
                response in milliseconds
              example: 3
            receiveTime:
              type: integer
              description: >-
                Elapsed time between first and last byte of response in
                milliseconds
              example: 1
            wireSize:
              type: integer
              description: Size of content in bytes
              example: 9993
            responseTime:
              type: integer
              description: Time to first byte in milliseconds
              example: 14
            throughput:
              type: number
              format: double
              description: WireSize divided by receiveTime in byter per second
              example: 123
            totalTime:
              type: integer
              description: response time + receive time
              example: 15
            headers:
              $ref: '#/components/schemas/HttpTestResultHeaders'
            errorType:
              type: string
              description: Type of error encountered; corresponds to phase of connection
              example: None
              readOnly: true
            errorDetails:
              $ref: '#/components/schemas/TestResultErrorDetails'
            sslCipher:
              type: string
              description: Cipher suite
            sslVersion:
              type: string
              description: TLS version
              example: TLSv1.3
            sslCertificates:
              type: array
              items:
                $ref: '#/components/schemas/SslCert'
            healthScore:
              type: number
              description: >-
                A normalized value (0.0-1.0) representing the web application
                connection health of the test target. Returns negative values as
                error codes. -1.0 indicates there was insufficient data to
                calculate the health score.
              example: 0.98
    HttpTestResultHeaders:
      type: object
      description: Expandable object containing both request and response headers
      properties:
        requestHeaders:
          type: string
          description: 'Crlf-delimited list of request headers in header: value format'
          example: "GET / HTTP/1.1\r\nHost: www.thousandeyes.com\r\nUser-Agent: curl/7.58.0-DEV\r\nAccept: */*\r\nAccept-Encoding: deflate, gzip\r\nX-ThousandEyes-Agent: yes\r\n"
        responseHeaders:
          type: string
          description: 'crlf-delimited list of response headers in header: value format'
          example: "HTTP/1.1 200 OK\r\nContent-Type: text/html;charset=UTF-8\r\nContent-Length: 9993\r\nConnection: keep-alive\r\nDate: Mon, 04 May 2020 16:13:00 GMT\r\nServer: Apache\r\nContent-Language: en-US\r\nContent-Encoding: gzip\r\nX-Frame-Options: sameorigin\r\nCache-Control: max-age=600, must-revalidate\r\nStrict-Transport-Security: max-age=31536000\r\nX-Content-Type-Options: nosniff\r\nX-XSS-Protection: 1; mode=block\r\nVary: Accept-Encoding\r\nX-Cache: Hit from cloudfront\r\nVia: 1.1 7ba3caf71ae7a52dd411d1a543e80cd8.cloudfront.net (CloudFront)\r\nX-Amz-Cf-Pop: SFO5-C3\r\nX-Amz-Cf-Id: w4h42tkoJD-rEpkRDZUvnQBmy26GVGe6pUsuRr1Dphf7oajYbjXaOA==\r\nAge: 132\r\n"
    SslCert:
      type: object
      properties:
        daysUntilExpiry:
          type: integer
          description: >-
            Days until certificate expires, rounded down. 0 is shown if there
            are less than 24 hours remaining. Calculated when the test was
            executed.
          example: 0
        isFetchDateInValidCertDateRange:
          type: boolean
          description: >-
            True when certificate fetch date is within the valid certificate
            date range, false otherwise
          example: true
        hasValidSigningCert:
          type: boolean
          description: >-
            This field is implicitly true; it is output only when false. false
            indicates this certificate was missing a valid signing certificate
            in the chain.
          example: false
        issuerName:
          type: string
          description: Certificate issuer
          example: DigiCert SHA2 Extended Validation Server CA
        validBefore:
          type: string
          format: date-time
          description: Certificate is not valid after this date
          example: '2020-05-12T12:00:00Z'
        validAfter:
          type: string
          format: date-time
          description: Certificate is not valid before this date
          example: '2018-03-27T00:00:00Z'
        subjectAlternativeNames:
          type: array
          description: >-
            Alternative name(s) of the certificate subject, extracted from the
            Subject Alternative Name (SAN) X.509 certificate extension, for
            example example.com, www2.example.com
          items:
            type: string
          example:
            - www.thousandeyes.com
            - thousandeyes.com
        subjectName:
          type: string
          description: >-
            certificate’s subject name - a value of the common name (CN) RDN
            from the certificate’s Subject attribute, for example
            www.example.com
          example: www.thousandeyes.com
    PageLoadTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/PageLoadTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    PageLoadTestResult:
      allOf:
        - $ref: '#/components/schemas/TestResult'
        - $ref: '#/components/schemas/EpochTimeWindow'
        - type: object
          properties:
            agent:
              $ref: '#/components/schemas/TestResultAgent'
            responseTime:
              type: number
              format: double
              description: Time to first byte in milliseconds
              example: 34.35
              readOnly: true
            totalSize:
              type: integer
              description: Sum of wire size of all objects on page in bytes
              example: 403301
              readOnly: true
            numObjects:
              type: integer
              description: Number of objects found on the page
              example: 17
              readOnly: true
            numErrors:
              type: integer
              description: Number of objects which encountered errors during download
              example: 0
              readOnly: true
            domLoadTime:
              type: integer
              description: Time to interaction in milliseconds
              example: 352
              readOnly: true
            pageLoadTime:
              type: integer
              description: Time to completely load page in milliseconds
              example: 352
              readOnly: true
    PageLoadDetailTestResults:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/PageLoadDetailTestResult'
        test:
          $ref: '#/components/schemas/SimpleTest'
        _links:
          $ref: '#/components/schemas/PaginationLinks'
    PageLoadDetailTestResult:
      allOf:
        - $ref: '#/components/schemas/TestResult'
        - $ref: '#/components/schemas/PageLoadTestResult'
        - type: object
          properties:
            har:
              $ref: '#/components/schemas/PageHar'
    PageHar:
      type: object
      description: >-
        See [HAR specification](http://www.softwareishard.com/blog/har-12-spec/)
        for details
      readOnly: true
      example:
        log:
          creator:
            name: ThousandEyes DB Exporter
          entries:
            - pageref: page_0
              request:
                headers:
                  - name: ':authority'
                    value: google.com
                  - name: ':method'
                    value: GET
                  - name: ':path'
                    value: /
                  - name: ':scheme'
                    value: https
