      type: string
      pattern: ^Pie Chart$
      description: Pie Chart widget type
      example: Pie Chart
    TableWidgetType:
      type: string
      pattern: ^Table$
      description: Table widget type.
      example: Table
    MultiMetricTableWidgetType:
      type: string
      pattern: ^Multi Metric Table$
      description: Multi Metric Table widget type.
      example: Multi Metric Table
    NumberWidgetType:
