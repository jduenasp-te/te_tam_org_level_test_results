      description: >
        Regenerates the bearer token for your account.


        - Requires a valid, non-expired bearer token.

        - The new token is valid for 2 years.

        - After regeneration, the previous token remains valid for 14 days, or
        until its scheduled expiration date, whichever comes first.

        - You can regenerate a new token only if your account has a single
        active token. Attempts to regenerate more than one new token within the
        14-day overlap period returns a 409 error.


        Update your applications to use the new token immediately.
      responses:
        '201':
          description: OK
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/ApiToken'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          description: The user has reached the maximum number of allowed tokens.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/500'
      security:
        - BearerAuth: []
