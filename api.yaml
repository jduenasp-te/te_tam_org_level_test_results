          properties:
            targets:
              uniqueItems: true
              type: array
              description: List of affected targets.
              items:
                $ref: '#/components/schemas/ApiAffectedTarget'
    AffectedAgents:
      allOf:
        - $ref: '#/components/schemas/AffectedCount'
        - type: object
          properties:
            agents:
              uniqueItems: true
              type: array
              description: List of affected agents.
              items:
                $ref: '#/components/schemas/EventApiAffectedAgent'
    EventApiAffectedTest:
      type: object
      properties:
        testId:
          type: string
          description: The ID of the affected test.
          example: '226770'
          readOnly: true
        testType:
          $ref: '#/components/schemas/TestType'
        name:
          type: string
          description: The test name as configured in the test settings.
          example: Google test
          readOnly: true
        affectedTargetIds:
          type: array
          description: >-
            An array of unique target IDs contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '123'
            - '1234'
        affectedAgentIds:
          type: array
          description: >-
            An array of unique agent IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '2954'
            - '2953'
        _links:
          $ref: '#/components/schemas/EventTestLinks'
    ApiAffectedTarget:
      type: object
      properties:
        serverId:
          type: string
          description: The ID of the target server.
          example: '123'
          readOnly: true
        name:
          type: string
          description: The target name as configured in the test settings.
          example: google.com
          readOnly: true
        ip:
          type: string
          description: >-
            The target server IP resolved by the agent. Depending on the failure
            type, the IP may not be present. For example, if the agent failed to
            resolve it or if the requests were routed through the proxy.
          example: 216.239.32.10
          readOnly: true
        affectedTestIds:
          type: array
          description: >-
            An array of unique test IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '123'
            - '1234'
        affectedAgentIds:
          type: array
          description: >-
            An array of unique agent IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '2954'
            - '2953'
    EventApiAffectedAgent:
      type: object
      properties:
        agentId:
          type: string
          description: The ID of the virtual agent.
          example: '2954'
          readOnly: true
        type:
          $ref: '#/components/schemas/CloudEnterpriseAgentType'
        name:
          type: string
          description: The name of the agent as defined in settings.
          example: São Paulo, Brazil - agent
          readOnly: true
        location:
          type: string
          description: The name of the agent's location.
          example: São Paulo, Brazil
          readOnly: true
        countryCode:
          type: string
          description: The country code of the agent's location .
          example: BR
          readOnly: true
        affectedTargetIds:
          type: array
          description: >-
            An array of unique target IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '123'
            - '1234'
        affectedTestIds:
          type: array
          description: >-
            An array of unique agent IDs that contributed data points which
            generated the signal for the event.
          items:
            type: string
          example:
            - '2954'
            - '2953'
        _links:
          $ref: '#/components/schemas/AgentLinks'
    EventStartDate:
      type: string
      format: date-time
      description: >-
        The start date and time (in UTC, ISO 8601 format) when the event was
        first detected.
      example: '2020-04-23T13:43:16Z'
      readOnly: true
    EventEndDate:
      type: string
      format: date-time
      description: >-
        The end date and time (in UTC, ISO 8601 format) when the event was
        resolved (due to timeout). This value is populated for "ongoing" events.
      example: '2020-04-23T13:43:16Z'
      readOnly: true
    EventAlertSeverity:
      type: string
      description: The severity of the alert.
      enum:
        - high
        - medium
        - low
        - unknown
      example: medium
    EventType:
      type: string
      description: >-
        Specifies the event type in a machine-readable and backwards-compatible
        format. Allowed values are: `agent-local`, `network-pop`, `network`,
        `dns`, `target`, and `proxy`.
      enum:
        - agent-local
        - network-pop
        - network
        - dns
        - target
        - target-network
        - proxy
      example: target
      readOnly: true
    TargetEventType:
      type: string
      description: Target event type.
      example: target
      pattern: ^target$
    TargetNetworkEventType:
      type: string
      description: Target network event type.
      example: target-network
      pattern: ^target-network$
    ProxyEventType:
      type: string
      description: Proxy event type.
      example: proxy
      pattern: ^proxy$
    DnsEventType:
      type: string
      description: DNS event type.
      example: dns
      pattern: ^dns$
    AgentLocalEventType:
      type: string
      description: Agent local event type.
      example: agent-local
      pattern: ^agent-local$
    NetworkEventType:
      type: string
      description: Network event type.
      example: network
      pattern: ^network$
    NetworkPopEventType:
      type: string
      description: Network pop event type.
      example: network-pop
      pattern: ^network-pop$
    EventState:
      type: string
      description: >-
        Indicates the state of the event, whether it is ongoing (active) or has
        been resolved.
      enum:
        - active
        - resolved
      example: resolved
      readOnly: true
    Cause:
      uniqueItems: true
      type: array
      description: The cause of the error.
      items:
        type: string
      example:
        - Network Loss and/or High RTT
    AgentLinks:
      type: object
