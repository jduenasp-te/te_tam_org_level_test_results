  /endpoint/agents/transfer/bulk:
    post:
      summary: Bulk transfer agents
      operationId: transferEndpointAgents
      tags:
        - Endpoint Agents Transfer
      description: >
        Initiates the transfer of multiple agents between accounts. The
        following conditions apply:


        * The requester must possess 'write' permissions for both the 'from' and
        'to' accounts involved in each transfer.


        * Multiple transfers may involve a mix of different source and
        destination accounts.

        * For each transfer request, the 'from' account must match the current
        account of the respective agent.

        * Transfers are executed asynchronously.

        * Progress tracking is not intended, but users can monitor the progress
        by periodically polling the 'get agent' endpoint.

        * Each transfer request is individually validated and completed; this
        operation is not atomic, meaning transfers can succeed or fail
        individually.

        * The API response provides the status of each transfer request.
      parameters:
        - $ref: '#/components/parameters/AccountGroupId'
      requestBody:
        $ref: '#/components/requestBodies/AgentTransfers'
      responses:
        '207':
          description: Transfer initiated
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BulkAgentTransferResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '429':
          $ref: '#/components/responses/429'
      security:
        - BearerAuth: []
