              type: number
              description: Percentage of packets not reaching destination.
              example: 0
              format: double
              readOnly: true
            maxLatency:
              type: number
              description: Maximum RTT for packets sent to destination.
              example: 168
              format: double
              readOnly: true
            minLatency:
              type: number
              description: Minimum RTT for packets sent to destination.
              example: 167
              format: double
              readOnly: true
    SystemMetrics:
      type: object
      properties:
        startTimeMs:
          type: integer
          format: int64
          description: >-
            The start time of metrics collection, expressed in milliseconds
            since the Epoch.
          example: 1581508857327
          readOnly: true
        endTimeMs:
          type: integer
          format: int64
          description: >-
            The end time of metrics collection, expressed in milliseconds since
            the Epoch.
          example: 1581508867333
          readOnly: true
        cpuUtilization:
          $ref: '#/components/schemas/CpuUtilization'
        physicalMemoryUsedBytes:
          $ref: '#/components/schemas/PhysicalMemoryUsedBytes'
        physicalMemoryTotalBytes:
          type: integer
          format: int64
          description: Total physical memory of the system.
          example: 1024
          readOnly: true
    CpuUtilization:
      type: object
      properties:
        min:
          type: number
          format: double
          description: >-
            The minimum sampled usage value recorded during the monitored
            period.
          example: 0.22
          minimum: 0
          maximum: 1
          readOnly: true
        max:
          type: number
          format: double
          description: >-
            The maximum sampled usage value recorded during the monitored
            period.
          example: 0.75
          minimum: 0
          maximum: 1
          readOnly: true
        mean:
          type: number
          format: double
          description: >-
            The mean (average) sampled usage value recorded during the monitored
            period.
          example: 0.55
          minimum: 0
          maximum: 1
          readOnly: true
        median:
          type: number
          format: double
          description: The median sampled usage value recorded during the monitored period.
          example: 0.61
          minimum: 0
          maximum: 1
          readOnly: true
        stdDev:
          type: number
          format: double
          description: >-
            The standard deviation of sampled usage values recorded during the
            monitored period.
          example: 0.01
          minimum: 0
          maximum: 1
          readOnly: true
        count:
          type: integer
          description: The total number of samples collected during the monitored period.
          example: 150
          readOnly: true
    PhysicalMemoryUsedBytes:
      type: object
      properties:
        min:
          type: number
          format: double
          description: >-
            The minimum sampled memory usage value recorded during the monitored
            period.
          example: 1.2
          readOnly: true
        max:
          type: number
          format: double
          description: >-
            The maximum sampled memory usage value recorded during the monitored
            period.
          example: 2.5
          readOnly: true
        mean:
          type: number
          format: double
          description: >-
            The mean (average) value of memory usage sampled over the monitored
            period.
          example: 1.77
          readOnly: true
        median:
          type: number
          format: double
          description: The median value of memory usage sampled over the monitored period.
          example: 1.85
          readOnly: true
        stdDev:
          type: number
          format: double
          description: >-
            The standard deviation of memory usage sampled during the monitored
            period.
          example: 0.25
          readOnly: true
        count:
          type: integer
          description: The total number of samples collected during the monitored period.
          example: 155
          readOnly: true
    SystemMetricDetails:
      type: object
      description: >
        Details of system metrics that contain top applications by CPU/memory
        usage.

        Not populated by default.
      properties:
        topCpuApplications:
          type: array
          description: A list of applications that consume more than 2% of the CPU.
          readOnly: true
          items:
            $ref: '#/components/schemas/ApplicationMetrics'
        topMemoryApplications:
          type: array
          description: A list of applications that consume more than 2% of the RAM.
          readOnly: true
          items:
            $ref: '#/components/schemas/ApplicationMetrics'
    ApplicationMetrics:
      type: object
      properties:
        name:
          type: string
          description: The name of the application.
          example: Webex
        totalCpu:
          type: number
          format: double
          description: The total CPU usage by all application processes.
          example: 0.5
        totalMemoryPercentage:
          type: number
          format: double
          description: The total percentage of memory used by all application processes.
          example: 0.22
        totalMemoryBytes:
          type: integer
          format: int64
          description: The total memory in bytes used by all application processes.
          example: 1023334
        processes:
          type: array
          description: A list of application processes.
          items:
            $ref: '#/components/schemas/ProcessMetrics'
    ProcessMetrics:
      type: object
      properties:
        name:
          type: string
          description: The name of the process.
          example: Webex background
        pid:
          type: integer
          description: The process ID.
          example: 15632
        cpu:
          type: number
          format: double
          description: >-
            The CPU usage by the process as a percentage (e.g., 0.5 for 50% CPU
            usage).
          example: 0.5
        memoryPercentage:
          type: number
          format: double
          description: >-
            The memory usage by the process as a percentage (e.g., 0.22 for
            22%).
          example: 0.22
        memoryBytes:
          type: integer
          format: int64
          description: The memory usage by the process in bytes.
          example: 1023334
    VpnProfile:
