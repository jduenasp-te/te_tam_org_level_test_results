          properties:
            rdns:
              type: string
              description: Reverse DNS entry of IP, if available.
              example: core-router1.cpt2.host-h.net
              readOnly: true
            network:
              type: string
              description: Autonomous System originating the prefix.
              example: HETZNER (Pty) Ltd (AS 37153)
              readOnly: true
            responseTime:
              type: integer
              description: RTT to the hop’s IP in milliseconds.
              example: 1
              readOnly: true
            location:
              type: string
              description: Location information for the hop.
              example: Cape Town, South Africa
              readOnly: true
    Hop:
      type: object
      properties:
        hop:
          type: integer
          description: The hop index.
          example: 1
          readOnly: true
        ipAddress:
          type: string
          description: IP address of the hop.
          example: 196.40.106.237
          readOnly: true
        prefix:
          type: string
          description: Prefix of IP address shown in CIDR.
          example: 196.40.96.0/20
          readOnly: true
    EndpointPathTrace:
      type: object
      properties:
        ipAddress:
          type: string
          description: IP address of the hop destination.
          example: 196.40.106.237
          readOnly: true
        numberOfHops:
          type: integer
          description: Number of hops for path trace to destination.
          example: 15
          readOnly: true
        protocol:
          $ref: '#/components/schemas/EndpointTestResultProtocol'
        tcpPathTraceMode:
          $ref: '#/components/schemas/TcpPathTraceModeResponse'
        udpPathTraceMode:
          $ref: '#/components/schemas/UdpPathTraceModeResponse'
        pathId:
          type: string
          description: Unique ID of path trace.
          example: '1230899668701775614109128428722974545787322404682781961521'
          readOnly: true
        responseTime:
          type: integer
          description: RTT of the path trace to the destination in milliseconds.
          example: 1500
          readOnly: true
    HttpMultiEndpointTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/HttpEndpointTestResult'
        totalHits:
          $ref: '#/components/schemas/TotalHits'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationNextAndSelfLink'
    HttpEndpointTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
          type: array
          items:
            $ref: '#/components/schemas/HttpEndpointTestResult'
        test:
          $ref: '#/components/schemas/EndpointHttpServerTest'
        startDate:
          $ref: '#/components/schemas/StartDate'
        endDate:
          $ref: '#/components/schemas/EndDate'
        _links:
          $ref: '#/components/schemas/PaginationNextAndSelfLink'
    HttpEndpointTestResult:
      allOf:
        - $ref: '#/components/schemas/EndpointTestResult'
        - type: object
          properties:
            score:
              $ref: '#/components/schemas/EndpointHttpDataPointScore'
            connectTime:
              type: integer
              description: >-
                Time required to establish a TCP connection to the server in
                milliseconds.
              example: 2
              readOnly: true
            dnsTime:
              type: integer
              description: Time required to resolve DNS in milliseconds.
              example: 0
              readOnly: true
            errorType:
              $ref: '#/components/schemas/HttpErrorType'
            errorDetails:
              type: string
              description: Error details, if an error were encountered.
              readOnly: true
            headers:
              $ref: '#/components/schemas/HttpEndpointTestResultHeaders'
            numRedirects:
              type: integer
              description: Number of redirects.
              example: 0
              readOnly: true
            receiveTime:
              type: integer
              description: >-
                Elapsed time between first and last byte of response in
                milliseconds.
              example: 1
              readOnly: true
            redirectTime:
              type: integer
              description: Cumulative redirect timing in milliseconds.
              example: 10
              readOnly: true
            responseCode:
              type: integer
              description: HTTP response code.
              example: 200
              readOnly: true
            responseTime:
              type: integer
              description: Time to first byte in milliseconds.
              example: 14
              readOnly: true
            serverIp:
              type: string
              description: IP address of destination server.
              example: 193.2.1.88
              readOnly: true
            sslTime:
              type: integer
              description: Time to negotiate SSL/TLS in milliseconds.
              example: 9
              readOnly: true
            totalTime:
              type: integer
              description: Total time is the response time + receive time.
              example: 15
              readOnly: true
            waitTime:
              type: integer
              description: >-
                Time elapsed between completion of request and first byte of
                response in milliseconds.
              example: 3
              readOnly: true
            wireSize:
              type: integer
              description: Size of content in bytes.
              example: 9993
              readOnly: true
            throughput:
              type: integer
              description: Amount of data transmitted, in bytes.
              example: 190
              readOnly: true
    HttpErrorType:
      type: string
      enum:
        - connect
        - dns
        - http
        - none
        - send
        - ssl
        - receive
      description: Type of error encountered; corresponds to phase of connection.
      default: connect
      example: connect
      readOnly: true
    HttpEndpointTestResultHeaders:
      type: object
      description: Expandable object containing both request and response headers.
      properties:
        requestHeaders:
          type: string
          description: 'CRLF-delimited list of request headers in `header: value` format.'
          example: "GET / HTTP/1.1\r\nHost: www.thousandeyes.com\r\nUser-Agent: curl/7.58.0-DEV\r\nAccept: */*\r\nAccept-Encoding: deflate, gzip\r\nX-ThousandEyes-Agent: yes\r\n"
          readOnly: true
        responseHeaders:
          type: string
          description: 'CRLF-delimited list of response headers in `header: value` format.'
          example: "HTTP/1.1 200 OK\r\nContent-Type: text/html;charset=UTF-8\r\nContent-Length: 9993\r\nConnection: keep-alive\r\nDate: Mon, 04 May 2020 16:13:00 GMT\r\nServer: Apache\r\nContent-Language: en-US\r\nContent-Encoding: gzip\r\nX-Frame-Options: sameorigin\r\nCache-Control: max-age=600, must-revalidate\r\nStrict-Transport-Security: max-age=31536000\r\nX-Content-Type-Options: nosniff\r\nX-XSS-Protection: 1; mode=block\r\nVary: Accept-Encoding\r\nX-Cache: Hit from cloudfront\r\nVia: 1.1 7ba3caf71ae7a52dd411d1a543e80cd8.cloudfront.net (CloudFront)\r\nX-Amz-Cf-Pop: SFO5-C3\r\nX-Amz-Cf-Id: w4h42tkoJD-rEpkRDZUvnQBmy26GVGe6pUsuRr1Dphf7oajYbjXaOA==\r\nAge: 132\r\n"
          readOnly: true
    NetworkDynamicEndpointTestResults:
      type: object
      properties:
        results:
          x-paginated-items: true
