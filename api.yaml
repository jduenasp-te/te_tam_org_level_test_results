    TestUsePublicBgp:
      type: boolean
      description: >-
        Indicate if all available public BGP monitors should be used, when
        ommited defaults to `bgpMeasurements` value.
      default: true
      example: true
    UnexpandedBgpTest:
      allOf:
        - $ref: '#/components/schemas/UnexpandedInstantTest'
        - type: object
          required:
            - prefix
          properties:
            enabled:
              $ref: '#/components/schemas/Enabled'
            includeCoveredPrefixes:
              type: boolean
              description: >-
                Indicate if queries for subprefixes detected under this prefix
                should included.
              example: true
            usePublicBgp:
              $ref: '#/components/schemas/TestUsePublicBgp'
            alertsEnabled:
              type: boolean
              description: Indicates if alerts are enabled.
              example: true
            createdBy:
              $ref: '#/components/schemas/TestCreatedBy'
            createdDate:
              $ref: '#/components/schemas/TestCreatedDate'
            type:
              type: string
              example: bgp
              readOnly: true
            prefix:
              type: string
              description: >-
                a.b.c.d is a network address, with the prefix length defined as
                e. Prefixes can be any length from 8 to 24.
    TestBgpMonitors:
      type: array
      description: Contains list of enabled BGP monitors.
      readOnly: true
      items:
        $ref: '#/components/schemas/Monitor'
    AlertRule:
      type: object
      properties:
        ruleId:
          $ref: '#/components/schemas/RuleId'
        ruleName:
          type: string
          description: Name of the alert rule
          example: The End of the Internet
          readOnly: true
        expression:
          type: string
          description: String expression of alert rule
          example: ((hops((hopDelay >= 100 ms))))
          readOnly: true
        direction:
          $ref: '#/components/schemas/AlertDirection'
        isDefault:
          type: boolean
          description: >-
            Alert rules allow up to 1 alert rule to be selected as a default for
            each type. By checking the default option, this alert rule will be
            automatically included on subsequently created tests that test a
            metric used in alerting here
          example: true
          readOnly: true
        alertType:
          $ref: '#/components/schemas/AlertType'
        minimumSources:
          type: integer
          description: >-
            The minimum number of agents or monitors that must meet the
            specified criteria in order to trigger the alert
          example: 10
          readOnly: true
        minimumSourcesPct:
          type: integer
          description: >-
            the minimum percentage of all assigned agents or monitors that must
            meet the specified criteria in order to trigger the alert
          example: 99
          readOnly: true
        roundsViolatingMode:
          $ref: '#/components/schemas/AlertRoundsViolationMode'
        roundsViolatingOutOf:
          type: integer
          description: Specifies the divisor (y value) for the “X of Y times” condition.
          example: 5
          readOnly: true
        roundsViolatingRequired:
          type: integer
          description: Specifies the numerator (x value) for the “X of Y times” condition
          example: 2
          readOnly: true
        sensitivityLevel:
          $ref: '#/components/schemas/SensitivityLevel'
        severity:
          $ref: '#/components/schemas/Severity'
    TestBgpType:
      type: string
      example: bgp
      readOnly: true
    BaseBgpTest:
      allOf:
        - $ref: '#/components/schemas/InstantTest'
        - type: object
          properties:
            enabled:
              $ref: '#/components/schemas/Enabled'
            monitors:
              $ref: '#/components/schemas/TestBgpMonitors'
            includeCoveredPrefixes:
              type: boolean
              description: >-
                Indicate if queries for subprefixes detected under this prefix
                should included.
              example: true
            usePublicBgp:
              $ref: '#/components/schemas/TestUsePublicBgp'
            alertsEnabled:
              type: boolean
              description: Indicates if alerts are enabled.
              example: true
            alertRules:
              type: array
              description: A list of enabled alert rule objects.
              items:
                $ref: '#/components/schemas/AlertRule'
            createdBy:
              $ref: '#/components/schemas/TestCreatedBy'
            createdDate:
              $ref: '#/components/schemas/TestCreatedDate'
            type:
              $ref: '#/components/schemas/TestBgpType'
    BgpTest:
      allOf:
        - $ref: '#/components/schemas/BaseBgpTest'
        - type: object
          required:
            - prefix
          properties:
            prefix:
              type: string
              description: >-
                a.b.c.d is a network address, with the prefix length defined as
                e. Prefixes can be any length from 8 to 24.
    TestBgpMeasurements:
      type: boolean
      description: Set to `true` to enable bgp measurements.
      default: true
      example: true
    UnexpandedAgentToServerTest:
      allOf:
        - $ref: '#/components/schemas/UnexpandedTest'
        - $ref: '#/components/schemas/UnexpandedInstantTest'
        - $ref: '#/components/schemas/AgentToServerProperties'
        - type: object
          required:
            - interval
          properties:
            bgpMeasurements:
              $ref: '#/components/schemas/TestBgpMeasurements'
            usePublicBgp:
              $ref: '#/components/schemas/TestUsePublicBgp'
    BaseTest:
      allOf:
        - $ref: '#/components/schemas/UnexpandedTest'
        - type: object
          properties:
            alertRules:
              type: array
              description: Contains list of enabled alert rule objects.
              items:
                $ref: '#/components/schemas/AlertRule'
    TestMonitorsProperties:
      type: object
      properties:
        bgpMeasurements:
          $ref: '#/components/schemas/TestBgpMeasurements'
