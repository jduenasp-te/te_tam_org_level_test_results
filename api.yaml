            $ref: '#/components/schemas/AccountGroupQuota'
    OrganizationsQuotasUnassign:
      type: object
      properties:
        organizations:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationQuotaUnassignment'
    OrganizationQuotaUnassignment:
