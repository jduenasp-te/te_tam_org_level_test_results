    TestHttpInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1800
        - 3600
      description: >-
        HTTP test run interval. The interval between HTTP test runs in seconds
        cannot exceed the specified interval value and defaults to the same
        value as the interval if not set.
      example: 120
    TestSubInterval:
      type: integer
      enum:
        - 60
        - 120
        - 300
        - 600
        - 900
        - 1200
        - 1800
        - 3600
      description: >-
        Subinterval for round-robin testing (in seconds). Must be less than or
        equal to interval and must evenly divide interval.
      example: 60
    UnexpandedPageLoadTest:
      allOf:
